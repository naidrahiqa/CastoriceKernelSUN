name: "🚀 Multi-Variant Build"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag (e.g., v1.0, v1.1-beta)"
        required: true
        default: "v1.0"
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Gaming"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      build_gki:
        description: "Build GKI 6.6 variants"
        required: true
        type: boolean
        default: true
      build_legacy:
        description: "Build Legacy 4.19 variants"
        required: true
        type: boolean
        default: true
      build_susfs:
        description: "Build SUSFS variants"
        required: true
        type: boolean
        default: true
      root_methods:
        description: "Root methods (comma-separated: kernelsu-next,wildksu,sukisu,rsukisu)"
        required: true
        default: "kernelsu-next,wildksu"
      governors:
        description: "CPU Governors (comma-separated: schedutil,performance,ondemand,conservative)"
        required: true
        default: "schedutil,performance"

permissions:
  contents: write

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      release_exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if release exists
        id: check
        run: |
          RELEASE_EXISTS=$(gh api repos/${{ github.repository }}/releases/tags/${{ inputs.release_tag }} --jq '.tag_name' 2>/dev/null || echo "")
          if [ -n "$RELEASE_EXISTS" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Release ${{ inputs.release_tag }} already exists - will append builds"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Release ${{ inputs.release_tag }} will be created"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate Build Matrix
        id: generate
        run: |
          # Parse inputs
          IFS=',' read -ra ROOTS <<< "${{ inputs.root_methods }}"
          IFS=',' read -ra GOVS <<< "${{ inputs.governors }}"
          
          # Generate matrix
          MATRIX='{"include":['
          FIRST=true
          
          # GKI builds
          if [ "${{ inputs.build_gki }}" = "true" ]; then
            for ROOT in "${ROOTS[@]}"; do
              for GOV in "${GOVS[@]}"; do
                [ "$FIRST" = false ] && MATRIX+=','
                MATRIX+="{\"kernel\":\"gki\",\"susfs\":false,\"root\":\"$ROOT\",\"governor\":\"$GOV\"}"
                FIRST=false
                
                if [ "${{ inputs.build_susfs }}" = "true" ]; then
                  MATRIX+=",{\"kernel\":\"gki\",\"susfs\":true,\"root\":\"$ROOT\",\"governor\":\"$GOV\"}"
                fi
              done
            done
          fi
          
          # Legacy builds
          if [ "${{ inputs.build_legacy }}" = "true" ]; then
            for ROOT in "${ROOTS[@]}"; do
              for GOV in "${GOVS[@]}"; do
                [ "$FIRST" = false ] && MATRIX+=','
                MATRIX+="{\"kernel\":\"legacy\",\"susfs\":false,\"root\":\"$ROOT\",\"governor\":\"$GOV\"}"
                FIRST=false
                
                if [ "${{ inputs.build_susfs }}" = "true" ]; then
                  MATRIX+=",{\"kernel\":\"legacy\",\"susfs\":true,\"root\":\"$ROOT\",\"governor\":\"$GOV\"}"
                fi
              done
            done
          fi
          
          MATRIX+=']}'
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "📊 Build Matrix:"
          echo "$MATRIX" | jq '.'

  build:
    name: "${{ matrix.kernel == 'gki' && '🟢 GKI' || '🟠 Legacy' }} ${{ matrix.root }} ${{ matrix.susfs && '+ SUSFS' || '' }} (${{ matrix.governor }})"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Trigger Appropriate Workflow
        run: |
          # Determine which workflow to call
          if [ "${{ matrix.kernel }}" = "gki" ]; then
            if [ "${{ matrix.susfs }}" = "true" ]; then
              WORKFLOW="build_gki_susfs.yml"
            else
              WORKFLOW="build_gki.yml"
            fi
          else
            if [ "${{ matrix.susfs }}" = "true" ]; then
              WORKFLOW="build_legacy_susfs.yml"
            else
              WORKFLOW="build_legacy.yml"
            fi
          fi
          
          echo "🚀 Triggering workflow: $WORKFLOW"
          echo "workflow=$WORKFLOW" >> $GITHUB_ENV
          
          # Trigger the workflow
          gh workflow run "$WORKFLOW" \
            --ref main \
            -f custom_name="${{ inputs.custom_name }}" \
            -f author_name="${{ inputs.author_name }}" \
            -f ksu_method="${{ matrix.root }}" \
            -f cpu_governor="${{ matrix.governor }}" \
            -f release_tag="${{ inputs.release_tag }}"
        env:
          GH_TOKEN: ${{ github.token }}

  finalize:
    name: "✅ Finalize Release"
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📊 Build Summary
        run: |
          echo "## 🎉 Multi-Variant Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Tag:** \`${{ inputs.release_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Custom Name:** ${{ inputs.custom_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ inputs.author_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Build Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- GKI 6.6: ${{ inputs.build_gki && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Legacy 4.19: ${{ inputs.build_legacy && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- SUSFS: ${{ inputs.build_susfs && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Root Methods: ${{ inputs.root_methods }}" >> $GITHUB_STEP_SUMMARY
          echo "- Governors: ${{ inputs.governors }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }})" >> $GITHUB_STEP_SUMMARY
