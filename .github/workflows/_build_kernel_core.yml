name: "Core GKI Build Workflow"

on:
  workflow_call:
    inputs:
      with_susfs:
        required: true
        type: string
        default: 'false'
      custom_name:
        required: true
        type: string
        default: 'Starter'
      author_name:
        required: true
        type: string
        default: 'Castorice'
      ksu_method:
        required: true
        type: string
        default: 'kernelsu-next'
      cpu_governor:
        required: true
        type: string
        default: 'schedutil'
      safety_profile:
        required: true
        type: string
        default: 'stable'
      tuning_profile:
        required: true
        type: string
        default: 'balanced'
      clang_toolchain:
        required: true
        type: string
        default: 'bazel-default'
      release_tag:
        required: true
        type: string
        default: 'v1.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: ""
  KSU_VERSION: ""
  SUSFS_OK: "false"
  ZIP_NAME: ""
  TOOLCHAIN_NAME: ""
  TOOLCHAIN_VER: ""
  BUILD_TIME: ""

jobs:
  build:
    name: "Build GKI ${{ inputs.with_susfs == 'true' && '+ SUSFS ' || '' }}(${{ inputs.ksu_method }})"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "=== WORKFLOW INPUTS ==="
          echo "with_susfs:      '${{ inputs.with_susfs }}'"
          echo "custom_name:     '${{ inputs.custom_name }}'"
          echo "ksu_method:      '${{ inputs.ksu_method }}'"
          echo "cpu_governor:    '${{ inputs.cpu_governor }}'"
          echo "clang_toolchain: '${{ inputs.clang_toolchain }}'"
          echo "safety_profile:  '${{ inputs.safety_profile }}'"
          echo "tuning_profile:  '${{ inputs.tuning_profile }}'"
          echo "release_tag:     '${{ inputs.release_tag }}'"
          echo "========================"

      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: gki-bazel-${{ inputs.ksu_method }}-${{ inputs.clang_toolchain }}-${{ github.sha }}
          restore-keys: |
            gki-bazel-${{ inputs.ksu_method }}-${{ inputs.clang_toolchain }}-
            gki-bazel-

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache \
            /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox \
            powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h /

      - name: Setup Swap (16GB)
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile \
            || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio \
            kmod rsync lz4 jq patch binutils libncurses-dev \
            pkg-config ninja-build zstd aria2 p7zip-full \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Download Custom Toolchain
        if: inputs.clang_toolchain != 'bazel-default' && inputs.clang_toolchain != ''
        run: |
          set -euo pipefail
          mkdir -p prebuilts/clang/host/linux-x86
          cd prebuilts/clang/host/linux-x86
          TOOLCHAIN="${{ inputs.clang_toolchain }}"

          smart_extract() {
            local archive="$1" dest="$2"
            mkdir -p "$dest"
            echo "  → Attempt 1: Extracting with --strip-components=1..."
            tar -xf "$archive" -C "$dest" --strip-components=1 2>/dev/null
            if [ -f "$dest/bin/clang" ] || [ -L "$dest/bin/clang" ]; then
              echo "  ✅ Found bin/clang after strip (nested archive)"
              rm -f "$archive"; return 0
            fi
            echo "  → Attempt 1 failed. Trying flat extraction..."
            rm -rf "$dest"/*
            tar -xf "$archive" -C "$dest" 2>/dev/null
            if [ -f "$dest/bin/clang" ] || [ -L "$dest/bin/clang" ]; then
              echo "  ✅ Found bin/clang (flat archive)"
              rm -f "$archive"; return 0
            fi
            echo "  → Attempt 2 failed. Searching for clang binary..."
            local found_clang=$(find "$dest" -name "clang" -type f -o -name "clang" -type l | head -n1)
            if [ -n "$found_clang" ]; then
              local found_dir=$(dirname "$(dirname "$found_clang")")
              echo "  → Found clang at: $found_clang"
              if [ "$found_dir" != "$dest" ]; then
                local tmpdir=$(mktemp -d)
                mv "$found_dir"/* "$tmpdir/"
                rm -rf "$dest"/*
                mv "$tmpdir"/* "$dest/"
                rm -rf "$tmpdir"
              fi
              echo "  ✅ Restructured successfully"
              rm -f "$archive"; return 0
            fi
            echo "  ❌ ERROR: Could not find clang binary in archive!"
            tar -tf "$archive" 2>/dev/null | head -30 || true
            rm -f "$archive"; return 1
          }

          case "$TOOLCHAIN" in
            zyc-latest)
              echo "📥 Downloading ZyClang..."
              ZYASSET_URL=$(curl -sL \
                "https://api.github.com/repos/ZyCromerZ/Clang/releases/latest" \
                | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url' \
                | head -n1)
              [ -z "$ZYASSET_URL" ] && echo "ERROR: Failed to get ZyClang URL" && exit 1
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$ZYASSET_URL"
              smart_extract clang.tar.gz clang-zyc
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-zyc"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              ;;
            aosp-latest)
              git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r522817.git clang-aosp
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-aosp"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=AOSPClang" >> $GITHUB_ENV
              ;;
            weebx-latest)
              WEEBX_URL=$(curl -s https://api.github.com/repos/XSans0/WeebX-Clang/releases/latest | jq -r '.assets[] | select(.name | contains("WeebX-Clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$WEEBX_URL"
              smart_extract clang.tar.gz clang-weebx
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-weebx"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=WeebXClang" >> $GITHUB_ENV
              ;;
            azure-latest)
              git clone --depth=1 https://gitlab.com/Panchajanya1999/azure-clang.git clang-azure
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-azure"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=AzureClang" >> $GITHUB_ENV
              ;;
            neutron-latest)
              NEUTRON_ASSET=$(curl -sL https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$NEUTRON_ASSET"
              smart_extract clang.tar.gz clang-neutron
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-neutron"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ ERROR: Unknown toolchain: $TOOLCHAIN"
              exit 1
              ;;
          esac

          if [ ! -f "$CLANG_PATH/bin/clang" ]; then
            echo "❌ ERROR: clang binary not found at $CLANG_PATH/bin/clang"
            find "$CLANG_PATH" -name "clang*" | head -n 10 || true
            exit 1
          fi
          echo "✅ Custom toolchain ready: $TOOLCHAIN"
          $CLANG_PATH/bin/clang --version | head -n1
          CLANG_VER=$($CLANG_PATH/bin/clang --version | head -n1 | sed 's/ (http.*//g' | awk '{$1=$1};1')
          echo "TOOLCHAIN_VER=$CLANG_VER" >> $GITHUB_ENV
          cd $GITHUB_WORKSPACE

      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          cd common
          make kernelversion

      - name: Set KMI Generation
        run: |
          set -euo pipefail
          cd kernel/common

          DETECTED_KMI=""
          if [ -f "build.config.common" ]; then
            DETECTED_KMI=$(grep -oP '(?<=KMI_GENERATION=)\d+' build.config.common | head -n1)
          fi
          if [ -z "$DETECTED_KMI" ] && [ -f "build.config.gki" ]; then
            DETECTED_KMI=$(grep -oP '(?<=KMI_GENERATION=)\d+' build.config.gki | head -n1)
          fi
          if [ -z "$DETECTED_KMI" ]; then
            STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
            if [ -f "$STAMP_FILE" ]; then
              DETECTED_KMI=$(grep -oP '(?<=kmi_generation = ")\d+' "$STAMP_FILE" | head -n1)
            fi
          fi
          if [ -z "$DETECTED_KMI" ]; then
            echo "⚠️  WARNING: Could not detect KMI_GENERATION from source, falling back to 8"
            DETECTED_KMI="8"
          fi

          echo "✅ KMI_GENERATION detected: $DETECTED_KMI"
          echo "KMI_GENERATION=$DETECTED_KMI" >> $GITHUB_ENV

          if [ -f "build.config.common" ]; then
            if grep -q "KMI_GENERATION" build.config.common; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${DETECTED_KMI}/" build.config.common
            else
              echo "KMI_GENERATION=${DETECTED_KMI}" >> build.config.common
            fi
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" \
              && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${DETECTED_KMI}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" \
            && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${DETECTED_KMI}\"/" "$STAMP_FILE" || true

          if [ -f "build.config.common" ] && ! grep -q "KMI_GENERATION=${DETECTED_KMI}" build.config.common; then
            echo "❌ ERROR: KMI_GENERATION not set correctly!"
            exit 1
          fi
          echo "✅ KMI_GENERATION=$DETECTED_KMI applied to all config files"

      # FIX UTAMA: Clone KernelSU-Next menggunakan default branch.
      # Solusi terbaik: jangan hardcode branch karena rawan perubahan (main/stable/next).
      # Struktur repo: folder driver ada di KernelSU-Next/kernel/ (bukan root).
      # KSU_VERSION diambil dari Makefile kernel driver, bukan rev-list seluruh repo
      # (rev-list seluruh repo menghitung commit manager+userspace juga → angka salah).
      - name: Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          set -euo pipefail
          cd kernel

          KSU_METHOD="${{ inputs.ksu_method }}"
          echo "Installing KSU variant: $KSU_METHOD"

          if [ "$KSU_METHOD" = "kernelsu-next" ]; then
            # CRITICAL: Clone full repo (NOT --depth=1) so Kbuild can compute
            # KSU_VERSION via git rev-list. With depth=1 → version=1 → bootloop!
            echo "Cloning KernelSU-Next (full history for version calc)..."
            git clone \
              https://github.com/KernelSU-Next/KernelSU-Next.git \
              -b dev \
              KernelSU-Next

            if [ ! -d "KernelSU-Next/kernel" ]; then
              echo "❌ ERROR: KernelSU-Next/kernel/ directory not found!"
              ls -la KernelSU-Next/ | head -30
              exit 1
            fi

            # CRITICAL FIX: Use SYMLINK, not copy! This is what the official
            # setup.sh does. Symlink preserves .git so Kbuild detects KSU_VERSION
            # via git rev-list. cp -r breaks this → KSU_VERSION=1 → bootloop.
            echo "Creating symlink: common/drivers/kernelsu → KernelSU-Next/kernel..."
            rm -rf common/drivers/kernelsu
            KSU_ABS_PATH="$(realpath KernelSU-Next/kernel)"
            DRIVER_DIR="$(realpath common/drivers)"
            ln -sf "$KSU_ABS_PATH" "$DRIVER_DIR/kernelsu"

            # Verify symlink works
            if [ ! -f "common/drivers/kernelsu/Kconfig" ]; then
              echo "❌ Symlink broken! Falling back to copy..."
              rm -rf common/drivers/kernelsu
              cp -r KernelSU-Next/kernel common/drivers/kernelsu
            fi

            # Daftarkan ke drivers/Makefile
            if ! grep -q 'CONFIG_KSU' common/drivers/Makefile; then
              echo 'obj-$(CONFIG_KSU) += kernelsu/' >> common/drivers/Makefile
              echo "   Added KSU to drivers/Makefile"
            fi

            # Daftarkan ke drivers/Kconfig
            if ! grep -q 'kernelsu/Kconfig' common/drivers/Kconfig; then
              sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig
              echo "   Added KSU Kconfig to drivers/Kconfig"
            fi

            # git add for Bazel (need -f because symlink target is outside tree)
            cd common
            git add -f drivers/Makefile drivers/Kconfig
            # For Bazel: add all KSU source files so sandbox can see them
            find drivers/kernelsu -name '*.c' -o -name '*.h' -o -name 'Kconfig' -o -name 'Kbuild' -o -name 'Makefile' | xargs git add -f 2>/dev/null || true
            cd ..

            # Calculate KSU_VERSION the same way Kbuild does
            GIT_COUNT=$(cd KernelSU-Next && git rev-list --count HEAD 2>/dev/null || echo "0")
            if [ "$GIT_COUNT" -gt 1 ]; then
              KSU_VERSION=$((30000 + GIT_COUNT))
            else
              # Last resort fallback
              KSU_VERSION="30000"
            fi

            echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
            echo "✅ KernelSU-Next integrated (version: $KSU_VERSION, commits: $GIT_COUNT)"
          else
            echo "❌ ERROR: Unsupported KSU method: $KSU_METHOD"
            exit 1
          fi

      - name: Setup SUSFS
        if: inputs.with_susfs == 'true'
        run: |
          set -euo pipefail
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} \
            || { echo "Error: SUSFS branch not found"; exit 1; }
          cd common
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          [ -f "fs/Makefile" ] && ! grep -q "susfs.o" "fs/Makefile" \
            && echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> "fs/Makefile"

          # git add files so Bazel sees them
          git add fs/susfs.c include/linux/susfs.h fs/Makefile 2>/dev/null || true

          SUSFS_PATCH_FOUND=false
          for patch in \
            "../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-gki-${ANDROID_VERSION}-${KERNEL_VERSION}.patch" \
            "../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${ANDROID_VERSION}-${KERNEL_VERSION}.patch"; do
            if [ -f "$patch" ]; then
              echo "  → Applying kernel SUSFS patch: $(basename $patch)"
              git apply --3way "$patch" \
                || patch -p1 --forward --fuzz=3 < "$patch" \
                || true
              SUSFS_PATCH_FOUND=true
              break
            fi
          done
          if [ "$SUSFS_PATCH_FOUND" = "false" ]; then
            for patch in \
              ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-*.patch \
              ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
              if [ -f "$patch" ]; then
                echo "  → Applying fallback SUSFS patch: $(basename $patch)"
                git apply --3way "$patch" \
                  || patch -p1 --forward --fuzz=3 < "$patch" \
                  || true
                SUSFS_PATCH_FOUND=true
                break
              fi
            done
          fi
          if [ "$SUSFS_PATCH_FOUND" = "false" ]; then
            echo "❌ ERROR: No SUSFS kernel patch file found!"
            echo "   Files in kernel_patches/:"
            ls ../susfs4ksu/kernel_patches/*.patch 2>/dev/null || echo "  (none)"
            exit 1
          fi

          if [ "$KERNEL_VERSION" = "6.6" ]; then
            if [ -f "fs/proc/task_mmu.c" ] && ! grep -q "nr_subpages" "fs/proc/task_mmu.c"; then
              MATCH_COUNT=$(grep -c "int ret = 0, copied = 0;" fs/proc/task_mmu.c 2>/dev/null || echo "0")
              if [ "$MATCH_COUNT" = "1" ]; then
                sed -i \
                  -e '/int ret = 0, copied = 0;/a \tunsigned int nr_subpages = __PAGE_SIZE / PAGE_SIZE;' \
                  -e '/int ret = 0, copied = 0;/a \tpagemap_entry_t *res = NULL;' \
                  fs/proc/task_mmu.c
                echo "   task_mmu.c patched OK"
              else
                echo "   ⚠️  task_mmu.c: pattern count=$MATCH_COUNT, skipping patch to avoid corruption"
              fi
            fi
            if [ -f "fs/proc/base.c" ] && ! grep -q "linux/dma-buf.h" "fs/proc/base.c"; then
              sed -i '/#include <linux\/cpufreq_times.h>/a #include <linux\/dma-buf.h>' fs/proc/base.c
            fi
          fi

          # FIX: selinux/hooks.c extern conflict dari SUSFS patch
          # SUSFS patch menambahkan deklarasi extern yang sudah ada di hooks.c
          # sehingga compiler error "cannot combine with previous 'extern' declaration"
          # Solusi: hapus baris extern duplikat yang ditambahkan SUSFS
          if [ -f "security/selinux/hooks.c" ]; then
            # Cek apakah ada duplikat extern susfs declarations
            if grep -c "extern int susfs_" security/selinux/hooks.c 2>/dev/null | grep -q "^[2-9]"; then
              echo "   Fixing duplicate extern susfs declarations in selinux/hooks.c..."
              # Hapus semua extern susfs_ lines kecuali yang pertama dari setiap deklarasi
              awk '
                /extern int susfs_/ {
                  if (seen[$0]++) next
                }
                { print }
              ' security/selinux/hooks.c > /tmp/hooks_fixed.c \
                && mv /tmp/hooks_fixed.c security/selinux/hooks.c \
                && echo "   selinux/hooks.c deduplication done" \
                || echo "   ⚠️  selinux/hooks.c deduplication failed, continuing anyway"
            fi
          fi

          KSU_KERNEL="drivers/kernelsu"
          SUSFS_INTEGRATED=false
          if [ -d "$KSU_KERNEL" ]; then
            # Untuk KernelSU-Next branch dev, patch 10_enable_susfs_for_ksu.patch DARI susfs4ksu
            # MERUSAK core/init.c karena struktur kodenya udah beda jauh (bikin bootloop/compile error).
            # Solusi: Kita inject manual `susfs_init()` secara aman khusus untuk KernelSU-Next.
            if [ "$KSU_METHOD" = "kernelsu-next" ]; then
              echo "   KernelSU-Next detected. Manually injecting SUSFS hooks..."
              if [ -f "drivers/kernelsu/core/init.c" ]; then
                # Check if already injected (idempotent)
                if ! grep -q 'susfs_init' drivers/kernelsu/core/init.c; then
                  # Add include at top
                  sed -i '1i #include <linux/susfs.h>' drivers/kernelsu/core/init.c
                  # Safer injection: find the opening brace of kernelsu_init and add after it
                  sed -i '/int __init kernelsu_init(void)/,/{/ { /^{/a \
#ifdef CONFIG_KSU_SUSFS\
\tsusfs_init();\
#endif
                  }' drivers/kernelsu/core/init.c
                  echo "   ✅ susfs_init() injected into core/init.c"
                else
                  echo "   ℹ️  susfs_init() already present, skipping"
                fi
                git add -f drivers/kernelsu/core/init.c 2>/dev/null || true
              else
                echo "   ❌ drivers/kernelsu/core/init.c NOT FOUND!"
                find drivers/kernelsu/ -name 'init.c' 2>/dev/null || echo "   (no init.c found)"
              fi
            else
              # Untuk root method lain (KSU biasa), baru pakai patch standar
              KSU_PATCH="../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
              if [ -f "$KSU_PATCH" ]; then
                echo "Applying KernelSU SUSFS patch..."
                if grep -q "a/drivers/kernelsu/" "$KSU_PATCH"; then
                  echo "   Patch already uses drivers/kernelsu/ path, applying as-is"
                  git apply --3way "$KSU_PATCH" || patch -p1 --forward --fuzz=3 < "$KSU_PATCH" || true
                else
                  echo "   Rewriting patch path from kernel/ to drivers/kernelsu/"
                  sed 's|a/kernel/|a/drivers/kernelsu/|g; s|b/kernel/|b/drivers/kernelsu/|g' \
                    "$KSU_PATCH" > /tmp/susfs_ksu_fixed.patch
                  git apply --3way /tmp/susfs_ksu_fixed.patch || patch -p1 --forward --fuzz=3 < /tmp/susfs_ksu_fixed.patch || true
                fi
              fi
            fi

            if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
              printf '%s\n' \
                'menu "KernelSU - SUSFS"' \
                'config KSU_SUSFS' '  bool "KernelSU addon - SUSFS"' '  depends on KSU' '  default y' \
                'config KSU_SUSFS_SUS_PATH' '  bool "Hide suspicious paths"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_MOUNT' '  bool "Hide suspicious mounts"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_KSTAT' '  bool "Spoof kstat"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SPOOF_UNAME' '  bool "Spoof uname"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_ENABLE_LOG' '  bool "Enable logging"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS' '  bool "Hide symbols from kallsyms"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG' '  bool "Spoof cmdline/bootconfig"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_OPEN_REDIRECT' '  bool "Open redirect"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_MAP' '  bool "Hide mmapped files from proc maps"' '  depends on KSU_SUSFS' '  default y' \
                'endmenu' >> "$KSU_KERNEL/Kconfig"
            fi
            # SUSFS version info (DO NOT add ccflags here - Kconfig handles CONFIG_KSU_SUSFS)
            # DO NOT inject -DKSU_VERSION here - Kbuild computes it from git (symlink preserves .git)
            if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
              printf '%s\n' \
                '## SUSFS ##' \
                'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)' \
                '$(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E "^#define SUSFS_VERSION" | cut -d" " -f3 | sed "s/\"//g"))' \
                '$(info -- SUSFS_VERSION: $(SUSFS_VERSION))' \
                'else' \
                '$(info -- SUSFS not integrated)' \
                'endif' >> "$KSU_KERNEL/Makefile"
            fi
            git add "$KSU_KERNEL/Makefile" "$KSU_KERNEL/Kconfig" 2>/dev/null || true
            grep -q "config KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null && SUSFS_INTEGRATED=true
          fi
          echo "SUSFS_OK=$SUSFS_INTEGRATED" >> $GITHUB_ENV
          echo "✅ SUSFS_INTEGRATED status: $SUSFS_INTEGRATED"

          if [ "$SUSFS_INTEGRATED" = "true" ]; then
            [ ! -f "fs/susfs.c" ] && echo "❌ ERROR: fs/susfs.c not found!" && exit 1
            [ ! -f "include/linux/susfs.h" ] && echo "❌ ERROR: susfs.h not found!" && exit 1

            CRITICAL_REJ=$(find fs/ include/ -name "*.rej" -type f 2>/dev/null || true)
            if [ -n "$CRITICAL_REJ" ]; then
              echo "❌ ERROR: Critical SUSFS patch rejected in fs/ or include/:"
              for rej in $CRITICAL_REJ; do
                echo "=== $rej ===" && cat "$rej" && echo "==="
              done
              exit 1
            fi
            NON_CRIT_REJ=$(find . -name "*.rej" -type f 2>/dev/null || true)
            if [ -n "$NON_CRIT_REJ" ]; then
              echo "⚠️  Non-critical rejected hunks (build will continue):"
              for rej in $NON_CRIT_REJ; do echo "   - $rej"; done
              find . -name "*.rej" -delete 2>/dev/null || true
            fi
            echo "✅ SUSFS integration complete"
          fi

      - name: Apply Custom Patches
        run: |
          cd kernel/common
          if [ -d "$GITHUB_WORKSPACE/patches" ] && ls $GITHUB_WORKSPACE/patches/*.patch 1>/dev/null 2>&1; then
            for patch_file in $GITHUB_WORKSPACE/patches/*.patch; do
              echo "Applying $patch_file"
              patch -p1 --forward --no-backup-if-mismatch < "$patch_file" \
                || echo "  ⚠️ Patch failed or already applied (skipping)"
            done
          else
            echo "No custom patches found, skipping."
          fi

      - name: Configure Kernel
        run: |
          set -euo pipefail
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          SAFETY_PROFILE="${{ inputs.safety_profile }}"
          TUNING_PROFILE="${{ inputs.tuning_profile }}"

          add_cfg() {
            local cfg="$1"
            sed -i "/^${cfg%%=*}=.*/d" "$DEFCONFIG"
            echo "$cfg" >> "$DEFCONFIG"
          }

          echo "" >> "$DEFCONFIG"
          echo "# KernelSU + Dependencies" >> "$DEFCONFIG"
          add_cfg "CONFIG_KSU=y"
          # CRITICAL: KSU Kconfig has 'depends on KPROBES && EXT4_FS'
          # Without these, CONFIG_KSU silently becomes =n → no root → bootloop-like behavior
          add_cfg "CONFIG_KPROBES=y"
          add_cfg "CONFIG_HAVE_KPROBES=y"
          add_cfg "CONFIG_KPROBE_EVENTS=y"
          add_cfg "CONFIG_EXT4_FS=y"

          if [ "${{ inputs.with_susfs }}" == "true" ]; then
            if [ "$SUSFS_OK" = "true" ]; then
              echo "" >> $DEFCONFIG
              echo "# SUSFS" >> $DEFCONFIG
              for cfg in \
                CONFIG_KSU_SUSFS \
                CONFIG_SUSFS \
                CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT \
                CONFIG_KSU_SUSFS_SUS_MOUNT \
                CONFIG_KSU_SUSFS_SUS_MAP \
                CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
                CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
                CONFIG_KSU_SUSFS_SUS_KSTAT \
                CONFIG_KSU_SUSFS_TRY_UMOUNT \
                CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
                CONFIG_KSU_SUSFS_SPOOF_UNAME \
                CONFIG_KSU_SUSFS_ENABLE_LOG \
                CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
                CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
                CONFIG_KSU_SUSFS_OPEN_REDIRECT; do
                add_cfg "${cfg}=y"
              done
              if [ "$KERNEL_VERSION" = "6.6" ]; then
                add_cfg "CONFIG_KSU_SUSFS_SUS_PATH=n"
              else
                add_cfg "CONFIG_KSU_SUSFS_SUS_PATH=y"
              fi
              add_cfg "CONFIG_KSU_SUSFS_SUS_SU=n"
              echo "✅ SUSFS configs written to defconfig"
            else
              echo "❌ SUSFS integration failed - SUSFS_OK=$SUSFS_OK"
              exit 1
            fi
          fi

          echo "" >> "$DEFCONFIG"
          echo "# Module Compatibility" >> "$DEFCONFIG"
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"
          add_cfg "CONFIG_MODULE_SIG_ALL=n"

          echo "" >> "$DEFCONFIG"
          echo "# CPU Governor" >> "$DEFCONFIG"
          for gov in SCHEDUTIL PERFORMANCE ONDEMAND CONSERVATIVE USERSPACE POWERSAVE; do
            add_cfg "CONFIG_CPU_FREQ_GOV_${gov}=y"
          done
          GOV_UPPER=$(echo "$GOVERNOR" | tr '[:lower:]' '[:upper:]')
          add_cfg "CONFIG_CPU_FREQ_GOV_${GOV_UPPER}=y"
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_${GOV_UPPER}=y"

          # NOTE: Do NOT override ZRAM/ZSMALLOC here. GKI manages these as
          # modules. Forcing =y conflicts with vendor DLKM loading → bootloop.

          echo "" >> "$DEFCONFIG"
          echo "# Network Optimizations (Safe)" >> "$DEFCONFIG"
          add_cfg "CONFIG_TCP_CONG_ADVANCED=y"
          add_cfg "CONFIG_TCP_CONG_BBR=y"
          add_cfg 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          add_cfg "CONFIG_NET_SCH_FQ=y"
          add_cfg 'CONFIG_DEFAULT_NET_SCH="fq"'

          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          echo 'CONFIG_LOCALVERSION=""' >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG
          # NOTE: Do NOT set CONFIG_MODVERSIONS=n here!
          # Vendor DLKM modules (display, touch, camera) need MODVERSIONS
          # to load. Disabling it = modules fail to load = bootloop.
          git add arch/arm64/configs/gki_defconfig
          echo "✅ Defconfig finalized and added to git"

      - name: Patch Build System
        run: |
          cd kernel/common

           if [ -f "BUILD.bazel" ]; then
            sed -i \
              -e '/check_defconfig/d' \
              -e 's/kmi_symbol_list_strict_mode = .*/kmi_symbol_list_strict_mode = False,/g' \
              -e 's/trim_nonlisted_kmi = .*/trim_nonlisted_kmi = False,/g' \
              BUILD.bazel
            git add BUILD.bazel
            echo "✅ BUILD.bazel patched and added to git"
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ]; then
              sed -i '/check_defconfig/d' "$f"
              git add "$f"
            fi
          done
          if [ -f "build.config.gki.aarch64" ]; then
            sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' build.config.gki.aarch64
            git add build.config.gki.aarch64
          fi
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] \
            && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' \
              "../build/kernel/abi/check_buildtime_symbol_protection.py"
          [ -f "../build/kernel/kleaf/impl/stamp.bzl" ] \
            && sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
              ../build/kernel/kleaf/impl/stamp.bzl \
            && git add ../build/kernel/kleaf/impl/stamp.bzl 2>/dev/null || true
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          git add scripts/setlocalversion 2>/dev/null || true
          : > .scmversion
          git add .scmversion 2>/dev/null || true

      - name: Build Kernel (Bazel)
        if: inputs.clang_toolchain == 'bazel-default' || inputs.clang_toolchain == ''
        run: |
          set -euo pipefail
          cd kernel
          mkdir -p $GITHUB_WORKSPACE/dist
          tools/bazel run \
            --disk_cache=/home/runner/.cache/bazel \
            --lto=none \
            --local_resources=memory=6144 \
            --jobs=3 \
            //common:kernel_aarch64_dist -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 | tee build.log
          echo "TOOLCHAIN_NAME=Bazel" >> $GITHUB_ENV
          echo "TOOLCHAIN_VER=AOSP Clang (Kleaf Default)" >> $GITHUB_ENV
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Build Kernel (Custom Toolchain)
        if: inputs.clang_toolchain != 'bazel-default' && inputs.clang_toolchain != ''
        run: |
          set -euo pipefail
          cd kernel/common
          if [ -z "${CUSTOM_CLANG_PATH:-}" ]; then
            echo "❌ ERROR: CUSTOM_CLANG_PATH not set!"
            exit 1
          fi
          if [ ! -f "$CUSTOM_CLANG_PATH/bin/clang" ]; then
            echo "❌ ERROR: clang binary not found in $CUSTOM_CLANG_PATH/bin/"
            ls -la "$CUSTOM_CLANG_PATH/bin/" || true
            exit 1
          fi
          export PATH="$CUSTOM_CLANG_PATH/bin:$PATH"
          which clang || { echo "❌ clang not in PATH!"; exit 1; }
          clang --version

          MAKE_ARGS="O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTLDFLAGS=-fuse-ld=bfd"

          make $MAKE_ARGS gki_defconfig
          make -j$(nproc) $MAKE_ARGS 2>&1 | tee ../build.log
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          set -euo pipefail
          mkdir -p $GITHUB_WORKSPACE/dist
          if [ "${{ inputs.clang_toolchain }}" = "bazel-default" ] || [ -z "${{ inputs.clang_toolchain }}" ]; then
            cd kernel
            for artifact in Image Image.gz Image.lz4; do
              if [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ]; then
                if [ -f "bazel-bin/common/kernel_aarch64/$artifact" ]; then
                  cp -v "bazel-bin/common/kernel_aarch64/$artifact" "$GITHUB_WORKSPACE/dist/" || true
                fi
              fi
            done
          else
            for img in \
              kernel/common/out/arch/arm64/boot/Image \
              kernel/common/out/arch/arm64/boot/Image.gz \
              kernel/common/out/arch/arm64/boot/Image.lz4; do
              [ -f "$img" ] && cp -v "$img" "$GITHUB_WORKSPACE/dist/" || true
            done
          fi
          echo "📦 dist/ contents:"
          ls -lah $GITHUB_WORKSPACE/dist/ || true

      - name: Verify Build
        run: |
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" 2>/dev/null | cut -f1 || echo "?")
              echo "✅ Found: $f ($SIZE)"
              HAS_IMAGE=true
            fi
          done
          if [ "$HAS_IMAGE" = "false" ]; then
            echo "❌ No kernel image found in dist/!"
            ls -lah dist/ || echo "  (empty or missing)"
            exit 1
          fi
          echo "✅ Verify Build passed."

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gki-debug-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}-${{ inputs.clang_toolchain }}
          path: |
            kernel/build.log
            kernel/common/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
            dist/Image*
          if-no-files-found: warn
          retention-days: 7

      - name: Package AnyKernel3
        run: |
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          # Ambil TOOLCHAIN_NAME dari env yang sudah di-set di step Build
          TOOLCHAIN_SHORT="${{ env.TOOLCHAIN_NAME }}"
          # Fallback kalau kosong
          [ -z "$TOOLCHAIN_SHORT" ] && TOOLCHAIN_SHORT="Bazel"

          # SUSFS: hanya sebut kalau memang ada SUSFS, non-SUSFS tidak perlu label
          SUSFS_STR=""
          if [ "${{ inputs.with_susfs }}" == "true" ]; then
            SUSFS_STR="-SUSFS"
          fi

          # Nama file: {CustomName}-{Toolchain}[-SUSFS]-{DDMMYYYY}
          # Nanti otomatis ditambah suffix -AnyKernel3.zip di command zip
          BUILD_DATE=$(date -u '+%d%m%Y')
          BASE_NAME="${CUSTOM_NAME}-${TOOLCHAIN_SHORT}${SUSFS_STR}-${BUILD_DATE}"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3

          # kernel.string: nama kernel yang muncul di kernel manager app
          # Format: {KernelName}-{CustomName}-v{Build} [info] by {Developer}
          if [ "${{ inputs.with_susfs }}" == "true" ]; then
            KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | SUSFS | ${GOVERNOR} | ${TOOLCHAIN_SHORT}] by ${AUTHOR}"
          else
            KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | ${GOVERNOR} | ${TOOLCHAIN_SHORT}] by ${AUTHOR}"
          fi

          printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' \
            'properties() {' \
            "kernel.string=${KERNEL_STRING}" \
            'do.devicecheck=1' \
            'do.modules=0' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=fire' \
            'device.name2=Redmi 12' \
            'supported.versions=15' \
            'supported.patchlevels=' \
            '}' \
            '' \
            'block=boot;' \
            'is_slot_device=auto;' \
            'ramdisk_compression=auto;' \
            'patch_vbmeta_flag=0;' \
            '' \
            '. tools/ak3-core.sh;' \
            'dump_boot;' \
            'write_boot;' > anykernel.sh

          SELECTED_IMG=""
          # Prioritaskan Image (raw) atau Image.lz4 untuk GKI agar tidak bootloop
          # Image.gz seringkali tidak didukung bootloader GKI tertentu
          for img in \
            "$GITHUB_WORKSPACE/dist/Image" \
            "$GITHUB_WORKSPACE/dist/Image.lz4" \
            "$GITHUB_WORKSPACE/dist/Image.gz"; do
            if [ -f "$img" ]; then
              cp "$img" .
              SELECTED_IMG=$(basename "$img")
              echo "✅ Using kernel image: $SELECTED_IMG"
              break
            fi
          done
          [ -z "$SELECTED_IMG" ] && echo "❌ No kernel image found!" && exit 1

          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "✅ Package created: ${BASE_NAME}-AnyKernel3.zip"

      - name: Get Build Timestamp
        run: echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          # Nama harus unik per job dalam satu workflow run.
          # Sertakan semua dimensi matrix agar tidak conflict saat parallel matrix jobs (error 409).
          name: "Castorice-GKI-6.6-${{ inputs.with_susfs == 'true' && 'SUSFS-' || '' }}${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}-${{ inputs.clang_toolchain }}"
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 30

      # FIX: Hapus "append_body: false" — bukan key valid di softprops/action-gh-release@v2.
      # Gunakan "make_latest: false" untuk kontrol release ordering saja jika diperlukan.
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Castorice Kernel ${{ inputs.release_tag }}"
          body: |
            ### 📦 Castorice-${{ inputs.custom_name }}
            - **Type:** GKI 6.6 ${{ inputs.with_susfs == 'true' && '+ SUSFS' || '(No SUSFS)' }}
            - **Root:** ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }}
            - **Governor:** ${{ inputs.cpu_governor }}
            - **KMI:** ${{ env.KMI_GENERATION }}
            - **Toolchain:** ${{ inputs.clang_toolchain }}
              - *${{ env.TOOLCHAIN_VER }}*
            - **Built:** ${{ env.BUILD_TIME }} (run #${{ github.run_number }})

            ---
            > ⚠️ **Wajib flash vbmeta dulu sebelum install kernel ini!**
            > ```
            > fastboot --disable-verity --disable-verification flash vbmeta vbmeta.img
            > fastboot --disable-verity --disable-verification flash vbmeta_system vbmeta_system.img
            > fastboot --disable-verity --disable-verification flash vbmeta_vendor vbmeta_vendor.img
            > ```
            > Ambil file `.img` dari ROM HyperOS 2 Fastboot yang sesuai versi lo.
          files: dist/*.zip
          draft: false
          prerelease: false

      - name: Notify Telegram on Failure
        if: failure()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set. Skipping failure notification."
            exit 0
          fi

          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUSFS_LABEL="No"
          [ "${{ inputs.with_susfs }}" = "true" ] && SUSFS_LABEL="Yes"

          # ── 1. Kumpulkan error log ───────────────────────────────────────
          ERROR_LOG="/tmp/castorice_error.log"
          : > "$ERROR_LOG"

          for log_candidate in \
            "kernel/build.log" \
            "kernel/common/build.log"; do
            if [ -f "$log_candidate" ]; then
              echo "=== $(basename $log_candidate) — filtered errors ===" >> "$ERROR_LOG"
              grep -iE "error:|fatal:|undefined reference|cannot find|No such file|failed|❌" \
                "$log_candidate" | tail -60 >> "$ERROR_LOG" 2>/dev/null || true
              echo "" >> "$ERROR_LOG"
              echo "--- raw tail (last 80 lines) ---" >> "$ERROR_LOG"
              tail -80 "$log_candidate" >> "$ERROR_LOG" 2>/dev/null || true
              echo "" >> "$ERROR_LOG"
            fi
          done

          # Tangkap .rej file (SUSFS/patch failure)
          REJ_FILES=$(find kernel/common -name "*.rej" 2>/dev/null | head -5)
          if [ -n "$REJ_FILES" ]; then
            echo "=== REJECTED PATCH HUNKS ===" >> "$ERROR_LOG"
            for rej in $REJ_FILES; do
              echo "--- $rej ---" >> "$ERROR_LOG"
              cat "$rej" >> "$ERROR_LOG"
              echo "" >> "$ERROR_LOG"
            done
          fi

          # Fallback kalau log kosong (error di pre-build step)
          if [ ! -s "$ERROR_LOG" ]; then
            printf "No build.log found.\nError likely in a pre-build step (git clone / toolchain / SUSFS).\nCheck GitHub Actions:\n%s\n" \
              "$ACTIONS_URL" > "$ERROR_LOG"
          fi

          LOG_LINES=$(wc -l < "$ERROR_LOG")
          LOG_BYTES=$(du -b "$ERROR_LOG" 2>/dev/null | cut -f1 || echo "0")

          # ── 2. Header notif (sendMessage) ───────────────────────────────
          HEADER=$(printf \
            '<b>❌ Castorice Kernel — Build FAILED</b>\n\n'\
            '<b>Kernel Name:</b> ${{ inputs.custom_name }}\n'\
            '<b>Version:</b> v${{ github.run_number }}\n'\
            '<b>Developer:</b> ${{ inputs.author_name }}\n'\
            '<b>Root:</b> ${{ inputs.ksu_method }}\n'\
            '<b>Governor:</b> ${{ inputs.cpu_governor }}\n'\
            '<b>SUSFS:</b> %s\n'\
            '<b>Toolchain:</b> ${{ inputs.clang_toolchain }}\n'\
            '<b>Triggered by:</b> ${{ github.actor }}\n\n'\
            '<a href="%s">🔍 Full log di GitHub Actions</a>\n\n'\
            '<i>⬇️ Error log dikirim sebagai file di bawah</i>' \
            "$SUSFS_LABEL" "$ACTIONS_URL")

          curl -s -X POST "${TG_API}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "text=${HEADER}" \
            --form-string "parse_mode=HTML" \
            && echo "✅ Header notification sent" \
            || echo "⚠️  Header notification failed"

          # ── 3. Upload error log sebagai file .txt ───────────────────────
          LOG_DATE=$(date -u '+%d%m%Y')
          LOG_FILENAME="error-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}-${{ inputs.clang_toolchain }}-${LOG_DATE}.log"
          cp "$ERROR_LOG" "/tmp/${LOG_FILENAME}"

          echo "📤 Uploading error log (${LOG_LINES} lines, ${LOG_BYTES} bytes)..."
          HTTP_CODE=$(curl -s -o /tmp/tg_log_resp.json -w "%{http_code}" \
            -X POST "${TG_API}/sendDocument" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            -F "document=@/tmp/${LOG_FILENAME};filename=${LOG_FILENAME}" \
            --form-string "caption=📋 Error log — ${{ inputs.ksu_method }} / ${{ inputs.cpu_governor }} / ${{ inputs.clang_toolchain }}" \
            --form-string "parse_mode=HTML" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Error log uploaded to Telegram"
          else
            echo "⚠️  Log upload failed (HTTP $HTTP_CODE)"
            cat /tmp/tg_log_resp.json || true

            # Fallback: paste 30 baris terakhir sebagai <pre> block
            SNIPPET=$(tail -30 "$ERROR_LOG" | head -c 3500)
            FALLBACK=$(printf '<b>📋 Error snippet (last 30 lines):</b>\n<pre>%s</pre>' "$SNIPPET")
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              --form-string "text=${FALLBACK}" \
              --form-string "parse_mode=HTML" \
              && echo "✅ Fallback snippet sent" \
              || echo "⚠️  Fallback snippet also failed (non-fatal)"
          fi

      - name: Send to Telegram
        if: success()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set. Skipping."
            exit 0
          fi

          ZIP_FILE=$(ls dist/*.zip 2>/dev/null | head -n 1)
          [ -z "$ZIP_FILE" ] && echo "No zip found." && exit 0

          ZIP_NAME=$(basename "$ZIP_FILE")
          # du -b = ukuran dalam bytes (portable, tanpa --apparent-size)
          ZIP_BYTES=$(du -b "$ZIP_FILE" 2>/dev/null | cut -f1 || echo "0")
          ZIP_SIZE=$(du -h "$ZIP_FILE" 2>/dev/null | cut -f1 || echo "?")

          SUSFS_LABEL="No"
          [ "${{ inputs.with_susfs }}" = "true" ] && SUSFS_LABEL="Yes"

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}"

          # Telegram sendDocument limit: 50MB (52428800 bytes)
          TG_LIMIT=52428800

          # Caption pakai HTML parse_mode agar rapi di Telegram
          # Telegram caption max 1024 chars — jaga tetap ringkas
          CAPTION=$(printf '<b>🔧 Castorice Kernel — Build Done</b>\n\n<b>Kernel Name:</b> ${{ inputs.custom_name }}\n<b>Version:</b> v${{ github.run_number }}\n<b>Developer:</b> ${{ inputs.author_name }}\n<b>Type:</b> GKI 6.6\n<b>Root:</b> ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }}\n<b>Governor:</b> ${{ inputs.cpu_governor }}\n<b>SUSFS:</b> %s\n<b>KMI:</b> ${{ env.KMI_GENERATION }}\n<b>Toolchain:</b> ${{ inputs.clang_toolchain }}\n  └ <i>${{ env.TOOLCHAIN_VER }}</i>\n<b>Size:</b> %s\n\n<a href="%s">📦 GitHub Release</a>' \
            "$SUSFS_LABEL" "$ZIP_SIZE" "$RELEASE_URL")

          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"

          if [ "$ZIP_BYTES" -le "$TG_LIMIT" ]; then
            echo "📤 Uploading zip directly to Telegram ($ZIP_SIZE)..."
            # sendDocument: upload file + caption sekaligus
            # --form multipart diperlukan untuk binary upload
            HTTP_CODE=$(curl -s -o /tmp/tg_response.json -w "%{http_code}" \
              -X POST "${TG_API}/sendDocument" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              -F "document=@${ZIP_FILE};filename=${ZIP_NAME}" \
              --form-string "caption=${CAPTION}" \
              --form-string "parse_mode=HTML" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ File uploaded to Telegram successfully"
            else
              echo "⚠️  Upload failed (HTTP $HTTP_CODE), falling back to text notification"
              cat /tmp/tg_response.json || true

              # Fallback: kirim teks + link saja
              curl -s -X POST "${TG_API}/sendMessage" \
                --form-string "chat_id=${TG_CHAT_ID}" \
                --form-string "text=${CAPTION}" \
                --form-string "parse_mode=HTML" \
                && echo "✅ Fallback text notification sent" \
                || echo "⚠️  Fallback text notification also failed (non-fatal)"
            fi
          else
            echo "⚠️  Zip size ($ZIP_SIZE) exceeds Telegram 50MB limit — sending link only"
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              --form-string "text=${CAPTION}" \
              --form-string "parse_mode=HTML" \
              && echo "✅ Text notification sent (file too large to upload)" \
              || echo "⚠️  Text notification failed (non-fatal)"
          fi