name: "Core GKI Build Workflow"

on:
  workflow_call:
    inputs:
      with_susfs:
        required: true
        type: string
        default: 'false'
      custom_name:
        required: true
        type: string
        default: 'Epitaph'
      author_name:
        required: true
        type: string
        default: 'Naidrahiqa'
      ksu_method:
        required: true
        type: string
        default: 'kernelsu-next'
      clang_toolchain:
        required: true
        type: string
        default: 'bazel-default'
      release_tag:
        required: true
        type: string
        default: 'v1.0'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: ""
  KSU_VERSION: ""
  SUSFS_OK: "false"
  ZIP_NAME: ""
  TOOLCHAIN_NAME: ""
  TOOLCHAIN_VER: ""
  BUILD_TIME: ""

jobs:
  build:
    name: "Build GKI ${{ inputs.with_susfs == 'true' && '+ SUSFS' || 'No SUSFS' }} (${{ inputs.clang_toolchain }})"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug Inputs
        run: |
          echo "=== WORKFLOW INPUTS ==="
          echo "with_susfs:      '${{ inputs.with_susfs }}'"
          echo "custom_name:     '${{ inputs.custom_name }}'"
          echo "ksu_method:      '${{ inputs.ksu_method }}'"
          echo "cpu_governor:    'schedutil'"
          echo "clang_toolchain: '${{ inputs.clang_toolchain }}'"
          echo "release_tag:     '${{ inputs.release_tag }}'"
          echo "========================"

      - name: Initialize Environment
        run: |
          # Toolchain Short Name
          TC_NAME="${{ inputs.clang_toolchain }}"
          if [ "$TC_NAME" = "bazel-default" ] || [ -z "$TC_NAME" ]; then
            TC_NAME="Bazel"
          elif [ "$TC_NAME" = "zyc-latest" ]; then
            TC_NAME="ZyClang"
          elif [ "$TC_NAME" = "aosp-latest" ]; then
            TC_NAME="AOSPClang"
          elif [ "$TC_NAME" = "weebx-latest" ]; then
            TC_NAME="WeebXClang"
          elif [ "$TC_NAME" = "neutron-latest" ]; then
            TC_NAME="NeutronClang"
          fi
          echo "TOOLCHAIN_NAME=${TC_NAME}" >> $GITHUB_ENV
          
          # SUSFS Suffix
          SUSFS_LABEL=""
          [ "${{ inputs.with_susfs }}" = "true" ] && SUSFS_LABEL="-SUSFS"
          
          # Build Date
          BUILD_DATE=$(date -u '+%d%m%Y')
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          
          # Base Filename: {CustomName}-{Toolchain}-{Root}-{Governor}[-SUSFS]-{Date}
          BASE_NAME="${{ inputs.custom_name }}-${TC_NAME}-${{ inputs.ksu_method }}-schedutil${SUSFS_LABEL}-${BUILD_DATE}"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV
          echo "✅ Environment initialized: ${BASE_NAME}"

      # FIX 4: Cache key pakai hashFiles bukan github.sha
      # github.sha berubah setiap commit → cache NEVER HIT.
      # hashFiles patches + workflow = cache invalidate hanya saat config berubah.
      - name: Restore Bazel Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: gki-bazel-${{ inputs.ksu_method }}-${{ inputs.clang_toolchain }}-${{ hashFiles('patches/**', '.github/workflows/_build_kernel_core.yml') }}
          restore-keys: |
            gki-bazel-${{ inputs.ksu_method }}-${{ inputs.clang_toolchain }}-
            gki-bazel-${{ inputs.ksu_method }}-
            gki-bazel-

      - name: Maximize Disk Space
        run: |
          df -h
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/share/miniconda \
            /usr/local/share/chromium /usr/local/share/powershell \
            /usr/local/bin/aliyun /usr/local/bin/azcopy /usr/local/bin/cmake-gui
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox \
            powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h /

      - name: Setup Swap (16GB)
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile \
            || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio \
            kmod rsync lz4 jq patch binutils libncurses-dev \
            pkg-config ninja-build zstd aria2 p7zip-full \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Download Custom Toolchain
        if: inputs.clang_toolchain != 'bazel-default' && inputs.clang_toolchain != ''
        run: |
          set -euo pipefail
          mkdir -p prebuilts/clang/host/linux-x86
          cd prebuilts/clang/host/linux-x86
          TOOLCHAIN="${{ inputs.clang_toolchain }}"

          smart_extract() {
            local archive="$1" dest="$2"
            mkdir -p "$dest"
            echo "  → Attempt 1: Extracting with --strip-components=1..."
            tar -xf "$archive" -C "$dest" --strip-components=1 2>/dev/null
            if [ -f "$dest/bin/clang" ] || [ -L "$dest/bin/clang" ]; then
              echo "  ✅ Found bin/clang after strip (nested archive)"
              rm -f "$archive"; return 0
            fi
            echo "  → Attempt 1 failed. Trying flat extraction..."
            rm -rf "$dest"/*
            tar -xf "$archive" -C "$dest" 2>/dev/null
            if [ -f "$dest/bin/clang" ] || [ -L "$dest/bin/clang" ]; then
              echo "  ✅ Found bin/clang (flat archive)"
              rm -f "$archive"; return 0
            fi
            echo "  → Attempt 2 failed. Searching for clang binary..."
            local found_clang=$(find "$dest" -name "clang" -type f -o -name "clang" -type l | head -n1)
            if [ -n "$found_clang" ]; then
              local found_dir=$(dirname "$(dirname "$found_clang")")
              echo "  → Found clang at: $found_clang"
              if [ "$found_dir" != "$dest" ]; then
                local tmpdir=$(mktemp -d)
                mv "$found_dir"/* "$tmpdir/"
                rm -rf "$dest"/*
                mv "$tmpdir"/* "$dest/"
                rm -rf "$tmpdir"
              fi
              echo "  ✅ Restructured successfully"
              rm -f "$archive"; return 0
            fi
            echo "  ❌ ERROR: Could not find clang binary in archive!"
            tar -tf "$archive" 2>/dev/null | head -30 || true
            rm -f "$archive"; return 1
          }

          case "$TOOLCHAIN" in
            zyc-latest)
              echo "📥 Downloading ZyClang..."
              ZYASSET_URL=$(curl -sL \
                "https://api.github.com/repos/ZyCromerZ/Clang/releases/latest" \
                | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url' \
                | head -n1)
              [ -z "$ZYASSET_URL" ] && echo "ERROR: Failed to get ZyClang URL" && exit 1
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$ZYASSET_URL"
              smart_extract clang.tar.gz clang-zyc
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-zyc"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              ;;
            aosp-latest)
              git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r522817.git clang-aosp
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-aosp"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=AOSPClang" >> $GITHUB_ENV
              ;;
            weebx-latest)
              WEEBX_URL=$(curl -s https://api.github.com/repos/XSans0/WeebX-Clang/releases/latest | jq -r '.assets[] | select(.name | contains("WeebX-Clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$WEEBX_URL"
              smart_extract clang.tar.gz clang-weebx
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-weebx"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=WeebXClang" >> $GITHUB_ENV
              ;;
            neutron-latest)
              NEUTRON_ASSET=$(curl -sL https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$NEUTRON_ASSET"
              smart_extract clang.tar.gz clang-neutron
              CLANG_PATH="$GITHUB_WORKSPACE/prebuilts/clang/host/linux-x86/clang-neutron"
              echo "CUSTOM_CLANG_PATH=$CLANG_PATH" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              ;;
            *)
              echo "❌ ERROR: Unknown toolchain: $TOOLCHAIN"
              exit 1
              ;;
          esac

          if [ ! -f "$CLANG_PATH/bin/clang" ]; then
            echo "❌ ERROR: clang binary not found at $CLANG_PATH/bin/clang"
            find "$CLANG_PATH" -name "clang*" | head -n 10 || true
            exit 1
          fi
          echo "✅ Custom toolchain ready: $TOOLCHAIN"
          $CLANG_PATH/bin/clang --version | head -n1
          CLANG_VER=$($CLANG_PATH/bin/clang --version | head -n1 | sed 's/ (http.*//g' | awk '{$1=$1};1')
          echo "TOOLCHAIN_VER=$CLANG_VER" >> $GITHUB_ENV
          cd $GITHUB_WORKSPACE

      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1

          # FIX 6: Retry loop untuk repo sync
          # Network flakes di GitHub Actions runner sering bikin sync gagal.
          # 3x retry dengan 30s delay = lebih reliable.
          SYNC_OK=false
          for attempt in 1 2 3; do
            echo "repo sync attempt $attempt/3..."
            if repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync; then
              SYNC_OK=true
              break
            fi
            echo "⚠️ Sync failed, retrying in 30s..."
            sleep 30
          done
          [ "$SYNC_OK" = "false" ] && echo "❌ repo sync gagal setelah 3 percobaan" && exit 1
          cd common

          # NOTE: Tidak lagi lock ke commit 33c1ba9ffede (6.6.58).
          # Build 30 April (6.6.129) yang BOOTING pakai tip of branch.
          # Version lock ke 6.6.58 terbukti bootloop di semua build Mei 2026.
          # Biarkan repo sync ambil HEAD dari branch common-android15-6.6.
          KERNEL_COMMIT=$(git log --oneline -1)
          echo "✅ Using tip of branch ($KERNEL_COMMIT)"
          echo "KERNEL_COMMIT=$KERNEL_COMMIT" >> $GITHUB_ENV

          make kernelversion

      - name: Set KMI Generation
        run: |
          set -euo pipefail
          cd kernel/common

          DETECTED_KMI=""
          if [ -f "build.config.common" ]; then
            DETECTED_KMI=$(grep -oP '(?<=KMI_GENERATION=)\d+' build.config.common | head -n1)
          fi
          if [ -z "$DETECTED_KMI" ] && [ -f "build.config.gki" ]; then
            DETECTED_KMI=$(grep -oP '(?<=KMI_GENERATION=)\d+' build.config.gki | head -n1)
          fi
          if [ -z "$DETECTED_KMI" ]; then
            STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
            if [ -f "$STAMP_FILE" ]; then
              DETECTED_KMI=$(grep -oP '(?<=kmi_generation = ")\d+' "$STAMP_FILE" | head -n1)
            fi
          fi
          if [ -z "$DETECTED_KMI" ]; then
            echo "⚠️  WARNING: Could not detect KMI_GENERATION from source, falling back to 8"
            DETECTED_KMI="8"
          fi

          echo "✅ KMI_GENERATION detected: $DETECTED_KMI"
          echo "KMI_GENERATION=$DETECTED_KMI" >> $GITHUB_ENV

          if [ -f "build.config.common" ]; then
            if grep -q "KMI_GENERATION" build.config.common; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${DETECTED_KMI}/" build.config.common
            else
              echo "KMI_GENERATION=${DETECTED_KMI}" >> build.config.common
            fi
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" \
              && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${DETECTED_KMI}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" \
            && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${DETECTED_KMI}\"/" "$STAMP_FILE" || true

          if [ -f "build.config.common" ] && ! grep -q "KMI_GENERATION=${DETECTED_KMI}" build.config.common; then
            echo "❌ ERROR: KMI_GENERATION not set correctly!"
            exit 1
          fi
          echo "✅ KMI_GENERATION=$DETECTED_KMI applied to all config files"

      # FIX UTAMA: Clone KernelSU-Next menggunakan default branch.
      # Solusi terbaik: jangan hardcode branch karena rawan perubahan (main/stable/next).
      # Struktur repo: folder driver ada di KernelSU-Next/kernel/ (bukan root).
      # KSU_VERSION diambil dari Makefile kernel driver, bukan rev-list seluruh repo
      # (rev-list seluruh repo menghitung commit manager+userspace juga → angka salah).
      - name: Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          set -euo pipefail
          cd kernel

          KSU_METHOD="${{ inputs.ksu_method }}"
          echo "Installing KSU variant: $KSU_METHOD"

          if [ "$KSU_METHOD" = "kernelsu-next" ]; then
            # CRITICAL: Clone full repo (NOT --depth=1) so we can compute
            # KSU_VERSION via git rev-list before copying.
            echo "Cloning KernelSU-Next (full history for version calc)..."
            git clone \
              https://github.com/KernelSU-Next/KernelSU-Next.git \
              -b dev \
              KernelSU-Next

            if [ ! -d "KernelSU-Next/kernel" ]; then
              echo "❌ ERROR: KernelSU-Next/kernel/ directory not found!"
              ls -la KernelSU-Next/ | head -30
              exit 1
            fi

            # Calculate KSU_VERSION BEFORE copying (we need .git access)
            GIT_COUNT=$(cd KernelSU-Next && git rev-list --count HEAD 2>/dev/null || echo "0")
            if [ "$GIT_COUNT" -gt 1 ]; then
              KSU_VERSION=$((30000 + GIT_COUNT))
            else
              KSU_VERSION="30000"
            fi
            KSU_TAG=$(cd KernelSU-Next && git describe --abbrev=0 --tags 2>/dev/null || echo "v${KSU_VERSION}")

            # CRITICAL FIX: Use COPY, not symlink!
            # Bazel sandbox isolates the build — symlinks to paths outside the
            # sandbox tree are NOT followed. This caused:
            #   - KSU_GIT_VERSION not defined (git not visible → version=1 → bootloop)
            #   - Source files invisible to sandbox in some cases
            # Since copy loses .git, we inject version via ccflags below.
            echo "Copying KernelSU-Next/kernel to common/drivers/kernelsu..."
            rm -rf common/drivers/kernelsu
            cp -r KernelSU-Next/kernel common/drivers/kernelsu
            cp -r KernelSU-Next/uapi common/drivers/kernelsu/uapi 2>/dev/null || true

            # Verify copy succeeded
            if [ ! -f "common/drivers/kernelsu/Kconfig" ]; then
              echo "❌ ERROR: KernelSU driver files not found after copy!"
              ls -la common/drivers/kernelsu/ || true
              exit 1
            fi

            # CRITICAL FIX: Hardcode KSU version + enforce via header override.
            # Bazel sandbox cannot access .git → falls back to KSU_VERSION=1.
            # Our ccflags injection conflicts with Bazel's fallback → -Werror kills build.
            # Solution:
            #   1. Hardcode $(shell git ...) in Kbuild to silence Kbuild's own warnings
            #   2. Create ksu_version.h with #undef+#define, included via -include flag
            #      -include is processed AFTER command line -D flags → our values win
            KBUILD_FILE="common/drivers/kernelsu/Kbuild"
            if [ -f "$KBUILD_FILE" ]; then
              # Remove old injection if present from previous runs
              sed -i '/# Injected by CI/d' "$KBUILD_FILE"
              sed -i '/ccflags-y += -UKSU_VERSION/d' "$KBUILD_FILE"

              # Hardcode git rev-list result (fixes Kbuild's own warnings)
              sed -i "s#\$(shell git rev-list --count HEAD 2>/dev/null || echo 0)#${GIT_COUNT}#g" "$KBUILD_FILE"
              sed -i "s#\$(shell git rev-list --count HEAD)#${GIT_COUNT}#g" "$KBUILD_FILE"

              # Hardcode git describe result
              sed -i "s#\$(shell git describe --abbrev=0 --tags 2>/dev/null || echo \"v\$(KSU_VERSION)\")#\"${KSU_TAG}\"#g" "$KBUILD_FILE"
              sed -i "s#\$(shell git describe --abbrev=0 --tags)#\"${KSU_TAG}\"#g" "$KBUILD_FILE"

              # Create version header that overrides ALL command line definitions
              # -include processes this AFTER command line -D flags, so #undef+#define wins
              printf '#undef KSU_VERSION\n#define KSU_VERSION %s\n#undef KSU_VERSION_TAG\n#define KSU_VERSION_TAG "%s"\n' \
                "${KSU_VERSION}" "${KSU_TAG}" > common/drivers/kernelsu/ksu_version.h

              # Add -include flag + suppress macro-redefined warnings
              sed -i "1i ccflags-y += -Wno-macro-redefined -include \$(srctree)/drivers/kernelsu/ksu_version.h" "$KBUILD_FILE"

              echo "✅ KSU_VERSION=${KSU_VERSION} enforced via ksu_version.h (overrides Bazel fallback)"
            else
              echo "⚠️  Kbuild not found, version hardcoding skipped"
            fi

            # Daftarkan ke drivers/Makefile
            if ! grep -q 'CONFIG_KSU' common/drivers/Makefile; then
              echo 'obj-$(CONFIG_KSU) += kernelsu/' >> common/drivers/Makefile
              echo "   Added KSU to drivers/Makefile"
            fi

            # Daftarkan ke drivers/Kconfig
            if ! grep -q 'kernelsu/Kconfig' common/drivers/Kconfig; then
              sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' common/drivers/Kconfig
              echo "   Added KSU Kconfig to drivers/Kconfig"
            fi

            # git add for Bazel — all files must be tracked
            cd common
            git add -f drivers/Makefile drivers/Kconfig
            git add -f drivers/kernelsu/ 2>/dev/null || true
            cd ..

            echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
            echo "KSU_METHOD=${KSU_METHOD}" >> $GITHUB_ENV
            echo "✅ KernelSU-Next integrated (version: $KSU_VERSION, tag: $KSU_TAG, commits: $GIT_COUNT)"
          else
            echo "❌ ERROR: Unsupported KSU method: $KSU_METHOD"
            exit 1
          fi

      # FIX 1: Re-enable SUSFS step — was hardcoded `if: false` for testing.
      # Sekarang mengikuti input `with_susfs` dari matrix dispatcher.
      # SUSFS sering error compile karena patch gagal apply tapi build lanjut.
      # Fix: patch application sekarang MANDATORY — kalau gagal, exit langsung.
      - name: Setup SUSFS
        if: inputs.with_susfs == 'true'
        run: |
          set -euo pipefail
          cd kernel

          echo "📥 Cloning SUSFS4KSU..."
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} \
            || { echo "❌ ERROR: SUSFS branch gki-${ANDROID_VERSION}-${KERNEL_VERSION} not found!"; exit 1; }

          cd common

          # ─── Step 1: Apply kernel patch FIRST (before copying files) ─────
          # Kalau patch gagal, kernel code gak ke-patch → compile error nanti.
          # Jadi kita apply dulu, baru copy files kalau patch sukses.
          echo "🔧 Applying SUSFS kernel patch..."
          SUSFS_PATCH_APPLIED=false

          # Try exact version match first
          for patch in \
            "../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-${ANDROID_VERSION}-${KERNEL_VERSION}.patch" \
            "../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${ANDROID_VERSION}-${KERNEL_VERSION}.patch" \
            "../susfs4ksu/kernel_patches/AnyKernel3/patches/${KERNEL_VERSION}/50_add_susfs_in_kernel.patch"; do
            if [ -f "$patch" ]; then
              echo "  → Trying: $(basename $patch)"
              if git apply --check "$patch" 2>/dev/null; then
                git apply "$patch" && echo "  ✅ git apply success" && SUSFS_PATCH_APPLIED=true && break
              else
                echo "  ⚠️ git apply --check failed, trying patch --forward --fuzz=3..."
                if patch -p1 --forward --fuzz=3 --dry-run < "$patch" >/dev/null 2>&1; then
                  patch -p1 --forward --fuzz=3 < "$patch" && echo "  ✅ patch success" && SUSFS_PATCH_APPLIED=true && break
                else
                  echo "  ❌ Patch does not apply cleanly to this kernel version"
                fi
              fi
            fi
          done

          # Fallback: try any SUSFS patch
          if [ "$SUSFS_PATCH_APPLIED" = "false" ]; then
            echo "  → Trying fallback patches..."
            for patch in \
              ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-*.patch \
              ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
              if [ -f "$patch" ]; then
                echo "  → Trying: $(basename $patch)"
                if git apply --check "$patch" 2>/dev/null; then
                  git apply "$patch" && echo "  ✅ git apply success" && SUSFS_PATCH_APPLIED=true && break
                else
                  echo "  ⚠️ git apply --check failed, trying patch..."
                  if patch -p1 --forward --fuzz=3 --dry-run < "$patch" >/dev/null 2>&1; then
                    patch -p1 --forward --fuzz=3 < "$patch" && echo "  ✅ patch success" && SUSFS_PATCH_APPLIED=true && break
                  else
                    echo "  ❌ Patch does not apply cleanly"
                  fi
                fi
              fi
            done
          fi

          if [ "$SUSFS_PATCH_APPLIED" = "false" ]; then
            echo "❌ ERROR: No SUSFS kernel patch could be applied!"
            echo "   This means SUSFS is incompatible with this kernel version."
            echo "   Available patches:"
            ls -1 ../susfs4ksu/kernel_patches/*.patch 2>/dev/null || echo "  (none)"
            echo ""
            echo "   Kernel version: $(make kernelversion 2>/dev/null || echo 'unknown')"
            echo "   Branch: $(git branch --show-current 2>/dev/null || echo 'unknown')"
            exit 1
          fi
          echo "✅ SUSFS kernel patch applied successfully"

          # ─── Step 2: Copy SUSFS source files ─────────────────────────────
          echo "📋 Copying SUSFS source files..."
          if [ -d "../susfs4ksu/kernel_patches/fs" ]; then
            cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          else
            echo "❌ ERROR: SUSFS fs/ directory not found!"
            exit 1
          fi
          if [ -d "../susfs4ksu/kernel_patches/include/linux" ]; then
            cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          else
            echo "❌ ERROR: SUSFS include/linux/ directory not found!"
            exit 1
          fi

          [ -f "fs/Makefile" ] && ! grep -q "susfs.o" "fs/Makefile" \
            && echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> "fs/Makefile"

          git add fs/susfs.c include/linux/susfs.h fs/Makefile 2>/dev/null || true

          # ─── Step 3: Fix selinux/hooks.c extern conflict ─────────────────
          if [ -f "security/selinux/hooks.c" ]; then
            EXTERN_COUNT=$(grep -c "extern int susfs_" security/selinux/hooks.c 2>/dev/null || echo "0")
            if [ "$EXTERN_COUNT" -gt 1 ]; then
              echo "   Fixing $EXTERN_COUNT duplicate extern susfs declarations in selinux/hooks.c..."
              awk '
                /extern int susfs_/ {
                  if (seen[$0]++) next
                }
                { print }
              ' security/selinux/hooks.c > /tmp/hooks_fixed.c \
                && mv /tmp/hooks_fixed.c security/selinux/hooks.c \
                && echo "   ✅ selinux/hooks.c deduplication done"
            fi
          fi

          # ─── Step 4: Inject susfs_init() into KernelSU-Next ──────────────
          KSU_KERNEL="drivers/kernelsu"
          SUSFS_INTEGRATED=false
          if [ -d "$KSU_KERNEL" ]; then
            if [ "$KSU_METHOD" = "kernelsu-next" ]; then
              echo "   KernelSU-Next detected. Manually injecting SUSFS hooks..."

              INIT_C=$(find drivers/kernelsu -name 'init.c' | head -n1)
              if [ -z "$INIT_C" ]; then
                echo "❌ ERROR: init.c tidak ditemukan di drivers/kernelsu/"
                find drivers/kernelsu/ | head -20
                exit 1
              fi
              echo "✅ Found init.c at: $INIT_C"

              if [ -f "$INIT_C" ]; then
                if ! grep -q 'susfs_init' "$INIT_C"; then
                  sed -i '1i #include <linux/susfs.h>' "$INIT_C"
                  perl -0777 -pi -e 's/(int __init kernelsu_init\(void\)\s*\{)/$1\n#ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif\n/' "$INIT_C"
                  echo "   ✅ susfs_init() injected into $INIT_C"
                else
                  echo "   ℹ️  susfs_init() already present, skipping"
                fi
                git add -f "$INIT_C" 2>/dev/null || true
              fi
            fi

            if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
              printf '%s\n' \
                'menu "KernelSU - SUSFS"' \
                'config KSU_SUSFS' '  bool "KernelSU addon - SUSFS"' '  depends on KSU' '  default y' \
                'config KSU_SUSFS_SUS_PATH' '  bool "Hide suspicious paths"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_MOUNT' '  bool "Hide suspicious mounts"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_KSTAT' '  bool "Spoof kstat"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SPOOF_UNAME' '  bool "Spoof uname"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_ENABLE_LOG' '  bool "Enable logging"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS' '  bool "Hide symbols from kallsyms"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG' '  bool "Spoof cmdline/bootconfig"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_OPEN_REDIRECT' '  bool "Open redirect"' '  depends on KSU_SUSFS' '  default y' \
                'config KSU_SUSFS_SUS_MAP' '  bool "Hide mmapped files from proc maps"' '  depends on KSU_SUSFS' '  default y' \
                'endmenu' >> "$KSU_KERNEL/Kconfig"
            fi
            if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
              printf '%s\n' \
                '## SUSFS ##' \
                'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)' \
                '$(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E "^#define SUSFS_VERSION" | cut -d" " -f3 | sed "s/\"//g"))' \
                '$(info -- SUSFS_VERSION: $(SUSFS_VERSION))' \
                'else' \
                '$(info -- SUSFS not integrated)' \
                'endif' >> "$KSU_KERNEL/Makefile"
            fi
            git add "$KSU_KERNEL/Makefile" "$KSU_KERNEL/Kconfig" 2>/dev/null || true
            grep -q "config KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null && SUSFS_INTEGRATED=true
          fi

          echo "SUSFS_OK=$SUSFS_INTEGRATED" >> $GITHUB_ENV
          echo "✅ SUSFS_INTEGRATED status: $SUSFS_INTEGRATED"

          if [ "$SUSFS_INTEGRATED" = "true" ]; then
            [ ! -f "fs/susfs.c" ] && echo "❌ ERROR: fs/susfs.c not found!" && exit 1
            [ ! -f "include/linux/susfs.h" ] && echo "❌ ERROR: susfs.h not found!" && exit 1

            CRITICAL_REJ=$(find fs/ include/ -name "*.rej" -type f 2>/dev/null || true)
            if [ -n "$CRITICAL_REJ" ]; then
              echo "❌ ERROR: Critical SUSFS patch rejected in fs/ or include/:"
              for rej in $CRITICAL_REJ; do
                echo "=== $rej ===" && cat "$rej" && echo "==="
              done
              exit 1
            fi
            NON_CRIT_REJ=$(find . -name "*.rej" -type f 2>/dev/null || true)
            if [ -n "$NON_CRIT_REJ" ]; then
              echo "⚠️  Non-critical rejected hunks:"
              for rej in $NON_CRIT_REJ; do echo "   - $rej"; done
              find . -name "*.rej" -delete 2>/dev/null || true
            fi
            echo "✅ SUSFS integration complete"
          fi

      - name: Apply Custom Patches
        run: |
          cd kernel/common
          if [ -d "$GITHUB_WORKSPACE/patches" ] && ls $GITHUB_WORKSPACE/patches/*.patch 1>/dev/null 2>&1; then
            for patch_file in $GITHUB_WORKSPACE/patches/*.patch; do
              echo "Applying $patch_file"
              patch -p1 --forward --no-backup-if-mismatch < "$patch_file" \
                || echo "  ⚠️ Patch failed or already applied (skipping)"
            done
          else
            echo "No custom patches found, skipping."
          fi

      - name: Configure Kernel
        run: |
          set -euo pipefail
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="schedutil"

          add_cfg() {
            local cfg="$1"
            sed -i "/^${cfg%%=*}=.*/d" "$DEFCONFIG"
            echo "$cfg" >> "$DEFCONFIG"
          }

          echo "" >> "$DEFCONFIG"
          echo "# KernelSU + Dependencies" >> "$DEFCONFIG"
          add_cfg "CONFIG_KSU=y"
          # CRITICAL: KSU Kconfig has 'depends on KPROBES && EXT4_FS'
          # Without these, CONFIG_KSU silently becomes =n → no root → bootloop-like behavior
          add_cfg "CONFIG_KPROBES=y"
          add_cfg "CONFIG_HAVE_KPROBES=y"
          add_cfg "CONFIG_KPROBE_EVENTS=y"
          add_cfg "CONFIG_EXT4_FS=y"

          if [ "${{ inputs.with_susfs }}" == "true" ]; then
            if [ "$SUSFS_OK" = "true" ]; then
              echo "" >> $DEFCONFIG
              echo "# SUSFS" >> $DEFCONFIG
              for cfg in \
                CONFIG_KSU_SUSFS \
                CONFIG_SUSFS \
                CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT \
                CONFIG_KSU_SUSFS_SUS_MOUNT \
                CONFIG_KSU_SUSFS_SUS_MAP \
                CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT \
                CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT \
                CONFIG_KSU_SUSFS_SUS_KSTAT \
                CONFIG_KSU_SUSFS_TRY_UMOUNT \
                CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT \
                CONFIG_KSU_SUSFS_SPOOF_UNAME \
                CONFIG_KSU_SUSFS_ENABLE_LOG \
                CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
                CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
                CONFIG_KSU_SUSFS_OPEN_REDIRECT; do
                add_cfg "${cfg}=y"
              done
              # Enable SUS_PATH for all versions as it is stable now
              add_cfg "CONFIG_KSU_SUSFS_SUS_PATH=y"
              add_cfg "CONFIG_KSU_SUSFS_SUS_SU=n"
              echo "✅ SUSFS configs written to defconfig"
            else
              echo "❌ SUSFS integration failed - SUSFS_OK=$SUSFS_OK"
              exit 1
            fi
          fi

          echo "" >> "$DEFCONFIG"
          echo "# Module Compatibility" >> "$DEFCONFIG"
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"
          add_cfg "CONFIG_MODULE_SIG_ALL=n"

          echo "" >> "$DEFCONFIG"
          echo "# CPU Governor" >> "$DEFCONFIG"
          for gov in SCHEDUTIL PERFORMANCE ONDEMAND CONSERVATIVE USERSPACE POWERSAVE; do
            add_cfg "CONFIG_CPU_FREQ_GOV_${gov}=y"
          done
          GOV_UPPER=$(echo "$GOVERNOR" | tr '[:lower:]' '[:upper:]')
          add_cfg "CONFIG_CPU_FREQ_GOV_${GOV_UPPER}=y"
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_${GOV_UPPER}=y"

          # NOTE: ZRAM/ZSMALLOC bazel fix
          # Bazel complains about missing zram.ko/zsmalloc.ko. We force them
          # to be built as modules (=m) so Bazel finds them in module_outs.
          echo "" >> "$DEFCONFIG"
          echo "# ZRAM Fix" >> "$DEFCONFIG"
          add_cfg "CONFIG_ZSMALLOC=m"
          add_cfg "CONFIG_ZRAM=m"
          add_cfg "CONFIG_CRYPTO_LZ4=y"
          add_cfg "CONFIG_ZRAM_DEF_COMP_LZ4=y"

          echo "" >> "$DEFCONFIG"
          echo "# Network Optimizations (Safe)" >> "$DEFCONFIG"
          add_cfg "CONFIG_TCP_CONG_ADVANCED=y"
          add_cfg 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          add_cfg "CONFIG_NET_SCH_FQ=y"
          add_cfg 'CONFIG_DEFAULT_NET_SCH="fq"'

          # Branding — Custom name
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          echo 'CONFIG_LOCALVERSION="-Epitaph"' >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

          # ─── WIFI & CONNECTIVITY FIX ──────────────────────────────────
          # Compile CFG80211 & MAC80211 as modules (=m) since GKI forces them
          # to be modules. We patch the build system to register them.
          add_cfg "CONFIG_CFG80211=m"
          add_cfg "CONFIG_NL80211_TESTMODE=y"
          add_cfg "CONFIG_CFG80211_WEXT=y"
          add_cfg "CONFIG_MAC80211=m"
          
          # Disable GKI module signature protection to allow out-of-tree / custom modules loading
          add_cfg "CONFIG_MODULE_SIG_PROTECT=n"
          
          # MediaTek Specific (Connectivity)
          add_cfg "CONFIG_MTK_COMBO_WIFI=y"
          add_cfg "CONFIG_MTK_COMBO_BT=y"
          add_cfg "CONFIG_MTK_COMBO_GPS=y"
          
          # ─── HOTSPOT FIX (Netfilter NAT) ──────────────────────────────
          echo "" >> "$DEFCONFIG"
          echo "# Netfilter for Hotspot/Tethering" >> "$DEFCONFIG"
          add_cfg "CONFIG_NETFILTER=y"
          add_cfg "CONFIG_NF_CONNTRACK=y"
          add_cfg "CONFIG_NF_NAT=y"
          add_cfg "CONFIG_IP_NF_IPTABLES=y"
          add_cfg "CONFIG_IP_NF_NAT=y"
          add_cfg "CONFIG_IP_NF_TARGET_MASQUERADE=y"
          add_cfg "CONFIG_NETFILTER_XT_TARGET_MASQUERADE=y"

          # ─── OPTIMIZATIONS (KEEPS DISABLED FOR NOW) ────────────────────
          # Kita simpan di sini buat referensi, tapi jangan di-enable 
          # sampai kernel stabil booting dengan hotspot nyala.
          # add_cfg "CONFIG_DEBUG_INFO_NONE=y"        # ⚠️ Bikin BTF Error di A15
          # add_cfg "CONFIG_THERMAL=y"                # ⚠️ Bentrok sama MTK Thermal
          # ─── END DISABLED ──────────────────────────────────────────────

          # PStore (RAMoops) — KEEP
          echo "" >> "$DEFCONFIG"
          echo "# PStore / RAMoops Debugging" >> "$DEFCONFIG"
          add_cfg "CONFIG_PSTORE=y"
          add_cfg "CONFIG_PSTORE_CONSOLE=y"
          add_cfg "CONFIG_PSTORE_PMSG=y"
          add_cfg "CONFIG_PSTORE_RAM=y"
          add_cfg "CONFIG_PSTORE_RAM_MEM_ADDR=0x4d010000"
          add_cfg "CONFIG_PSTORE_RAM_SIZE=0xe0000"
          add_cfg "CONFIG_PSTORE_RAM_CONSOLE_SIZE=0x40000"
          add_cfg "CONFIG_PSTORE_RAM_PMSG_SIZE=0x80000"

          git add arch/arm64/configs/gki_defconfig
          echo "✅ Defconfig finalized and added to git"

      - name: Patch Build System
        run: |
          cd kernel/common

          if [ -f "BUILD.bazel" ]; then
            sed -i \
              -e '/check_defconfig/d' \
              -e 's/kmi_symbol_list_strict_mode = .*/kmi_symbol_list_strict_mode = False,/g' \
              -e 's/trim_nonlisted_kmi = .*/trim_nonlisted_kmi = False,/g' \
              BUILD.bazel

            git add BUILD.bazel 2>/dev/null || true
            echo "✅ Build system patched and added to git"
          fi

          # ─── WIFI MODULE REGISTRATION (FOR BAZEL MODULE COMPILATION) ─────
          python3 -c 'if 1:
              import os, re, sys
              WIFI = ["net/mac80211/mac80211.ko", "net/wireless/cfg80211.ko"]
              ok = False
              print("CWD:", os.getcwd())
              for f in ["modules.bzl", "BUILD.bazel"]:
                print(f"  {chr(9989) if os.path.exists(f) else chr(10060)} {f}")
              if os.path.exists("modules.bzl"):
                with open("modules.bzl") as fh:
                  bzl = fh.read()
                for vn in ["_COMMON_GKI_MODULES_LIST", "COMMON_GKI_MODULES_LIST"]:
                  m = re.search(vn + r"\s*=\s*\[", bzl)
                  if not m: continue
                  sb = m.end() - 1; d = 1; p = sb + 1
                  while p < len(bzl) and d > 0:
                    if bzl[p] == "[": d += 1
                    elif bzl[p] == "]": d -= 1
                    p += 1
                  eb = p - 1; lc = bzl[sb+1:eb]
                  if all(x in lc for x in WIFI):
                    print(f"Already in {vn}"); ok = True; break
                  items = re.findall(r"\"([^\"]+\.ko)\"", lc)
                  print(f"Found {len(items)} modules in {vn}")
                  for mod in WIFI:
                    if mod not in items: items.append(mod); print(f"  + {mod}")
                  items.sort()
                  nl = "[\n" + "".join(f"    \"{x}\",\n" for x in items) + "]"
                  with open("modules.bzl", "w") as fh:
                    fh.write(bzl[:sb] + nl + bzl[eb+1:])
                  print(f"Patched {vn} in modules.bzl ({len(items)} modules)")
                  ok = True; break
              if not ok:
                if not os.path.exists("BUILD.bazel"):
                  print("ERROR: no modules.bzl or BUILD.bazel"); sys.exit(1)
                with open("BUILD.bazel") as fh:
                  bz = fh.read()
                if all(x in bz for x in WIFI):
                  print("Already in BUILD.bazel"); ok = True
                else:
                  ki = bz.find("name = \"kernel_aarch64\"")
                  if ki == -1: ki = bz.find("name = " + chr(39) + "kernel_aarch64" + chr(39))
                  if ki == -1:
                    print("ERROR: kernel_aarch64 not found"); sys.exit(1)
                  sr = bz[ki:]
                  for an in ["module_implicit_outs", "module_outs"]:
                    am = re.search(an + r"\s*=\s*", sr)
                    if not am: continue
                    ap = ki + am.end(); rest = bz[ap:].lstrip()
                    if rest.startswith("["):
                      bp2 = bz.index("[", ap); d = 1; p = bp2 + 1
                      while p < len(bz) and d > 0:
                        if bz[p] == "[": d += 1
                        elif bz[p] == "]": d -= 1
                        p += 1
                      ep = p - 1; lc = bz[bp2+1:ep]
                      items = re.findall(r"\"([^\"]+\.ko)\"", lc)
                      for mod in WIFI:
                        if mod not in items: items.append(mod)
                      items.sort()
                      nl = "[\n" + "".join(f"        \"{x}\",\n" for x in items) + "    ]"
                      bz = bz[:bp2] + nl + bz[ep+1:]
                      with open("BUILD.bazel", "w") as fh:
                        fh.write(bz)
                      print(f"Patched inline {an}"); ok = True; break
                    else:
                      ws = " + [\n" + "".join(f"        \"{x}\",\n" for x in WIFI) + "    ]"
                      le = bz.find(",\n", ap)
                      if le != -1:
                        bz = bz[:le] + ws + bz[le:]
                        with open("BUILD.bazel", "w") as fh:
                          fh.write(bz)
                        print(f"Appended to {an}"); ok = True; break
                  if not ok:
                    print("ERROR: no module_outs attr found"); print(sr[:500]); sys.exit(1)
              if ok: print("WiFi module registration done!")
              else: print("FATAL: could not patch"); sys.exit(1)
          '

          git add BUILD.bazel modules.bzl 2>/dev/null || true
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ]; then
              sed -i '/check_defconfig/d' "$f"
              git add "$f"
            fi
          done
          if [ -f "build.config.gki.aarch64" ]; then
            sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' build.config.gki.aarch64
            git add build.config.gki.aarch64
          fi
          # FIX: Bypass ABI symbol protection check (fails with custom patches)
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] \
            && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' \
              "../build/kernel/abi/check_buildtime_symbol_protection.py" \
            || true
          # FIX: Remove -maybe-dirty from scm version stamp
          if [ -f "../build/kernel/kleaf/impl/stamp.bzl" ]; then
            sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' \
              ../build/kernel/kleaf/impl/stamp.bzl
          fi
          # FIX: Jangan git add ke repo build, itu repo terpisah.
          # Cukup scmversion dan setlocalversion di repo common.
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          git add scripts/setlocalversion 2>/dev/null || true
          : > .scmversion
          git add .scmversion 2>/dev/null || true

          # CRITICAL: Hapus .git folders yang tidak perlu untuk hemat disk space (Bazel butuh banyak)
          # Tapi jangan hapus .git di kernel/common karena Bazel/Kleaf butuh git state-nya.
          cd "$GITHUB_WORKSPACE"
          rm -rf kernel/KernelSU-Next/.git 2>/dev/null || true
          rm -rf kernel/susfs4ksu/.git 2>/dev/null || true
          rm -rf prebuilts/clang/host/linux-x86/*/.git 2>/dev/null || true
          echo "✅ Extra disk space freed by removing unused .git folders"

      - name: Build Kernel (Bazel)
        if: inputs.clang_toolchain == 'bazel-default' || inputs.clang_toolchain == ''
        run: |
          set -euo pipefail
          cd kernel
          mkdir -p $GITHUB_WORKSPACE/dist

          # ── FIX: --local_resources=memory (bukan --local_ram_resources) ──
          # Di Bazel version yang dipakai Kleaf GKI 6.6, --local_ram_resources
          # justru DEPRECATED. Yang bener: --local_resources=memory=6144.
          # Jangan ganti-ganti flag tanpa tes di runner dulu.
          #
          # LTO=none is the safest for GKI 6.6 Kleaf (tested stable).
          # LTO=full causes OOM on 7GB runners. LTO=thin not always
          # supported by older Kleaf versions (exit code 2).
          #
          # ── FIX: Retry loop ──────────────────────────────────────────────
          # Sama kayak repo sync (3x retry, 30s delay). Build Bazel bisa gagal
          # karena transient network issues download remote deps/artifacts.
          # ─────────────────────────────────────────────────────────────────
          BUILD_OK=false
          for attempt in 1 2 3; do
            echo "Bazel build attempt $attempt/3..."
            if tools/bazel run \
              --disk_cache=/home/runner/.cache/bazel \
              --lto=none \
              --local_resources=memory=6144 \
              --jobs=2 \
              --noshow_progress \
              --noshow_loading_progress \
              //common:kernel_aarch64_dist -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 | tee build.log; then
              BUILD_OK=true
              break
            fi
            echo "⚠️ Bazel build failed, retrying in 30s..."
            sleep 30
          done
          if [ "$BUILD_OK" != "true" ]; then
            echo "❌ Bazel build gagal setelah 3 percobaan"
            exit 1
          fi
          echo "TOOLCHAIN_NAME=Bazel" >> $GITHUB_ENV
          echo "TOOLCHAIN_VER=AOSP Clang (Kleaf Default)" >> $GITHUB_ENV
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Build Kernel (Custom Toolchain)
        if: inputs.clang_toolchain != 'bazel-default' && inputs.clang_toolchain != ''
        run: |
          set -euo pipefail
          cd kernel/common
          if [ -z "${CUSTOM_CLANG_PATH:-}" ]; then
            echo "❌ ERROR: CUSTOM_CLANG_PATH not set!"
            exit 1
          fi
          export PATH="$CUSTOM_CLANG_PATH/bin:$PATH"
          which clang || { echo "❌ clang not in PATH!"; exit 1; }
          
          # Detect clang triple for better compatibility
          CLANG_TRIPLE=$(clang -dumpmachine)
          echo "✅ Using Clang Triple: $CLANG_TRIPLE"

          MAKE_ARGS="O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=$CLANG_TRIPLE HOSTLDFLAGS=-fuse-ld=bfd"

          make $MAKE_ARGS gki_defconfig
          
          # Build Kernel Image and Modules
          # FORCE: Image.gz for MTK compatibility
          make -j$(nproc) $MAKE_ARGS Image.gz Image.lz4 modules 2>&1 | tee ../build.log
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          set -euo pipefail
          mkdir -p $GITHUB_WORKSPACE/dist
          if [ "${{ inputs.clang_toolchain }}" = "bazel-default" ] || [ -z "${{ inputs.clang_toolchain }}" ]; then
            cd kernel
            for artifact in Image Image.gz Image.lz4; do
              if [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ]; then
                if [ -f "bazel-bin/common/kernel_aarch64/$artifact" ]; then
                  cp -v "bazel-bin/common/kernel_aarch64/$artifact" "$GITHUB_WORKSPACE/dist/" || true
                fi
              fi
            done
          else
            # Extraction for Custom Toolchain (from 'out' directory)
            for img in \
              kernel/common/out/arch/arm64/boot/Image \
              kernel/common/out/arch/arm64/boot/Image.gz \
              kernel/common/out/arch/arm64/boot/Image.lz4; do
              if [ -f "$img" ]; then
                cp -v "$img" "$GITHUB_WORKSPACE/dist/"
              fi
            done
            # Also grab WiFi modules if they exist (for AnyKernel3 packaging)
            for mod in cfg80211.ko mac80211.ko; do
              FOUND=$(find kernel/common/out -name "$mod" -type f 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
                echo "✅ Extracted module: $mod"
              fi
            done
          fi
          echo "📦 dist/ contents:"
          ls -lah $GITHUB_WORKSPACE/dist/ || true

      - name: Verify Build
        run: |
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            if [ -f "$f" ]; then
              SIZE=$(du -h "$f" 2>/dev/null | cut -f1 || echo "?")
              echo "✅ Found: $f ($SIZE)"
              HAS_IMAGE=true
            fi
          done
          if [ "$HAS_IMAGE" = "false" ]; then
            echo "❌ No kernel image found in dist/!"
            ls -lah dist/ || echo "  (empty or missing)"
            exit 1
          fi
          echo "✅ Verify Build passed."

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "Debug-${{ env.ZIP_NAME }}"
          path: |
            kernel/build.log
            kernel/common/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
            dist/Image*
          if-no-files-found: warn
          retention-days: 7

      - name: Package AnyKernel3
        run: |
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          GOVERNOR="schedutil"
          TOOLCHAIN_SHORT="${{ env.TOOLCHAIN_NAME }}"
          BASE_NAME="${{ env.ZIP_NAME }}"

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3

          # kernel.string: nama kernel yang muncul di kernel manager app
          # Format: {KernelName}-{CustomName}-v{Build} [info] by {Developer}
          if [ "${{ inputs.with_susfs }}" == "true" ]; then
            KERNEL_STRING="Epitaph-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | SUSFS | ${GOVERNOR} | ${TOOLCHAIN_SHORT}] by ${AUTHOR}"
          else
            KERNEL_STRING="Epitaph-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | ${GOVERNOR} | ${TOOLCHAIN_SHORT}] by ${AUTHOR}"
          fi

          printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' \
            'properties() {' \
            "kernel.string=${KERNEL_STRING}" \
            'do.devicecheck=1' \
            'do.modules=1' \
            'do.systemless=1' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=fire' \
            'device.name2=Redmi 12' \
            'supported.versions=15' \
            'supported.patchlevels=' \
            '}' \
            '' \
            'block=boot;' \
            'is_slot_device=auto;' \
            'ramdisk_compression=auto;' \
            'patch_vbmeta_flag=0;' \
            '' \
            '. tools/ak3-core.sh;' \
            'dump_boot;' \
            'write_boot;' > anykernel.sh

          # ─── COPY WIFI MODULES ──────────────────────────────────────
          MODULES_DIR="modules/vendor/lib/modules"
          mkdir -p "$MODULES_DIR"

          echo "🔍 Searching for modules in dist/..."
          find "$GITHUB_WORKSPACE/dist" -name "*.ko" -type f -exec cp -v {} "$MODULES_DIR/" \;
          
          if [ "$(ls -A $MODULES_DIR)" ]; then
            echo "✅ Modules successfully copied to AnyKernel3"
            MODULES_FOUND=true
          else
            echo "❌ ERROR: No modules found in dist/! WiFi will fail to load."
            exit 1
          fi
          # ─── END MODULE COPY ────────────────────────────────────────

          # ─── PERSISTENT WIFI FALLBACK LOADER ────────────────────────
          # If systemless mount fails under HyperOS 2.0/Android 15, we write
          # a persistent post-boot service.d script via KernelSU/Magisk to insmod them.
          echo "" >> anykernel.sh
          echo "# Fallback persistent WiFi module loader via KernelSU/Magisk" >> anykernel.sh
          echo "if [ -d /data/adb/service.d ]; then" >> anykernel.sh
          echo "  ui_print \"  • Setting up persistent KernelSU/Magisk WiFi fallback...\";" >> anykernel.sh
          echo "  mkdir -p /data/adb/wifi_fix;" >> anykernel.sh
          echo "  cp -f modules/vendor/lib/modules/*.ko /data/adb/wifi_fix/;" >> anykernel.sh
          echo "  chmod 644 /data/adb/wifi_fix/*.ko;" >> anykernel.sh
          echo "  " >> anykernel.sh
          echo "  cat << 'INNER_EOF' > /data/adb/service.d/load_wifi.sh" >> anykernel.sh
          echo "#!/system/bin/sh" >> anykernel.sh
          echo "# Wait for driver initialization subsystems" >> anykernel.sh
          echo "sleep 3" >> anykernel.sh
          echo "if ! lsmod | grep -q cfg80211; then" >> anykernel.sh
          echo "  insmod /data/adb/wifi_fix/rfkill.ko" >> anykernel.sh
          echo "  insmod /data/adb/wifi_fix/libarc4.ko" >> anykernel.sh
          echo "  insmod /data/adb/wifi_fix/cfg80211.ko" >> anykernel.sh
          echo "  insmod /data/adb/wifi_fix/mac80211.ko" >> anykernel.sh
          echo "fi" >> anykernel.sh
          echo "INNER_EOF" >> anykernel.sh
          echo "  " >> anykernel.sh
          echo "  chmod 755 /data/adb/service.d/load_wifi.sh;" >> anykernel.sh
          echo "  ui_print \"  • Persistent WiFi fallback configured successfully!\";" >> anykernel.sh
          echo "fi" >> anykernel.sh
          # ─── END PERSISTENT WIFI FALLBACK LOADER ────────────────────

          SELECTED_IMG=""
          # CRITICAL: Prioritaskan Image.gz untuk Redmi 12 (Helio G88).
          # Bootloader Xiaomi MTK sering gagal booting kalau dikasih raw 'Image'.
          # Urutan: gz (best compatibility) > lz4 > raw Image (fallback)
          for img in \
            "$GITHUB_WORKSPACE/dist/Image.gz" \
            "$GITHUB_WORKSPACE/dist/Image.lz4" \
            "$GITHUB_WORKSPACE/dist/Image"; do
            if [ -f "$img" ]; then
              cp "$img" .
              SELECTED_IMG=$(basename "$img")
              echo "✅ Using kernel image: $SELECTED_IMG"
              break
            fi
          done
          [ -z "$SELECTED_IMG" ] && echo "❌ No kernel image found!" && exit 1

          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "✅ Package created: ${BASE_NAME}-AnyKernel3.zip"

      - name: Get Build Timestamp
        run: echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.ZIP_NAME }}"
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 30

      # FIX: Hapus "append_body: false" — bukan key valid di softprops/action-gh-release@v2.
      # Gunakan "make_latest: false" untuk kontrol release ordering saja jika diperlukan.
      - name: Create Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: "${{ inputs.release_tag }}"
            name: "Epitaph Kernel ${{ inputs.release_tag }}"
            body: |
              ### 📦 Epitaph-${{ inputs.custom_name }}
            - **Type:** GKI 6.6 ${{ inputs.with_susfs == 'true' && '+ SUSFS' || '(No SUSFS)' }}
            - **Root:** ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }}
            - **Governor:** schedutil
            - **KMI:** ${{ env.KMI_GENERATION }}
            - **Toolchain:** ${{ inputs.clang_toolchain }}
              - *${{ env.TOOLCHAIN_VER }}*
            - **Built:** ${{ env.BUILD_TIME }} (run #${{ github.run_number }})

            ---
            > ⚠️ **Wajib flash vbmeta dulu sebelum install kernel ini!**
            > ```
            > fastboot --disable-verity --disable-verification flash vbmeta vbmeta.img
            > fastboot --disable-verity --disable-verification flash vbmeta_system vbmeta_system.img
            > fastboot --disable-verity --disable-verification flash vbmeta_vendor vbmeta_vendor.img
            > ```
            > Ambil file `.img` dari ROM HyperOS 2 Fastboot yang sesuai versi lo.
          files: dist/*.zip
          draft: false
          prerelease: false

      - name: Notify Telegram on Failure
        if: failure()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set. Skipping failure notification."
            exit 0
          fi

          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUSFS_LABEL="No"
          [ "${{ inputs.with_susfs }}" = "true" ] && SUSFS_LABEL="Yes"

          # ── 1. Kumpulkan error log ───────────────────────────────────────
          ERROR_LOG="/tmp/epitaph_error.log"
          : > "$ERROR_LOG"

          for log_candidate in \
            "kernel/build.log" \
            "kernel/common/build.log"; do
            if [ -f "$log_candidate" ]; then
              echo "=== $(basename $log_candidate) — filtered errors ===" >> "$ERROR_LOG"
              grep -iE "error:|fatal:|undefined reference|cannot find|No such file|failed|❌" \
                "$log_candidate" | tail -60 >> "$ERROR_LOG" 2>/dev/null || true
              echo "" >> "$ERROR_LOG"
              echo "--- raw tail (last 80 lines) ---" >> "$ERROR_LOG"
              tail -80 "$log_candidate" >> "$ERROR_LOG" 2>/dev/null || true
              echo "" >> "$ERROR_LOG"
            fi
          done

          # Tangkap .rej file (SUSFS/patch failure)
          REJ_FILES=$(find kernel/common -name "*.rej" 2>/dev/null | head -5)
          if [ -n "$REJ_FILES" ]; then
            echo "=== REJECTED PATCH HUNKS ===" >> "$ERROR_LOG"
            for rej in $REJ_FILES; do
              echo "--- $rej ---" >> "$ERROR_LOG"
              cat "$rej" >> "$ERROR_LOG"
              echo "" >> "$ERROR_LOG"
            done
          fi

          # Fallback kalau log kosong (error di pre-build step)
          if [ ! -s "$ERROR_LOG" ]; then
            printf "No build.log found.\nError likely in a pre-build step (git clone / toolchain / SUSFS).\nCheck GitHub Actions:\n%s\n" \
              "$ACTIONS_URL" > "$ERROR_LOG"
          fi

          LOG_LINES=$(wc -l < "$ERROR_LOG")
          LOG_BYTES=$(du -b "$ERROR_LOG" 2>/dev/null | cut -f1 || echo "0")

          # ── 2. Header notif (sendMessage) ───────────────────────────────
          HEADER=$(printf \
            '<b>❌ Epitaph Kernel — Build FAILED</b>\n\n'\
            '<b>Kernel Name:</b> ${{ inputs.custom_name }}\n'\
            '<b>Version:</b> v${{ github.run_number }}\n'\
            '<b>Developer:</b> ${{ inputs.author_name }}\n'\
            '<b>Root:</b> ${{ inputs.ksu_method }}\n'\
            '<b>Governor:</b> schedutil\n'\
            '<b>SUSFS:</b> %s\n'\
            '<b>Toolchain:</b> ${{ inputs.clang_toolchain }}\n'\
            '<b>Triggered by:</b> ${{ github.actor }}\n\n'\
            '<a href="%s">🔍 Full log di GitHub Actions</a>\n\n'\
            '<i>⬇️ Error log dikirim sebagai file di bawah</i>' \
            "$SUSFS_LABEL" "$ACTIONS_URL")

          curl -s -X POST "${TG_API}/sendMessage" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            --form-string "text=${HEADER}" \
            --form-string "parse_mode=HTML" \
            && echo "✅ Header notification sent" \
            || echo "⚠️  Header notification failed"

          # ── 3. Upload error log sebagai file .txt ───────────────────────
          LOG_FILENAME="${{ env.ZIP_NAME }}-Error.log"
          cp "$ERROR_LOG" "/tmp/${LOG_FILENAME}"

          echo "📤 Uploading error log (${LOG_LINES} lines, ${LOG_BYTES} bytes)..."
          HTTP_CODE=$(curl -s -o /tmp/tg_log_resp.json -w "%{http_code}" \
            -X POST "${TG_API}/sendDocument" \
            --form-string "chat_id=${TG_CHAT_ID}" \
            -F "document=@/tmp/${LOG_FILENAME};filename=${LOG_FILENAME}" \
            --form-string "caption=📋 Error log — ${{ inputs.ksu_method }} / schedutil / ${{ inputs.clang_toolchain }}" \
            --form-string "parse_mode=HTML" || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Error log uploaded to Telegram"
          else
            echo "⚠️  Log upload failed (HTTP $HTTP_CODE)"
            cat /tmp/tg_log_resp.json || true

            # Fallback: paste 30 baris terakhir sebagai <pre> block
            SNIPPET=$(tail -30 "$ERROR_LOG" | head -c 3500)
            FALLBACK=$(printf '<b>📋 Error snippet (last 30 lines):</b>\n<pre>%s</pre>' "$SNIPPET")
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              --form-string "text=${FALLBACK}" \
              --form-string "parse_mode=HTML" \
              && echo "✅ Fallback snippet sent" \
              || echo "⚠️  Fallback snippet also failed (non-fatal)"
          fi

      - name: Send to Telegram
        if: success()
        continue-on-error: true
        env:
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram secrets not set. Skipping."
            exit 0
          fi

          ZIP_FILE=$(ls dist/*.zip 2>/dev/null | head -n 1)
          [ -z "$ZIP_FILE" ] && echo "No zip found." && exit 0

          ZIP_NAME=$(basename "$ZIP_FILE")
          # du -b = ukuran dalam bytes (portable, tanpa --apparent-size)
          ZIP_BYTES=$(du -b "$ZIP_FILE" 2>/dev/null | cut -f1 || echo "0")
          ZIP_SIZE=$(du -h "$ZIP_FILE" 2>/dev/null | cut -f1 || echo "?")

          SUSFS_LABEL="No"
          [ "${{ inputs.with_susfs }}" = "true" ] && SUSFS_LABEL="Yes"

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }}"

          # Telegram sendDocument limit: 50MB (52428800 bytes)
          TG_LIMIT=52428800

          # Caption pakai HTML parse_mode agar rapi di Telegram
          # Telegram caption max 1024 chars — jaga tetap ringkas
          CAPTION=$(printf '<b>🔧 Epitaph Kernel — Build Done</b>\n\n<b>Kernel Name:</b> ${{ inputs.custom_name }}\n<b>Version:</b> v${{ github.run_number }}\n<b>Developer:</b> ${{ inputs.author_name }}\n<b>Type:</b> GKI 6.6\n<b>Root:</b> ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }}\n<b>Governor:</b> schedutil\n<b>SUSFS:</b> %s\n<b>KMI:</b> ${{ env.KMI_GENERATION }}\n<b>Toolchain:</b> ${{ inputs.clang_toolchain }}\n  └ <i>${{ env.TOOLCHAIN_VER }}</i>\n<b>Size:</b> %s\n\n<a href="%s">📦 GitHub Release</a>' \
            "$SUSFS_LABEL" "$ZIP_SIZE" "$RELEASE_URL")

          TG_API="https://api.telegram.org/bot${TG_BOT_TOKEN}"

          if [ "$ZIP_BYTES" -le "$TG_LIMIT" ]; then
            echo "📤 Uploading zip directly to Telegram ($ZIP_SIZE)..."
            # sendDocument: upload file + caption sekaligus
            # --form multipart diperlukan untuk binary upload
            HTTP_CODE=$(curl -s -o /tmp/tg_response.json -w "%{http_code}" \
              -X POST "${TG_API}/sendDocument" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              -F "document=@${ZIP_FILE};filename=${ZIP_NAME}" \
              --form-string "caption=${CAPTION}" \
              --form-string "parse_mode=HTML" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ File uploaded to Telegram successfully"
            else
              echo "⚠️  Upload failed (HTTP $HTTP_CODE), falling back to text notification"
              cat /tmp/tg_response.json || true

              # Fallback: kirim teks + link saja
              curl -s -X POST "${TG_API}/sendMessage" \
                --form-string "chat_id=${TG_CHAT_ID}" \
                --form-string "text=${CAPTION}" \
                --form-string "parse_mode=HTML" \
                && echo "✅ Fallback text notification sent" \
                || echo "⚠️  Fallback text notification also failed (non-fatal)"
            fi
          else
            echo "⚠️  Zip size ($ZIP_SIZE) exceeds Telegram 50MB limit — sending link only"
            curl -s -X POST "${TG_API}/sendMessage" \
              --form-string "chat_id=${TG_CHAT_ID}" \
              --form-string "text=${CAPTION}" \
              --form-string "parse_mode=HTML" \
              && echo "✅ Text notification sent (file too large to upload)" \
              || echo "⚠️  Text notification failed (non-fatal)"
          fi
