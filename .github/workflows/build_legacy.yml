name: Build Castorice Legacy (4.19)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Kernel Author Name"
        required: true
        default: "Castorice"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire

jobs:
  build:
    name: "Castorice Legacy 4.19"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf \
            build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
            libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make \
            optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl \
            libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev \
            libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip \
            device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev \
            jq libyaml-dev -y

      - name: Download ZyClang
        run: |
          mkdir -p clang
          ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
          ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
          ZYCLANG_DLINK="https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
          aria2c -x16 -s16 -k1M -o zyclang.tar.gz "$ZYCLANG_DLINK"
          tar -xf zyclang.tar.gz -C clang/
          rm -f zyclang.tar.gz
          echo "Clang version:"
          clang/bin/clang --version

      - name: Sync Kernel Source
        run: |
          git clone --depth=1 https://github.com/naidrahiqa/fire_kernel.git kernel

      - name: Setup KernelSU-Next
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          
          # Fix git version
          KSU_VERSION=$(cd KernelSU-Next && git rev-list --count HEAD)
          sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild 2>/dev/null || true
          
          # Apply manual patches for 4.19
          echo "Applying KSU manual patches..."
          for patch in KernelSU-Next/kernel/patches/*.patch; do
            patch -p1 --forward < "$patch" || true
          done

      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          fi

          # ===== LCD 0c/0d FIX (CRITICAL FOR TOUCHSCREEN) =====
          echo "Applying LCM fix (LCD 0c/0d touchscreen fix)..."
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || echo "WARN: fix_lcm patch had issues"

          echo "Applying primary display fix..."
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || echo "WARN: primary_display_fix patch had issues"

          # ===== MTK ACCDET CONFLICT FIX =====
          echo "Fixing MTK accdet symbol conflict..."
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true

          echo "Applying additional kernel optimizations..."

          echo "All patches applied"

      # ===== DEFCONFIG =====
      - name: Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"

          # Use reference fire_defconfig as base (stock Xiaomi)
          if [ -f "../ref_patches/fire_defconfig" ]; then
            echo "Using reference fire_defconfig..."
            cp ../ref_patches/fire_defconfig $DEFCONFIG
          fi

          # KernelSU configs
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# KernelSU-Next (Legacy Manual Hook)" >> $DEFCONFIG
            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG
          fi

          # SUSFS configs
          if [ "${{ inputs.enable_susfs }}" = "true" ] && [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
          fi

          # ===== LATENCY & RESPONSIVENESS (Rhythm Game Focus) =====
          echo "" >> $DEFCONFIG
          echo "# Latency & Responsiveness (Rhythm Game)" >> $DEFCONFIG
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_HZ_300=n" >> $DEFCONFIG
          echo "CONFIG_HZ_250=n" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_PREEMPT_VOLUNTARY=n" >> $DEFCONFIG
          echo "CONFIG_HIGH_RES_TIMERS=y" >> $DEFCONFIG
          echo "CONFIG_NO_HZ=y" >> $DEFCONFIG
          echo "CONFIG_SND_HRTIMER=y" >> $DEFCONFIG

          # ===== SCHEDULER & POWER (Daily Use Focus) =====
          echo "" >> $DEFCONFIG
          echo "# Scheduler & Power Management" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_POWERSAVE=y" >> $DEFCONFIG
          echo "CONFIG_SCHED_MC=y" >> $DEFCONFIG
          echo "CONFIG_ENERGY_MODEL=y" >> $DEFCONFIG

          # ===== MEMORY (Snappy Daily Multitasking) =====
          echo "" >> $DEFCONFIG
          echo "# Memory Optimization" >> $DEFCONFIG
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZSMALLOC=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_LZ4=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_ZSTD=y" >> $DEFCONFIG
          echo "CONFIG_COMPACTION=y" >> $DEFCONFIG
          echo "CONFIG_KSM=y" >> $DEFCONFIG

          # ===== NETWORKING (Stable Ping) =====
          echo "" >> $DEFCONFIG
          echo "# Networking Performance" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $DEFCONFIG
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> $DEFCONFIG

          # IPSet Support
          echo "" >> $DEFCONFIG
          echo "# IPSet" >> $DEFCONFIG
          echo "CONFIG_IP_SET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_MAX=65534" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_MAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_LIST_SET=y" >> $DEFCONFIG

          # ===== SERIAL VERSIONING =====
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          LOCALVER="-Castorice-${CUSTOM_NAME}-v${BUILD_VER}"
          # Remove existing LOCALVERSION line then append new one
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG
          echo "LOCALVERSION set to: ${LOCALVER}"

          echo "=== Defconfig tail ==="
          tail -50 $DEFCONFIG

      # ===== COMPILER FIXES (Modern Clang vs 4.19) =====
      - name: Fix Compiler Errors
        run: |
          cd $GITHUB_WORKSPACE/kernel

          echo "=== Fixing modern Clang vs 4.19 incompatibilities ==="

          # Step 1: Remove ENTIRE compound -Werror=xxx flags from all Makefiles
          # Must come BEFORE removing standalone -Werror to avoid leaving orphan '=xxx'
          echo "Removing compound -Werror=xxx flags..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/-Werror=[a-zA-Z_-]*//g' {} +

          # Step 2: Remove standalone -Werror (safe now since compounds are gone)
          echo "Removing standalone -Werror..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/ -Werror / /g; s/ -Werror$//g; s/^-Werror //g' {} +

          # Step 3: Remove GCC-specific warning flags that clang doesn't understand
          echo "Removing clang-incompatible warning flags..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/-Wno-unused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wno-unused-but-set-parameter//g' {} + \
            -exec sed -i 's/-Wunused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wunused-but-set-parameter//g' {} +

          # Step 4: Fix strict-prototypes (clang 15+ enforces C2x no-K&R rule)
          echo "Fixing strict-prototypes issues..."
          # zram_debugfs_init / destroy sed removed because they corrupt function calls.
          # -Wno-strict-prototypes is already added below to handle this.

          # Step 5: Add clang compatibility CFLAGS
          # CRITICAL: Append at END of Makefile, NOT inside the KBUILD_CFLAGS := block!
          # The old sed '/^KBUILD_CFLAGS.*:=/a ...' was inserting lines in the
          # middle of a multi-line backslash-continuation block, breaking Makefile syntax.
          # Error was: "Makefile:447: *** recipe commences before first target. Stop."
          if [ -f "Makefile" ]; then
            echo "Adding clang compatibility CFLAGS (appending to end of Makefile)..."
            {
              echo ''
              echo '# Clang compatibility flags (appended by CI)'
              echo 'KBUILD_CFLAGS += -Wno-error'
              echo 'KBUILD_CFLAGS += -Wno-implicit-function-declaration'
              echo 'KBUILD_CFLAGS += -Wno-strict-prototypes'
              echo 'KBUILD_CFLAGS += -Wno-return-type'
              echo 'KBUILD_CFLAGS += -Wno-unknown-warning-option'
              echo 'KBUILD_CFLAGS += -Wno-int-conversion'
              echo 'KBUILD_CFLAGS += -Wno-unused-function'
              echo 'KBUILD_CFLAGS += -Wno-misleading-indentation'
              echo 'KBUILD_CFLAGS += -Wno-bool-operation'
              echo 'KBUILD_CFLAGS += -Wno-uninitialized'
            } >> Makefile
            echo "Clang CFLAGS appended successfully"
          fi

          echo "=== Compiler fixes applied ==="

      # ===== BUILD =====
      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel

          export KBUILD_BUILD_USER=Castorice
          export KBUILD_BUILD_HOST=naidrahiqa
          export KBUILD_BUILD_VERSION=1

          ARGS="PATH=$GITHUB_WORKSPACE/ZyClang/bin:$PATH \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            NM=llvm-nm \
            CXX=clang++ \
            AR=llvm-ar \
            LD=ld.lld \
            STRIP=llvm-strip \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            OBJSIZE=llvm-size \
            READELF=llvm-readelf \
            HOSTAR=llvm-ar \
            HOSTLD=ld.lld \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1"

          # Generate .config
          rm -rf out
          make O=out $ARGS fire_defconfig

          KERNEL_VERSION=$(make -s O=out $ARGS kernelversion 2>/dev/null)
          if [ -z "$KERNEL_VERSION" ]; then KERNEL_VERSION="4.19"; fi
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          echo "=== Building Linux $KERNEL_VERSION ==="

          # Build (pipe to tee means exit code comes from tee, not make)
          # Use PIPEFAIL so make failure propagates through the pipe
          set -o pipefail
          make O=out $ARGS -j"$(nproc --all)" 2>&1 | tee build.log
          BUILD_RC=$?
          set +o pipefail

          # Verify
          IMAGE="out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE" ]; then
            IMAGE="out/arch/arm64/boot/Image.gz"
          fi
          if [ ! -f "$IMAGE" ]; then
            IMAGE="out/arch/arm64/boot/Image"
          fi

          if [ ! -f "$IMAGE" ] || [ "$BUILD_RC" -ne 0 ]; then
            echo "BUILD FAILED! Exit code: $BUILD_RC"
            echo "=== Last 150 lines of build log ==="
            tail -150 build.log
            exit 1
          fi
          echo "BUILD SUCCESS: $IMAGE"
          ls -lah $IMAGE

      # ===== ANYKERNEL3 ZIP =====
      - name: Package AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          KSUTAG=""
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then KSUTAG="-KSU"; fi

          # Serial Versioning: Castorice-<CustomName>-v<Build>
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-Legacy-${KERNEL_VERSION}${KSUTAG}${STAG}-Redmi12"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          # Use Alexjr2's preconfigured AnyKernel3 for fire
          git clone --depth=1 https://github.com/Alexjr2/AnyKernel3.git -b android-4.19 ak3
          cd ak3

          IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE_SRC" ]; then IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz"; fi
          if [ ! -f "$IMAGE_SRC" ]; then IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image"; fi
          
          cp "$IMAGE_SRC" .
          IMAGE_FILE=$(basename "$IMAGE_SRC")

          DTB="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dts/mediatek/mt6768.dtb"
          if [ -f "$DTB" ]; then cp "$DTB" ./dtb; fi

          if [ -f "tools/x86_64/magiskboot" ] && [ "$IMAGE_FILE" = "Image.gz-dtb" ]; then
            chmod +x tools/x86_64/magiskboot
            ./tools/x86_64/magiskboot split Image.gz-dtb || echo "WARN: magiskboot split failed"
            if [ -f "kernel" ]; then
              mv kernel Image
              rm -f Image.gz-dtb
            fi
          else
            echo "INFO: Keeping $IMAGE_FILE as-is"
            if [ "$IMAGE_FILE" != "Image" ] && [ -f "$IMAGE_FILE" ]; then
              mv "$IMAGE_FILE" Image.gz 2>/dev/null || true
            fi
          fi

          echo "• Built with Castorice Performance Profile" >> banner
          if [ -f "anykernel.sh" ]; then
            sed -i "s/kernel.string=.*/kernel.string=Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} by ${{ inputs.author_name }}/g" anykernel.sh
          fi

          zip -r9 "$GITHUB_WORKSPACE/${BASE_NAME}-AnyKernel3.zip" * -x ".git*" "*.md" "LICENSE"

      - name: Prepare Output
        run: |
          mkdir -p out
          cp "$GITHUB_WORKSPACE/${ZIP_NAME}-AnyKernel3.zip" out/ 2>/dev/null || true
          for img in Image.gz-dtb Image.gz Image; do
            if [ -f "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/$img" ]; then
              cp "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/$img" out/
              break
            fi
          done
          echo "=== Final output ==="
          ls -lah out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-Legacy-4.19-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-Legacy"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • Legacy ${{ env.KERNEL_VERSION }}"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)

            ### Kernel Info
            - **Build**: `Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}`
            - **Base**: Linux ${{ env.KERNEL_VERSION }} (Legacy / non-GKI)
            - **KernelSU-Next**: v${{ env.KSU_VERSION }} (Manual Hook)
            - **SUSFS**: ${{ inputs.enable_susfs }}
            - **Toolchain**: ${{ env.CLANG_VERSION }}

            ### Performance Profile
            - 🎮 **Rhythm Game**: HZ_1000, Full PREEMPT, HRTIMER audio
            - ⚡ **Daily Use**: EAS schedutil, deep-sleep idle, LZ4 ZRAM
            - 🌐 **Network**: TCP BBR, FQ scheduler, IPSet
            - 🧠 **Memory**: ZRAM, KSM, compaction
            - 🖥️ **Display**: LCD 0c/0d touchscreen FIXED

            ### Downloads
            | File | Method |
            |------|--------|
            | `*-AnyKernel3.zip` | Flash via Custom Recovery / Kernel Flasher |
            | `Image.gz-dtb` | Raw kernel image |

            ### Compatibility
            - ✅ MIUI 14.x (Android 13)
            - ✅ HyperOS 1.x (Android 14)
            - ❌ HyperOS 2.x (Android 15) → Use GKI 6.6 build

          files: |
            out/*.zip
            out/Image.gz-dtb
          draft: false
          prerelease: false
