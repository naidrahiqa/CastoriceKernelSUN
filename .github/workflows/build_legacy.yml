name: "ðŸ”¥ Legacy 4.19 â€” KernelSU (No SUSFS)"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      safety_profile:
        description: "Boot safety profile (reserved)"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        default: "zyc-latest"
        options:
          - zyc-latest
          - proton-latest
          - neutron-latest
      release_tag:
        description: "Release Tag (same tag = same release)"
        required: true
        default: "v1.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire

jobs:
  build:
    name: "Legacy 4.19 â€” ${{ inputs.ksu_method }} â€” ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # â”€â”€â”€â”€â”€ Environment Setup â”€â”€â”€â”€â”€
      - name: ðŸ“¥ Checkout
        uses: actions/checkout@v4

      - name: ðŸ§¹ Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: ðŸ’¾ Setup Swap (16GB)
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: ðŸ“¦ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev jq libyaml-dev -y

      - name: ðŸ“¥ Download Clang Toolchain
        run: |
          mkdir -p clang
          TOOLCHAIN="${{ inputs.clang_toolchain }}"

          case "$TOOLCHAIN" in
            zyc-latest)
              echo "ðŸ”¨ Downloading ZyClang (latest)..."
              ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
              ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              ;;
            proton-latest)
              echo "ðŸ”¨ Downloading Proton Clang (latest)..."
              PROTON_URL=$(curl -s https://api.github.com/repos/kdrag0n/proton-clang/releases/latest | jq -r '.assets[0].browser_download_url')
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$PROTON_URL"
              echo "TOOLCHAIN_NAME=ProtonClang" >> $GITHUB_ENV
              ;;
            neutron-latest)
              echo "ðŸ”¨ Downloading Neutron Clang (latest)..."
              NEUTRON_URL=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$NEUTRON_URL"
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              ;;
          esac
          tar -xf clang.tar.gz -C clang/ && rm -f clang.tar.gz

      - name: ðŸŒ  Sync Kernel Source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fire-t-oss kernel
          cd kernel
          echo "KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)" >> $GITHUB_ENV

      # â”€â”€â”€â”€â”€ Patches & Features â”€â”€â”€â”€â”€
      - name: ðŸ“¥ Clone Reference Patches
        run: |
          git clone --depth=1 https://github.com/Alexjr2/KernelSU_Next_SUSFS_fire.git ref_patches
          rm -rf ref_patches/.git

      - name: ðŸ©¹ Apply Device Patches
        run: |
          set -euo pipefail
          cd kernel
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || echo "WARN: optional patch fix_lcm failed"
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || echo "WARN: optional patch primary_display_fix failed"
          sed -i 's/static struct zram_pages_life \*init_pages_life()/static struct zram_pages_life \*init_pages_life(void)/g' drivers/block/zram/zram_drv.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          patch -p1 --forward < ../ref_patches/patchs/ksu_hooks_4.19.patch || { echo "ERROR: ksu_hooks_4.19.patch FAILED"; exit 1; }
          patch -p1 --forward < ../ref_patches/patchs/69_hide_ksu.patch || echo "WARN: 69_hide_ksu failed"
          patch -p1 --forward < ../ref_patches/patchs/fix_kernel_genheaders.patch || echo "WARN: fix_kernel_genheaders failed"
          test -f drivers/kernelsu/Kconfig || { echo "ERROR: required drivers/kernelsu/Kconfig missing after patch stage"; exit 1; }

      - name: ðŸ›¡ï¸  Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          cd kernel
          KSU_METHOD="${{ inputs.ksu_method }}"
          case "$KSU_METHOD" in
            kernelsu-next)
              curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
              ;;
            wildksu)
              git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU
              cp -r KernelSU/kernel drivers/kernelsu
              ;;
            sukisu)
              curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s tmp-builtin
              ;;
            rsukisu)
              curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/builtin/kernel/setup.sh" | bash -s builtin
              ;;
          esac
          KSU_DIR=$(find . -maxdepth 1 -type d -name "KernelSU*" | head -n 1)
          if [ -n "$KSU_DIR" ]; then
            KSU_VERSION=$(cd "$KSU_DIR" && git rev-list --count HEAD)
          else
            KSU_VERSION="unknown"
          fi
          if [ -f "drivers/kernelsu/Kbuild" ]; then
            sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true
          fi
          if [ -d "$KSU_DIR" ]; then
            rm -rf "$KSU_DIR/.git"
          fi
          for patch in KernelSU*/kernel/patches/*.patch 2>/dev/null; do
            [ -f "$patch" ] && patch -p1 --forward < "$patch" || true
          done
          find . -type f -name "*.c" -path "*/KernelSU*/kernel/*" -exec sed -i 's/TWA_RESUME/true/g' {} +

      # â”€â”€â”€â”€â”€ Kernel Configuration â”€â”€â”€â”€â”€
      - name: âš™ï¸  Configure Defconfig
        run: |
          set -euo pipefail
          cd kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          TUNING_PROFILE="${{ inputs.tuning_profile }}"
          add_cfg() { sed -i "/^${1%%=*}=.*/d" "$DEFCONFIG"; echo "$1" >> "$DEFCONFIG"; }
          add_cfg "CONFIG_KSU=y"
          add_cfg "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y"
          add_cfg "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y"
          add_cfg "CONFIG_CPU_FREQ_GOV_ONDEMAND=y"
          add_cfg "CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y"
          if [ "$TUNING_PROFILE" != "social_media" ]; then
            add_cfg "CONFIG_HZ_1000=y"
            add_cfg "CONFIG_HZ=1000"
            add_cfg "CONFIG_PREEMPT=y"
          fi
          add_cfg "CONFIG_ZSMALLOC=y"
          add_cfg "CONFIG_ZRAM=y"
          add_cfg "CONFIG_ZRAM_LZ4_COMPRESS=y"
          add_cfg "CONFIG_ZRAM_WRITEBACK=y"
          add_cfg "CONFIG_TCP_CONG_BBR=y"
          add_cfg 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          add_cfg "CONFIG_NET_SCH_FQ=y"
          add_cfg 'CONFIG_DEFAULT_NET_SCH="fq"'
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          case "$GOVERNOR" in
            performance) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" ;;
            ondemand) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" ;;
            conservative) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" ;;
            *) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" ;;
          esac
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}"
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG

      - name: ðŸ”¨ Patch Clang Warnings
        run: |
          cd kernel
          sed -i 's/-Wno-format-invalid-specifier//g' Makefile || true
          sed -i 's/-Wno-gnu-empty-initializer//g' Makefile || true
          find drivers sound -name "Makefile" -exec sed -i 's/-Werror//g' {} + || true

      # â”€â”€â”€â”€â”€ Build & Package â”€â”€â”€â”€â”€
      - name: ðŸ”¨ Build Kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- fire_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip KCFLAGS="-Wno-all -Wno-error" KCPPFLAGS="-Wno-all -Wno-error" 2>&1 | tee build.log
          [ ! -f out/arch/arm64/boot/Image.gz-dtb ] && echo "BUILD FAILED" && tail -100 build.log && exit 1
          echo "BUILD SUCCESS"

      - name: ðŸ“¤ Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-legacy-4.19-${{ inputs.ksu_method }}
          path: kernel/build.log
          retention-days: 7

      - name: ðŸ“¦ Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [Legacy 4.19 | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' '# AnyKernel3' 'properties() {' "kernel.string=${KERNEL_STRING}" 'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=13,14' '}' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb .

          # Convert to short names
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac

          # Get Clang version
          CLANG_VER=$(../clang/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
          TOOLCHAIN_SHORT="${TOOLCHAIN_NAME}"

          # New naming: Castorice-<Name>-v<N>-Leg419-<Root>-NoSUSFS-<Gov>-<Toolchain><Ver>-Redmi12
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-Leg419-${ROOT_SHORT}-NoSUSFS-${GOV_SHORT}-${TOOLCHAIN_SHORT}${CLANG_VER}-Redmi12"
          zip -r9 "../${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

      - name: ðŸš€ Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Castorice Kernel ${{ inputs.release_tag }}"
          body: |
            ## ðŸ”¥ Build: Legacy 4.19 (No SUSFS) - ${{ inputs.ksu_method }} - ${{ inputs.cpu_governor }}

            **Build Info:**
            - ðŸ ·ï¸  Variant: Legacy 4.19 (No SUSFS)
            - ðŸ”‘ Root: ${{ inputs.ksu_method }}
            - âš™ï¸  Governor: ${{ inputs.cpu_governor }}
            - 🔨 Toolchain: ${{ inputs.clang_toolchain }}
            - ðŸ“… Built: ${{ github.event.repository.updated_at }}

            **Features:**
            - âœ… HZ_1000, Full PREEMPT
            - âœ… All CPU Governors built-in
            - âœ… TCP BBR, LZ4 ZRAM
            - âœ… Device-specific patches (LCM 0c/0d fix)

            **Compatibility:**
            - âœ… MIUI 14 (Android 13)
            - âœ… HyperOS 1.x (Android 14)
            - âŒ HyperOS 2.x â†’ use GKI 6.6

            ---
          files: "*.zip"
          draft: false
          prerelease: false
          append_body: true
