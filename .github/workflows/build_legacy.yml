name: Build Castorice Legacy (4.19)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Kernel Author Name"
        required: true
        default: "Castorice"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire

jobs:
  build:
    name: "Castorice Legacy 4.19"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf \
            build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
            libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make \
            optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl \
            libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev \
            libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip \
            device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev \
            jq libyaml-dev -y

      - name: Download ZyClang
        run: |
          mkdir -p clang
          ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
          ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
          ZYCLANG_DLINK="https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
          aria2c -x16 -s16 -k1M -o zyclang.tar.gz "$ZYCLANG_DLINK"
          tar -xf zyclang.tar.gz -C clang/
          rm -f zyclang.tar.gz

      - name: Sync Kernel Source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fire-t-oss kernel
          cd kernel
          KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)
          echo "KERNEL_HEAD_HASH=$KERNEL_HEAD_HASH" >> $GITHUB_ENV

      - name: Clone Reference Patches
        run: |
          git clone --depth=1 https://github.com/Alexjr2/KernelSU_Next_SUSFS_fire.git ref_patches

      - name: Apply Device Patches
        run: |
          cd kernel
          
          # LCM Fixes
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || true
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || true
          
          # MTK ACCDET CONFLICT FIX
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true

          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            patch -p1 --forward < ../ref_patches/patchs/ksu_hooks_4.19.patch || true
            patch -p1 --forward < ../ref_patches/patchs/69_hide_ksu.patch || true
          fi
          patch -p1 --forward < ../ref_patches/patchs/fix_kernel_genheaders.patch || true
          
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            patch -p1 --forward < ../ref_patches/patchs/50_add_susfs_in_kernel-4.19.patch || true
            sed -i "s/poofed_size: '%u'/poofed_size: '%llu'/g" ./fs/susfs.c 2>/dev/null || true
            sed -i "s/length of string: %u/length of string: %lu/g" ./fs/susfs.c 2>/dev/null || true
          fi

      - name: Setup KernelSU-Next
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          
          # Fix git version
          KSU_VERSION=$(cd KernelSU-Next && git rev-list --count HEAD)
          sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild 2>/dev/null || true
          
          # Apply manual patches for 4.19
          echo "Applying KSU manual patches..."
          for patch in KernelSU-Next/kernel/patches/*.patch; do
            patch -p1 --forward < "$patch" || true
          done
          
          # Fix task_work_add compatibility for 4.19 (TWA_RESUME -> true)
          find ./KernelSU-Next/kernel -type f -name "*.c" -exec sed -i 's/TWA_RESUME/true/g' {} +

      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          
          cp -rv susfs4ksu/kernel_patches/fs/* fs/
          cp -rv susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          if ! grep -q "susfs.o" fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
          fi
          
          # Integrate SUSFS into KSU
          if [ -d "drivers/kernelsu" ]; then
            sed -i '/#include <linux\/workqueue.h>/a #include <linux\/susfs.h>' drivers/kernelsu/core/init.c 2>/dev/null || true
            sed -i 's/ksu_core_init(/susfs_init();\n    ksu_core_init(/g' drivers/kernelsu/core/init.c 2>/dev/null || true
            sed -i '/#include <linux\/version.h>/a #include <linux\/susfs.h>' drivers/kernelsu/supercall/dispatch.c 2>/dev/null || true
            
            {
              echo 'config KSU_SUSFS'
              echo '  bool "KernelSU addon - SUSFS"'
              echo '  depends on KSU'
              echo '  default y'
              echo 'config KSU_SUSFS_SUS_PATH'
              echo '  bool "Enable to hide suspicious path"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_SUS_MOUNT'
              echo '  bool "Enable to hide suspicious mounts"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_SUS_KSTAT'
              echo '  bool "Enable to spoof suspicious kstat"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_SPOOF_UNAME'
              echo '  bool "Enable to spoof uname"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_ENABLE_LOG'
              echo '  bool "Enable logging susfs log to kernel"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS'
              echo '  bool "Enable to hide ksu and susfs symbols from /proc/kallsyms"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG'
              echo '  bool "Enable to spoof bootconfig or cmdline"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_OPEN_REDIRECT'
              echo '  bool "Enable open redirect"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
              echo 'config KSU_SUSFS_SUS_MAP'
              echo '  bool "Enable to hide mmapped real file from proc maps"'
              echo '  depends on KSU_SUSFS'
              echo '  default y'
            } >> drivers/kernelsu/Kconfig
          fi

      - name: Configure Defconfig
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"
          
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
          
          # Optimization
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_HZ=1000" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_PREEMPT_VOLUNTARY=n" >> $DEFCONFIG
          
          # Memory
          echo "CONFIG_ZSMALLOC=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_LZ4_COMPRESS=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_WRITEBACK=y" >> $DEFCONFIG
          
          # Network & IO
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          echo "CONFIG_DEFAULT_NET_SCH=\"fq\"" >> $DEFCONFIG
          
          # Localversion
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}"
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG

      - name: Patch Clang Warnings
        run: |
          cd kernel
          sed -i 's/-Wno-format-invalid-specifier//g' Makefile || true
          sed -i 's/-Wno-gnu-empty-initializer//g' Makefile || true

      - name: Build Kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          export CROSS_COMPILE="aarch64-linux-gnu-"
          export CROSS_COMPILE_ARM32="arm-linux-gnueabi-"
          export CC="clang"
          
          make O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            fire_defconfig
            
          make -j$(nproc) O=out ARCH=arm64 CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-Wno-all -Wno-error" KCPPFLAGS="-Wno-all -Wno-error"

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          
          {
            echo 'properties() {'
            echo '  kernel.string=Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} by ${{ inputs.author_name }}'
            echo '  do.devicecheck=1'
            echo '  do.modules=0'
            echo '  do.systemless=1'
            echo '  do.cleanup=1'
            echo '  device.name1=fire'
            echo '  device.name2=Redmi 12'
            echo '  supported.versions=13,14'
            echo '}'
            echo 'block=boot;'
            echo 'is_slot_device=auto;'
            echo 'ramdisk_compression=auto;'
            echo 'patch_vbmeta_flag=auto;'
            echo '. tools/ak3-core.sh;'
            echo 'dump_boot;'
            echo 'write_boot;'
          } > anykernel.sh
          
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb . || true
          BASE_NAME="Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-Legacy-4.19-Redmi12"
          zip -r9 "../${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-Legacy"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • Legacy 4.19"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)
            ### Info
            - **Base**: Legacy 4.19
            - **KernelSU-Next**: YES
            - **SUSFS**: YES
          files: |
            *.zip
