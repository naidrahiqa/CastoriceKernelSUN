name: Build Castorice Legacy (4.19)

on:
  workflow_dispatch:
    inputs:
      author_name:
        description: "Kernel Author Name"
        required: true
        default: "Castorice"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Placeholders for dynamically set variables to prevent IDE warnings
  CLANG_VERSION: ""
  LLD_VERSION: ""
  KERNEL_HEAD_HASH: ""
  KSU_DIR: ""
  KSU_VERSION: ""
  KERNEL_VERSION: ""
  ZIP_NAME: ""

jobs:
  build:
    name: "Castorice Legacy 4.19"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Swap
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf \
            build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
            libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make \
            optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl \
            libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev \
            libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip \
            device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev \
            jq libyaml-dev -y

      # ===== TOOLCHAIN =====
      - name: Download ZyClang (Latest)
        run: |
          ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
          ZYASSET=$(curl -sL https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG | grep -oP '[^/"]+\.tar.gz' | head -n1)
          ZYCLANG_DLINK="https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"

          echo "Downloading: $ZYCLANG_DLINK"
          mkdir -p $GITHUB_WORKSPACE/ZyClang
          aria2c -s16 -x16 -k1M "$ZYCLANG_DLINK" -o ZyClang.tar.gz
          tar -C $GITHUB_WORKSPACE/ZyClang/ -zxf ZyClang.tar.gz
          rm -f ZyClang.tar.gz

          CLANG_VERSION=$($GITHUB_WORKSPACE/ZyClang/bin/clang --version | head -n 1)
          LLD_VERSION=$($GITHUB_WORKSPACE/ZyClang/bin/ld.lld --version | head -n 1)
          echo "CLANG_VERSION=$CLANG_VERSION" >> $GITHUB_ENV
          echo "LLD_VERSION=$LLD_VERSION" >> $GITHUB_ENV
          echo "Clang: $CLANG_VERSION"
          echo "LLD: $LLD_VERSION"

      # ===== KERNEL SOURCE =====
      - name: Clone Kernel Source (Xiaomi fire-t-oss)
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            -b fire-t-oss $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)
          echo "KERNEL_HEAD_HASH=$KERNEL_HEAD_HASH" >> $GITHUB_ENV
          echo "Kernel HEAD: $KERNEL_HEAD_HASH"

      # ===== KERNELSU-NEXT (LEGACY) =====
      - name: Setup KernelSU-Next (Legacy)
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/sidex15/KernelSU-Next/legacy/kernel/setup.sh" | bash -s legacy

          KSU_DIR=""
          if [ -d "KernelSU-Next" ]; then
            KSU_DIR="KernelSU-Next"
          elif [ -d "KernelSU" ]; then
            KSU_DIR="KernelSU"
          else
            echo "ERROR: KernelSU directory not found!"
            exit 1
          fi

          KSU_GIT_VERSION=$(cd $KSU_DIR && git rev-list --count legacy)
          KERNELSU_VERSION=$(($KSU_GIT_VERSION + 30000 + 60))
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KSU_VERSION=$KERNELSU_VERSION" >> $GITHUB_ENV
          echo "KernelSU-Next Legacy installed - version $KERNELSU_VERSION"

      # ===== SUSFS =====
      - name: Setup SUSFS (kernel-4.19)
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19

          cd $GITHUB_WORKSPACE/kernel
          # Copy SUSFS source files
          echo "Copying SUSFS files..."
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          echo "Verifying copied files:"
          ls -la include/linux/susfs*
          ls -la fs/susfs*
          echo "SUSFS source files copied"

      # ===== PATCHES =====
      - name: Clone Reference Patches
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/Alexjr2/KernelSU_Next_SUSFS_fire.git ref_patches
          echo "=== Available patches ==="
          ls -la ref_patches/patchs/ || true

      - name: Apply Patches
        run: |
          cd $GITHUB_WORKSPACE/kernel

          # Apply KSU hooks for 4.19 (manual hook, NO kprobes)
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "Applying KSU hooks patch..."
            patch -p1 --forward < ../ref_patches/patchs/ksu_hooks_4.19.patch || echo "WARN: ksu_hooks patch had issues"

            echo "Applying hide KSU patch..."
            patch -p1 --forward < ../ref_patches/patchs/69_hide_ksu.patch || echo "WARN: hide_ksu patch had issues"
          fi

          # Fix kernel genheaders (build fix)
          echo "Applying genheaders fix..."
          patch -p1 --forward < ../ref_patches/patchs/fix_kernel_genheaders.patch || echo "WARN: genheaders patch had issues"

          # SUSFS kernel integration patch
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            echo "Applying SUSFS kernel patch..."
            patch -p1 --forward < ../ref_patches/patchs/50_add_susfs_in_kernel-4.19.patch || echo "WARN: susfs patch had issues"

            # Fix SUSFS format strings for 4.19
            sed -i "s/poofed_size: '%u'/poofed_size: '%llu'/g" ./fs/susfs.c 2>/dev/null || true
            sed -i "s/length of string: %u/length of string: %lu/g" ./fs/susfs.c 2>/dev/null || true

            # Fix task_work_add compatibility
            if [ -d "KernelSU-Next" ]; then
              sed -i "/task_work_add(tsk, cb, TWA_RESUME);/c\\
          #if LINUX_VERSION_CODE >= KERNEL_VERSION(5, 10, 0)\\
          \\ttask_work_add(tsk, cb, TWA_RESUME);\\
          #else\\
          \\ttask_work_add(tsk, cb, true);\\
          #endif" ./KernelSU-Next/kernel/allowlist.c 2>/dev/null || true
            fi
          fi

          # ===== LCD 0c/0d FIX (CRITICAL FOR TOUCHSCREEN) =====
          echo "Applying LCM fix (LCD 0c/0d touchscreen fix)..."
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || echo "WARN: fix_lcm patch had issues"

          echo "Applying primary display fix..."
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || echo "WARN: primary_display_fix patch had issues"

          echo "All patches applied"

      # ===== DEFCONFIG =====
      - name: Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"

          # Use reference fire_defconfig as base (stock Xiaomi)
          if [ -f "../ref_patches/fire_defconfig" ]; then
            echo "Using reference fire_defconfig..."
            cp ../ref_patches/fire_defconfig $DEFCONFIG
          fi

          # KernelSU configs
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# KernelSU-Next (Legacy Manual Hook)" >> $DEFCONFIG
            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG
          fi

          # SUSFS configs
          if [ "${{ inputs.enable_susfs }}" = "true" ] && [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
          fi

          # Memory & CPU Optimization
          echo "" >> $DEFCONFIG
          echo "# Memory Optimization" >> $DEFCONFIG
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZSMALLOC=y" >> $DEFCONFIG
          echo "CONFIG_COMPACTION=y" >> $DEFCONFIG
          echo "CONFIG_KSM=y" >> $DEFCONFIG
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG

          # Networking (stable performance)
          echo "" >> $DEFCONFIG
          echo "# Networking Performance" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $DEFCONFIG
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> $DEFCONFIG

          # IPSet Support
          echo "" >> $DEFCONFIG
          echo "# IPSet" >> $DEFCONFIG
          echo "CONFIG_IP_SET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_MAX=65534" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_MAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_LIST_SET=y" >> $DEFCONFIG

          # Branding / Vermagic (MUST MATCH STOCK OR WIFI BREAKS)
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          sed -i 's/CONFIG_LOCALVERSION=".*"/CONFIG_LOCALVERSION="-Castorice-perf-g2da4f2613486"/' $DEFCONFIG

          echo "=== Defconfig tail ==="
          tail -40 $DEFCONFIG

      # ===== COMPILER FIXES (Modern Clang vs 4.19) =====
      - name: Fix Compiler Errors
        run: |
          cd $GITHUB_WORKSPACE/kernel
          
          echo "=== Fixing modern Clang vs 4.19 incompatibilities ==="
          
          # CRITICAL FIX: The old regex 's/-Werror\b//g' would strip -Werror
          # from compound flags like '-Werror=return-type', leaving '=return-type'
          # as a standalone argument. Clang then sees:
          #   error: no such file or directory: '=return-type'
          #   error: unknown argument: '-implicit-function-declaration'
          
          # Step 1: Remove ENTIRE compound -Werror=xxx flags (must come first!)
          echo "Removing compound -Werror=xxx flags..."
          find . -type f -name "Makefile" -exec sed -i 's/-Werror=[a-zA-Z_-]*//g' {} +
          find . -type f -name "Kbuild" -exec sed -i 's/-Werror=[a-zA-Z_-]*//g' {} +
          
          # Step 2: Remove standalone -Werror (now safe since compounds are gone)
          echo "Removing standalone -Werror..."
          find . -type f -name "Makefile" -exec sed -i 's/ -Werror / /g; s/ -Werror$//g; s/^-Werror //g' {} +
          find . -type f -name "Kbuild" -exec sed -i 's/ -Werror / /g; s/ -Werror$//g; s/^-Werror //g' {} +
          
          # Step 3: Remove GCC-specific warning flags that clang doesn't understand
          # These cause 'unknown argument' errors with modern clang
          echo "Removing clang-incompatible warning flags..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/-Wno-unused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wno-unused-but-set-parameter//g' {} + \
            -exec sed -i 's/-Wunused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wunused-but-set-parameter//g' {} +
          
          # Step 4: Fix strict-prototypes (clang 15+ enforces C2x no-K&R rule)
          echo "Fixing strict-prototypes issues..."
          if [ -f "drivers/block/zram/zram_drv.c" ]; then
            sed -i 's/zram_debugfs_init()/zram_debugfs_init(void)/g' drivers/block/zram/zram_drv.c
            sed -i 's/zram_debugfs_destroy()/zram_debugfs_destroy(void)/g' drivers/block/zram/zram_drv.c
          fi
          
          # Step 5: Patch top-level Makefile to add clang compat flags
          # This suppresses warnings that would otherwise be fatal with -Werror
          if [ -f "Makefile" ]; then
            echo "Adding clang compatibility CFLAGS..."
            # Use individual appends to avoid Makefile syntax errors from leading whitespace
            sed -i '/^KBUILD_CFLAGS.*:=/a KBUILD_CFLAGS += -Wno-error' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-error$/a KBUILD_CFLAGS += -Wno-implicit-function-declaration' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-implicit-function-declaration$/a KBUILD_CFLAGS += -Wno-strict-prototypes' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-strict-prototypes$/a KBUILD_CFLAGS += -Wno-return-type' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-return-type$/a KBUILD_CFLAGS += -Wno-unknown-warning-option' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-unknown-warning-option$/a KBUILD_CFLAGS += -Wno-int-conversion' Makefile
            sed -i '/^KBUILD_CFLAGS += -Wno-int-conversion$/a KBUILD_CFLAGS += -Wno-unused-function' Makefile
          fi
          
          echo "=== Compiler fixes applied ==="

      # ===== BUILD =====
      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel

          export KBUILD_BUILD_USER=Castorice
          export KBUILD_BUILD_HOST=naidrahiqa
          export KBUILD_BUILD_VERSION=1

          ARGS="PATH=$GITHUB_WORKSPACE/ZyClang/bin:$PATH \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            NM=llvm-nm \
            CXX=clang++ \
            AR=llvm-ar \
            LD=ld.lld \
            STRIP=llvm-strip \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            OBJSIZE=llvm-size \
            READELF=llvm-readelf \
            HOSTAR=llvm-ar \
            HOSTLD=ld.lld \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1"

          # Generate .config
          rm -rf out
          make O=out $ARGS fire_defconfig

          KERNEL_VERSION=$(make O=out $ARGS kernelversion 2>/dev/null | grep "4.19")
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          echo "=== Building Linux $KERNEL_VERSION ==="

          # Build
          make O=out $ARGS -j"$(nproc --all)" 2>&1 | tee build.log

          # Verify
          IMAGE="out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE" ]; then
            echo "BUILD FAILED! Image.gz-dtb not found"
            tail -100 build.log
            exit 1
          fi
          echo "BUILD SUCCESS: $IMAGE"
          ls -lah $IMAGE

      # ===== ANYKERNEL3 ZIP =====
      - name: Package AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          KSUTAG=""
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then KSUTAG="-KSU_Next"; fi
          BASE_NAME="Castorice-Legacy-${KERNEL_VERSION}${KSUTAG}${STAG}-fire-$(date +%Y%m%d)"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          # Use Alexjr2's preconfigured AnyKernel3 for fire
          git clone --depth=1 https://github.com/Alexjr2/AnyKernel3.git -b android-4.19 ak3
          cd ak3

          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb .
          DTB="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dts/mediatek/mt6768.dtb"
          if [ -f "$DTB" ]; then cp "$DTB" ./dtb; fi

          if [ -f "tools/x86_64/magiskboot" ]; then
            chmod +x tools/x86_64/magiskboot
            ./tools/x86_64/magiskboot split Image.gz-dtb || echo "WARN: magiskboot split failed"
            if [ -f "kernel" ]; then
              mv kernel Image
              rm -f Image.gz-dtb
            fi
          else
            echo "WARN: AnyKernel3 magiskboot not found, keeping Image.gz-dtb as-is"
          fi

          echo "• Built with Castorice Performance Profile" >> banner
          if [ -f "anykernel.sh" ]; then
            sed -i "s/kernel.string=.*/kernel.string=Castorice Legacy Kernel by ${{ inputs.author_name }}/g" anykernel.sh
          fi

          zip -r9 "$GITHUB_WORKSPACE/${BASE_NAME}-AnyKernel3.zip" * -x ".git*" "*.md" "LICENSE"

      - name: Prepare Output
        run: |
          mkdir -p out
          cp $GITHUB_WORKSPACE/${ZIP_NAME}-AnyKernel3.zip out/ 2>/dev/null || true
          cp $GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb out/ 2>/dev/null || true
          echo "=== Final output ==="
          ls -lah out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-Legacy-4.19-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v4.19-castorice-legacy-${{ github.run_number }}"
          name: "Castorice Legacy ${{ env.KERNEL_VERSION }} — Redmi 12 Fire"
          body: |
            ## ⚡ Castorice Legacy Kernel for Redmi 12 (fire)
            
            ### Kernel Info
            - **Kernel**: ${{ env.KERNEL_VERSION }}-Castorice
            - **Type**: Legacy (non-GKI)
            - **KernelSU-Next**: v${{ env.KSU_VERSION }} (Legacy Manual Hook)
            - **SUSFS**: ${{ inputs.enable_susfs }}
            - **Toolchain**: ${{ env.CLANG_VERSION }}
            
            ### Features
            - 🛡️ KernelSU-Next + SUSFS
            - 🧠 Memory: ZRAM, KSM, compaction
            - 🌐 Network: TCP BBR, IPSet, TTL
            - 🖥️ LCD 0c/0d: FIXED
            
            ### Downloads
            | File | Method |
            |------|--------|
            | `*-AnyKernel3.zip` | Flash via Custom Recovery or Kernel Flasher |
            | `Image.gz-dtb` | Raw kernel image |
            
            ### Compatibility
            - ✅ MIUI 14.x (Android 13)
            - ✅ HyperOS 1.x (Android 14)
            - ❌ HyperOS 2.x (Android 15) → Use GKI 6.6
            
          files: |
            out/*.zip
            out/Image.gz-dtb
          draft: false
          prerelease: false
