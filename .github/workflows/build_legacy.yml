name: Build Castorice Legacy (4.19)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Kernel Author Name"
        required: true
        default: "Castorice"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Placeholders for dynamically set variables to prevent IDE warnings
  CLANG_VERSION: ""
  LLD_VERSION: ""
  KERNEL_HEAD_HASH: ""
  KSU_DIR: ""
  KSU_VERSION: ""
  KERNEL_VERSION: ""
  ZIP_NAME: ""

jobs:
  build:
    name: "Castorice Legacy 4.19"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup Broken Submodules
        run: |
          rm -f .gitmodules
          git rm --cached temp_susfs 2>/dev/null || true
          git config --remove-section submodule.temp_susfs 2>/dev/null || true

      - name: Maximize Disk Space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Swap
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf \
            build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 \
            libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make \
            optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl \
            libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev \
            libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip \
            device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev \
            jq libyaml-dev -y

      # ===== TOOLCHAIN =====
      - name: Download ZyClang (Latest)
        run: |
          ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
          if [ -z "$ZYCLANG" ]; then echo "FATAL: Cannot resolve ZyClang latest release"; exit 1; fi

          ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
          if [ -z "$ZYASSET" ]; then echo "FATAL: Cannot find ZyClang tarball asset"; exit 1; fi

          ZYCLANG_DLINK="https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
          echo "Downloading: $ZYCLANG_DLINK"
          mkdir -p "$GITHUB_WORKSPACE/ZyClang"
          aria2c -s16 -x16 -k1M "$ZYCLANG_DLINK" -o ZyClang.tar.gz
          tar -C "$GITHUB_WORKSPACE/ZyClang/" -zxf ZyClang.tar.gz
          rm -f ZyClang.tar.gz

          # Validate toolchain binaries exist
          if [ ! -x "$GITHUB_WORKSPACE/ZyClang/bin/clang" ]; then
            echo "FATAL: clang binary not found after extraction"; exit 1
          fi

          CLANG_VERSION=$("$GITHUB_WORKSPACE/ZyClang/bin/clang" --version | head -n 1)
          LLD_VERSION=$("$GITHUB_WORKSPACE/ZyClang/bin/ld.lld" --version | head -n 1)
          echo "CLANG_VERSION=$CLANG_VERSION" >> $GITHUB_ENV
          echo "LLD_VERSION=$LLD_VERSION" >> $GITHUB_ENV
          echo "Clang: $CLANG_VERSION"
          echo "LLD: $LLD_VERSION"

      # ===== KERNEL SOURCE =====
      - name: Clone Kernel Source (Xiaomi fire-t-oss)
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            -b fire-t-oss $GITHUB_WORKSPACE/kernel
          cd $GITHUB_WORKSPACE/kernel
          KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)
          echo "KERNEL_HEAD_HASH=$KERNEL_HEAD_HASH" >> $GITHUB_ENV
          echo "Kernel HEAD: $KERNEL_HEAD_HASH"

      # ===== KERNELSU-NEXT (LEGACY) =====
      - name: Setup KernelSU-Next (Legacy)
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/sidex15/KernelSU-Next/legacy/kernel/setup.sh" | bash -s legacy

          KSU_DIR=""
          if [ -d "KernelSU-Next" ]; then
            KSU_DIR="KernelSU-Next"
          elif [ -d "KernelSU" ]; then
            KSU_DIR="KernelSU"
          else
            echo "ERROR: KernelSU directory not found!"
            exit 1
          fi

          KSU_GIT_VERSION=$(cd $KSU_DIR && git rev-list --count legacy)
          KERNELSU_VERSION=$(($KSU_GIT_VERSION + 30000 + 60))
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KSU_VERSION=$KERNELSU_VERSION" >> $GITHUB_ENV
          echo "KernelSU-Next Legacy installed - version $KERNELSU_VERSION"

      # ===== SUSFS =====
      - name: Setup SUSFS (kernel-4.19)
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19

          cd $GITHUB_WORKSPACE/kernel
          # Copy SUSFS source files
          echo "Copying SUSFS files..."
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          echo "Verifying copied files:"
          ls -la include/linux/susfs*
          ls -la fs/susfs*
          echo "SUSFS source files copied"

      # ===== PATCHES =====
      - name: Clone Reference Patches
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/Alexjr2/KernelSU_Next_SUSFS_fire.git ref_patches
          echo "=== Available patches ==="
          ls -la ref_patches/patchs/ || true

      - name: Apply Patches
        run: |
          cd $GITHUB_WORKSPACE/kernel

          # Apply KSU hooks for 4.19 (manual hook, NO kprobes)
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "Applying KSU hooks patch..."
            patch -p1 --forward < ../ref_patches/patchs/ksu_hooks_4.19.patch || echo "WARN: ksu_hooks patch had issues"

            echo "Applying hide KSU patch..."
            patch -p1 --forward < ../ref_patches/patchs/69_hide_ksu.patch || echo "WARN: hide_ksu patch had issues"
          fi

          # Fix kernel genheaders (build fix)
          echo "Applying genheaders fix..."
          patch -p1 --forward < ../ref_patches/patchs/fix_kernel_genheaders.patch || echo "WARN: genheaders patch had issues"

          # SUSFS kernel integration patch
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            echo "Applying SUSFS kernel patch..."
            patch -p1 --forward < ../ref_patches/patchs/50_add_susfs_in_kernel-4.19.patch || echo "WARN: susfs patch had issues"

            # Fix SUSFS format strings for 4.19
            sed -i "s/poofed_size: '%u'/poofed_size: '%llu'/g" ./fs/susfs.c 2>/dev/null || true
            sed -i "s/length of string: %u/length of string: %lu/g" ./fs/susfs.c 2>/dev/null || true

            # Fix task_work_add compatibility for 4.19 (TWA_RESUME -> true)
            if [ -d "KernelSU-Next" ]; then
              find ./KernelSU-Next/kernel -type f -name "*.c" -exec sed -i 's/TWA_RESUME/true/g' {} +
            elif [ -d "KernelSU" ]; then
              find ./KernelSU/kernel -type f -name "*.c" -exec sed -i 's/TWA_RESUME/true/g' {} +
            fi

            # --- Integrate SUSFS into KernelSU-Next ---
            echo "=== Integrating SUSFS into KernelSU-Next (Legacy) ==="
            KSU_KERNEL="KernelSU-Next/kernel"
            if [ ! -d "$KSU_KERNEL" ]; then KSU_KERNEL="KernelSU/kernel"; fi

            if [ -d "$KSU_KERNEL" ]; then
              # 1. Inject SUSFS Kconfig
              if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
                {
                  echo ''
                  echo 'menu "KernelSU - SUSFS"'
                  echo 'config KSU_SUSFS'
                  printf '\tbool "KernelSU addon - SUSFS"\n'
                  printf '\tdepends on KSU\n'
                  printf '\tdefault y\n'
                  printf '\thelp\n'
                  printf '\t  Patch and Enable SUSFS to kernel with KernelSU.\n'
                  echo ''
                  echo 'config KSU_SUSFS_SUS_PATH'
                  printf '\tbool "Enable to hide suspicious path"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_SUS_MOUNT'
                  printf '\tbool "Enable to hide suspicious mounts"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_SUS_KSTAT'
                  printf '\tbool "Enable to spoof suspicious kstat"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_SPOOF_UNAME'
                  printf '\tbool "Enable to spoof uname"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_ENABLE_LOG'
                  printf '\tbool "Enable logging susfs log to kernel"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS'
                  printf '\tbool "Enable to hide ksu and susfs symbols from /proc/kallsyms"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG'
                  printf '\tbool "Enable to spoof /proc/bootconfig or /proc/cmdline"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_OPEN_REDIRECT'
                  printf '\tbool "Enable to redirect a path to be opened with another path"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'config KSU_SUSFS_SUS_MAP'
                  printf '\tbool "Enable to hide mmapped real file from proc maps"\n'
                  printf '\tdepends on KSU_SUSFS\n'
                  printf '\tdefault y\n'
                  echo ''
                  echo 'endmenu'
                } >> "$KSU_KERNEL/Kconfig"
              fi

              # 2. Inject SUSFS Makefile entries
              if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
                {
                  echo ''
                  echo '## For susfs stuff ##'
                  echo 'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)'
                  echo '$(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E '"'"'^#define SUSFS_VERSION'"'"' | cut -d'"'"' '"'"' -f3 | sed '"'"'s/"//g'"'"'))'
                  echo '$(info )'
                  echo '$(info -- SUSFS_VERSION: $(SUSFS_VERSION))'
                  echo 'else'
                  echo '$(info -- You have not integrated susfs in your kernel yet.)'
                  echo '$(info -- Read: https://gitlab.com/simonpunk/susfs4ksu)'
                  echo 'endif'
                } >> "$KSU_KERNEL/Makefile"
              fi

              # 2b. Inject SUSFS source compilation into fs/Makefile (Fix undefined symbols)
              # NOTE: obj-y += ../../fs/susfs.o from KSU subdir is ILLEGAL in Kbuild.
              # susfs.c must be compiled from fs/ directory via fs/Makefile.
              if [ -f "fs/Makefile" ] && ! grep -q "susfs.o" "fs/Makefile"; then
                echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> "fs/Makefile"
                echo "Registered susfs.o in fs/Makefile"
              fi

              # 2c. Ensure SUSFS header is accessible
              if [ ! -f "include/linux/susfs.h" ]; then
                cp ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/ 2>/dev/null || true
              fi

              # 3. Inject susfs.h include into core/init.c
              if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/core/init.c"; then
                sed -i '/#include <linux\/workqueue.h>/a #include <linux/susfs.h>' "$KSU_KERNEL/core/init.c"
              fi

              # 4. Inject susfs_init() call into core/init.c
              if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs_init" "$KSU_KERNEL/core/init.c"; then
                INIT_FILE="$KSU_KERNEL/core/init.c"
                INJECT_PY=$(mktemp /tmp/inject_susfs_XXXXXX.py)
                echo 'import sys' > "$INJECT_PY"
                echo 'path = sys.argv[1]' >> "$INJECT_PY"
                echo 'with open(path, "r") as f: content = f.read()' >> "$INJECT_PY"
                echo 'injection = "#ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif\n"' >> "$INJECT_PY"
                echo 'if "susfs_init" not in content and "ksu_feature_init" in content:' >> "$INJECT_PY"
                echo '    content = content.replace("ksu_feature_init", injection + "\tksu_feature_init", 1)' >> "$INJECT_PY"
                echo '    with open(path, "w") as f: f.write(content)' >> "$INJECT_PY"
                echo '    print("susfs_init injected before ksu_feature_init")' >> "$INJECT_PY"
                echo 'else: print("Skipped: susfs_init already present or ksu_feature_init not found")' >> "$INJECT_PY"
                python3 "$INJECT_PY" "$INIT_FILE"
                rm -f "$INJECT_PY"
              fi

              # 5. Inject susfs includes into supercall.c or dispatch.c
              if [ -f "$KSU_KERNEL/supercall/dispatch.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/supercall/dispatch.c"; then
                sed -i '/#include <linux\/version.h>/a #include <linux/susfs.h>' "$KSU_KERNEL/supercall/dispatch.c"
              elif [ -f "$KSU_KERNEL/supercall/supercall.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/supercall/supercall.c"; then
                sed -i '/#include <linux\/version.h>/a #include <linux/susfs.h>' "$KSU_KERNEL/supercall/supercall.c"
              fi

              # 6. Create __weak stubs to prevent linker undefined symbol errors
              echo "=== Creating KSU/SUSFS weak stubs (linker safety net) ==="
              # We place this in fs/ instead of KSU_KERNEL to ensure it's ALWAYS compiled
              # even if CONFIG_KSU is mysteriously dropped during make defconfig.
              KSU_STUBS="fs/ksu_hooks_stubs.c"
              {
                echo '// Auto-generated __weak stubs for KSU/SUSFS hook functions'
                echo '#include <linux/types.h>'
                echo '#include <linux/errno.h>'
                echo '#include <linux/fs.h>'
                echo '#include <linux/compiler.h>'
                echo ''
                echo '#define KSU_WEAK_HOOK(ret, name, ...) \'
                echo '    ret __attribute__((weak)) name(__VA_ARGS__) { return 0; }'
                echo ''
                echo '#define KSU_WEAK_HOOK_BOOL(ret, name, ...) \'
                echo '    ret __attribute__((weak)) name(__VA_ARGS__) { return false; }'
                echo ''
                echo '// KSU hooks'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_sys_reboot, void)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_prctl, int p1, unsigned long p2, unsigned long p3, unsigned long p4, unsigned long p5)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_faccessat, int *p1, const char __user **p2, int *p3, int *p4)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_stat, int *p1, const char __user **p2, int *p3)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setregid, gid_t p1, gid_t p2)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setgid, gid_t p1)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setresgid, gid_t p1, gid_t p2, gid_t p3)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setfsgid, gid_t p1)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setuid, uid_t p1)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setreuid, uid_t p1, uid_t p2)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setresuid, uid_t p1, uid_t p2, uid_t p3)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_setfsuid, uid_t p1)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_execveat_sucompat, int *p1, const char __user **p2, void *p3, void *p4, int *p5)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_execveat, int p1, const char __user *p2, const char __user *const __user *p3, const char __user *const __user *p4, int p5)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_devpts, struct inode *p1)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_input_handle_event, unsigned int p1, unsigned int p2, int p3)'
                echo 'KSU_WEAK_HOOK_BOOL(bool, ksu_is_input_hook_enabled, void)'
                echo 'KSU_WEAK_HOOK_BOOL(bool, ksu_is_init_rc_hook_enabled, void)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_sys_read, void)'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_vfs_fstat, void)'
                echo ''
                echo '// SUSFS hooks'
                echo 'u32 __attribute__((weak)) susfs_ksu_sid = 0;'
                echo 'u32 __attribute__((weak)) susfs_priv_app_sid = 0;'
                echo 'bool __attribute__((weak)) susfs_is_current_ksu_domain(void) { return false; }'
                echo 'bool __attribute__((weak)) susfs_is_current_zygote_domain(void) { return false; }'
                echo 'KSU_WEAK_HOOK(int, ksu_handle_slow_avc_audit_new, void)'
              } > "$KSU_STUBS"
              
              if ! grep -q "ksu_hooks_stubs.o" "fs/Makefile"; then
                echo "obj-y += ksu_hooks_stubs.o" >> "fs/Makefile"
                echo "Registered stubs in fs/Makefile"
              fi
            fi
          fi

          # ===== LCD 0c/0d FIX (CRITICAL FOR TOUCHSCREEN) =====
          echo "Applying LCM fix (LCD 0c/0d touchscreen fix)..."
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || echo "WARN: fix_lcm patch had issues"

          echo "Applying primary display fix..."
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || echo "WARN: primary_display_fix patch had issues"

          # ===== MTK ACCDET CONFLICT FIX =====
          echo "Fixing MTK accdet symbol conflict..."
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true

          echo "Applying additional kernel optimizations..."

          echo "All patches applied"

      # ===== DEFCONFIG =====
      - name: Configure Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"

          # Use reference fire_defconfig as base (stock Xiaomi)
          if [ -f "../ref_patches/fire_defconfig" ]; then
            echo "Using reference fire_defconfig..."
            cp ../ref_patches/fire_defconfig $DEFCONFIG
          fi

          # KernelSU configs
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# KernelSU-Next (Legacy Manual Hook)" >> $DEFCONFIG
            echo "CONFIG_KSU=y" >> $DEFCONFIG
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> $DEFCONFIG
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG
          fi

          # SUSFS configs
          if [ "${{ inputs.enable_susfs }}" = "true" ] && [ "${{ inputs.enable_ksu }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
          fi

          # ===== LATENCY & RESPONSIVENESS (Rhythm Game Focus) =====
          echo "" >> $DEFCONFIG
          echo "# Latency & Responsiveness (Rhythm Game)" >> $DEFCONFIG
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_HZ_300=n" >> $DEFCONFIG
          echo "CONFIG_HZ_250=n" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_PREEMPT_VOLUNTARY=n" >> $DEFCONFIG
          echo "CONFIG_HIGH_RES_TIMERS=y" >> $DEFCONFIG
          echo "CONFIG_NO_HZ=y" >> $DEFCONFIG
          echo "CONFIG_SND_HRTIMER=y" >> $DEFCONFIG

          # ===== SCHEDULER & POWER (Daily Use Focus) =====
          echo "" >> $DEFCONFIG
          echo "# Scheduler & Power Management" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_POWERSAVE=y" >> $DEFCONFIG
          echo "CONFIG_SCHED_MC=y" >> $DEFCONFIG
          echo "CONFIG_ENERGY_MODEL=y" >> $DEFCONFIG

          # ===== MEMORY (Snappy Daily Multitasking) =====
          echo "" >> $DEFCONFIG
          echo "# Memory Optimization" >> $DEFCONFIG
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZSMALLOC=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_LZ4=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_ZSTD=y" >> $DEFCONFIG
          echo "CONFIG_COMPACTION=y" >> $DEFCONFIG
          echo "CONFIG_KSM=y" >> $DEFCONFIG

          # ===== NETWORKING (Stable Ping) =====
          echo "" >> $DEFCONFIG
          echo "# Networking Performance" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $DEFCONFIG
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> $DEFCONFIG

          # IPSet Support
          echo "" >> $DEFCONFIG
          echo "# IPSet" >> $DEFCONFIG
          echo "CONFIG_IP_SET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_MAX=65534" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_BITMAP_PORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMARK=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTIP=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_IPMAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_MAC=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORTNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETNET=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETPORT=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_HASH_NETIFACE=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET_LIST_SET=y" >> $DEFCONFIG

          # ===== SERIAL VERSIONING =====
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          LOCALVER="-Castorice-${CUSTOM_NAME}-v${BUILD_VER}"
          # Remove existing LOCALVERSION line then append new one
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG
          echo "LOCALVERSION set to: ${LOCALVER}"

          echo "=== Defconfig tail ==="
          tail -50 $DEFCONFIG

      # ===== COMPILER FIXES (Modern Clang vs 4.19) =====
      - name: Fix Compiler Errors
        run: |
          cd $GITHUB_WORKSPACE/kernel

          echo "=== Fixing modern Clang vs 4.19 incompatibilities ==="

          # Step 1: Remove ENTIRE compound -Werror=xxx flags from all Makefiles
          # Must come BEFORE removing standalone -Werror to avoid leaving orphan '=xxx'
          echo "Removing compound -Werror=xxx flags..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/-Werror=[a-zA-Z_-]*//g' {} +

          # Step 2: Remove standalone -Werror (safe now since compounds are gone)
          echo "Removing standalone -Werror..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/ -Werror / /g; s/ -Werror$//g; s/^-Werror //g' {} +

          # Step 3: Remove GCC-specific warning flags that clang doesn't understand
          echo "Removing clang-incompatible warning flags..."
          find . -type f \( -name "Makefile" -o -name "Kbuild" \) \
            -exec sed -i 's/-Wno-unused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wno-unused-but-set-parameter//g' {} + \
            -exec sed -i 's/-Wunused-but-set-variable//g' {} + \
            -exec sed -i 's/-Wunused-but-set-parameter//g' {} +

          # Step 4: Fix strict-prototypes (clang 15+ enforces C2x no-K&R rule)
          echo "Fixing strict-prototypes issues..."
          # zram_debugfs_init / destroy sed removed because they corrupt function calls.
          # -Wno-strict-prototypes is already added below to handle this.

          # Step 5: Add clang compatibility CFLAGS
          # CRITICAL: Append at END of Makefile, NOT inside the KBUILD_CFLAGS := block!
          # The old sed '/^KBUILD_CFLAGS.*:=/a ...' was inserting lines in the
          # middle of a multi-line backslash-continuation block, breaking Makefile syntax.
          # Error was: "Makefile:447: *** recipe commences before first target. Stop."
          if [ -f "Makefile" ]; then
            echo "Adding clang compatibility CFLAGS (appending to end of Makefile)..."
            {
              echo ''
              echo '# Clang compatibility flags (appended by CI)'
              echo 'KBUILD_CFLAGS += -Wno-error'
              echo 'KBUILD_CFLAGS += -Wno-implicit-function-declaration'
              echo 'KBUILD_CFLAGS += -Wno-strict-prototypes'
              echo 'KBUILD_CFLAGS += -Wno-return-type'
              echo 'KBUILD_CFLAGS += -Wno-unknown-warning-option'
              echo 'KBUILD_CFLAGS += -Wno-int-conversion'
              echo 'KBUILD_CFLAGS += -Wno-unused-function'
              echo 'KBUILD_CFLAGS += -Wno-misleading-indentation'
              echo 'KBUILD_CFLAGS += -Wno-bool-operation'
              echo 'KBUILD_CFLAGS += -Wno-uninitialized'
            } >> Makefile
            echo "Clang CFLAGS appended successfully"
          fi

          echo "=== Compiler fixes applied ==="

      # ===== BUILD =====
      - name: Build Kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel

          export KBUILD_BUILD_USER=Castorice
          export KBUILD_BUILD_HOST=naidrahiqa
          export KBUILD_BUILD_VERSION=1

          ARGS="PATH=$GITHUB_WORKSPACE/ZyClang/bin:$PATH \
            ARCH=arm64 \
            SUBARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CC=clang \
            NM=llvm-nm \
            CXX=clang++ \
            AR=llvm-ar \
            LD=ld.lld \
            STRIP=llvm-strip \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            OBJSIZE=llvm-size \
            READELF=llvm-readelf \
            HOSTAR=llvm-ar \
            HOSTLD=ld.lld \
            HOSTCC=clang \
            HOSTCXX=clang++ \
            LLVM=1"

          # Generate .config
          rm -rf out
          make O=out $ARGS fire_defconfig

          KERNEL_VERSION=$(make -s O=out $ARGS kernelversion 2>/dev/null)
          if [ -z "$KERNEL_VERSION" ]; then KERNEL_VERSION="4.19"; fi
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          echo "=== Building Linux $KERNEL_VERSION ==="

          # Build (pipe to tee means exit code comes from tee, not make)
          # Use PIPEFAIL so make failure propagates through the pipe
          set -o pipefail
          make O=out $ARGS -j"$(nproc --all)" 2>&1 | tee build.log
          BUILD_RC=$?
          set +o pipefail

          # Verify
          IMAGE="out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE" ]; then
            IMAGE="out/arch/arm64/boot/Image.gz"
          fi
          if [ ! -f "$IMAGE" ]; then
            IMAGE="out/arch/arm64/boot/Image"
          fi

          if [ ! -f "$IMAGE" ] || [ "$BUILD_RC" -ne 0 ]; then
            echo "BUILD FAILED! Exit code: $BUILD_RC"
            echo "=== Last 150 lines of build log ==="
            tail -150 build.log
            exit 1
          fi
          echo "BUILD SUCCESS: $IMAGE"
          ls -lah $IMAGE

      # ===== ANYKERNEL3 ZIP =====
      - name: Package AnyKernel3
        run: |
          cd $GITHUB_WORKSPACE

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          KSUTAG=""
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then KSUTAG="-KSU"; fi

          # Serial Versioning: Castorice-<CustomName>-v<Build>
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-Legacy-${KERNEL_VERSION}${KSUTAG}${STAG}-Redmi12"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          # Use Alexjr2's preconfigured AnyKernel3 for fire
          git clone --depth=1 https://github.com/Alexjr2/AnyKernel3.git -b android-4.19 ak3
          cd ak3

          IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz-dtb"
          if [ ! -f "$IMAGE_SRC" ]; then IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image.gz"; fi
          if [ ! -f "$IMAGE_SRC" ]; then IMAGE_SRC="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/Image"; fi
          
          cp "$IMAGE_SRC" .
          IMAGE_FILE=$(basename "$IMAGE_SRC")

          DTB="$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/dts/mediatek/mt6768.dtb"
          if [ -f "$DTB" ]; then cp "$DTB" ./dtb; fi

          if [ -f "tools/x86_64/magiskboot" ] && [ "$IMAGE_FILE" = "Image.gz-dtb" ]; then
            chmod +x tools/x86_64/magiskboot
            ./tools/x86_64/magiskboot split Image.gz-dtb || echo "WARN: magiskboot split failed"
            if [ -f "kernel" ]; then
              mv kernel Image
              rm -f Image.gz-dtb
            fi
          else
            echo "INFO: Keeping $IMAGE_FILE as-is"
            if [ "$IMAGE_FILE" != "Image" ] && [ -f "$IMAGE_FILE" ]; then
              mv "$IMAGE_FILE" Image.gz 2>/dev/null || true
            fi
          fi

          echo "• Built with Castorice Performance Profile" >> banner
          if [ -f "anykernel.sh" ]; then
            sed -i "s/kernel.string=.*/kernel.string=Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} by ${{ inputs.author_name }}/g" anykernel.sh
          fi

          zip -r9 "$GITHUB_WORKSPACE/${BASE_NAME}-AnyKernel3.zip" * -x ".git*" "*.md" "LICENSE"

      - name: Prepare Output
        run: |
          mkdir -p out
          cp "$GITHUB_WORKSPACE/${ZIP_NAME}-AnyKernel3.zip" out/ 2>/dev/null || true
          for img in Image.gz-dtb Image.gz Image; do
            if [ -f "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/$img" ]; then
              cp "$GITHUB_WORKSPACE/kernel/out/arch/arm64/boot/$img" out/
              break
            fi
          done
          echo "=== Final output ==="
          ls -lah out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-Legacy-4.19-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-Legacy"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • Legacy ${{ env.KERNEL_VERSION }}"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)

            ### Kernel Info
            - **Build**: `Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}`
            - **Base**: Linux ${{ env.KERNEL_VERSION }} (Legacy / non-GKI)
            - **KernelSU-Next**: v${{ env.KSU_VERSION }} (Manual Hook)
            - **SUSFS**: ${{ inputs.enable_susfs }}
            - **Toolchain**: ${{ env.CLANG_VERSION }}

            ### Performance Profile
            - 🎮 **Rhythm Game**: HZ_1000, Full PREEMPT, HRTIMER audio
            - ⚡ **Daily Use**: EAS schedutil, deep-sleep idle, LZ4 ZRAM
            - 🌐 **Network**: TCP BBR, FQ scheduler, IPSet
            - 🧠 **Memory**: ZRAM, KSM, compaction
            - 🖥️ **Display**: LCD 0c/0d touchscreen FIXED

            ### Downloads
            | File | Method |
            |------|--------|
            | `*-AnyKernel3.zip` | Flash via Custom Recovery / Kernel Flasher |
            | `Image.gz-dtb` | Raw kernel image |

            ### Compatibility
            - ✅ MIUI 14.x (Android 13)
            - ✅ HyperOS 1.x (Android 14)
            - ❌ HyperOS 2.x (Android 15) → Use GKI 6.6 build

          files: |
            out/*.zip
            out/Image.gz-dtb
          draft: false
          prerelease: false
