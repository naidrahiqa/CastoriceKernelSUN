name: "🎛️ GKI Control Center"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"

      # ───── SUSFS Variant (checkboxes) ─────
      build_no_susfs:
        description: "☑️ Build GKI (No SUSFS)"
        required: true
        type: boolean
        default: true
      build_susfs:
        description: "☑️ Build GKI + SUSFS"
        required: true
        type: boolean
        default: false

      cpu_governors:
        description: "⚙️ CPU Governors (comma-separated, e.g. schedutil,walt)"
        required: true
        type: string
        default: "schedutil"

      # ───── Toolchains (checkboxes) ─────
      tc_bazel_default:
        description: "🛠️ Bazel (Default)"
        required: true
        type: boolean
        default: true
      tc_aosp_latest:
        description: "🛠️ AOSP Latest"
        required: true
        type: boolean
        default: false
      tc_zyc_latest:
        description: "🛠️ ZyCromerZ Latest"
        required: true
        type: boolean
        default: false
      tc_weebx_latest:
        description: "🛠️ WeebX Latest"
        required: true
        type: boolean
        default: false
      tc_neutron_latest:
        description: "🛠️ Neutron Latest"
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
    steps:
      - name: Build Matrix
        id: matrix
        shell: python
        run: |
          import json
          import os
          import sys

          # Root method: hardcoded to KernelSU-Next only
          roots = ["kernelsu-next"]

          # Collect selected governors
          govs = [g.strip() for g in "${{ inputs.cpu_governors }}".split(",") if g.strip()]

          # Validasi governor
          VALID_GOVS = {'schedutil', 'performance', 'ondemand', 'conservative', 'powersave', 'userspace', 'walt'}
          invalid = [g for g in govs if g not in VALID_GOVS]
          if invalid:
              print(f"::error::Governor tidak valid: {invalid}")
              sys.exit(1)

          # Collect selected SUSFS variants
          variants = []
          if "${{ inputs.build_no_susfs }}" == "true": variants.append("false")
          if "${{ inputs.build_susfs }}" == "true": variants.append("true")

          # Collect selected toolchains
          toolchains = []
          if "${{ inputs.tc_bazel_default }}" == "true": toolchains.append("bazel-default")
          if "${{ inputs.tc_aosp_latest }}" == "true": toolchains.append("aosp-latest")
          if "${{ inputs.tc_zyc_latest }}" == "true": toolchains.append("zyc-latest")
          if "${{ inputs.tc_weebx_latest }}" == "true": toolchains.append("weebx-latest")
          if "${{ inputs.tc_neutron_latest }}" == "true": toolchains.append("neutron-latest")

          if not govs:
              print("::error::No governor selected!")
              sys.exit(1)
          if not variants:
              print("::error::No SUSFS variant selected!")
              sys.exit(1)
          if not toolchains:
              print("::error::No Toolchain selected!")
              sys.exit(1)

          include = []
          for susfs in variants:
              for root in roots:
                  for gov in govs:
                      for tc in toolchains:
                          include.append({
                              "susfs": susfs,
                              "ksu_method": root,
                              "cpu_governor": gov,
                              "clang_toolchain": tc,
                          })

          matrix_json = json.dumps({"include": include})

          # Set output and total count
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix_json}\n')
              f.write(f'total={len(include)}\n')

      - name: "📊 Show Build Plan"
        run: |
          echo "## 🎛️ GKI Build Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "Total builds: **${{ steps.matrix.outputs.total }}**" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.matrix.outputs.matrix }}' | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  trigger:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 8
    uses: ./.github/workflows/_build_kernel_core.yml
    secrets: inherit
    with:
      with_susfs: ${{ matrix.susfs }}
      custom_name: ${{ inputs.custom_name }}
      author_name: ${{ inputs.author_name }}
      ksu_method: ${{ matrix.ksu_method }}
      cpu_governor: ${{ matrix.cpu_governor }}
      clang_toolchain: ${{ matrix.clang_toolchain }}
      release_tag: "${{ inputs.release_tag }}-${{ matrix.clang_toolchain }}-${{ matrix.cpu_governor }}-${{ matrix.susfs }}"

  summary:
    name: "📊 Summary"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## 🎛️ GKI Control Center — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`${{ inputs.release_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Custom Name** | \`${{ inputs.custom_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Author** | \`${{ inputs.author_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Root** | \`KernelSU-Next\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Toolchain** | \`Multiple (Matrix)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Builds** | \`${{ needs.prepare.outputs.total }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All builds triggered. Check the **Actions** tab for individual progress." >> "$GITHUB_STEP_SUMMARY"
