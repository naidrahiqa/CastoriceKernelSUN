name: "🎛️ GKI Control Center"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag (same tag = same release)"
        required: true
        default: "v1.0"
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"

      # ───── SUSFS Variant (checkboxes) ─────
      build_no_susfs:
        description: "☑️ Build GKI (No SUSFS)"
        required: true
        type: boolean
        default: true
      build_susfs:
        description: "☑️ Build GKI + SUSFS"
        required: true
        type: boolean
        default: true

      # ───── Root Methods (checkboxes) ─────
      root_kernelsu_next:
        description: "🔒 KernelSU-Next"
        required: true
        type: boolean
        default: true
      root_wildksu:
        description: "🔒 WildKSU"
        required: true
        type: boolean
        default: false
      root_sukisu:
        description: "🔒 SukiSU"
        required: true
        type: boolean
        default: false
      root_rsukisu:
        description: "🔒 ReSukiSU"
        required: true
        type: boolean
        default: false
      root_kowsu:
        description: "🔒 KoWSU"
        required: true
        type: boolean
        default: false

      cpu_governors:
        description: "⚙️ CPU Governors (comma-separated, e.g. schedutil,walt)"
        required: true
        type: string
        default: "schedutil"

      # ───── Build Settings ─────
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      safety_profile:
        description: "Boot safety profile"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      # ───── Toolchains (checkboxes) ─────
      tc_bazel_default:
        description: "🛠️ Bazel (Default)"
        required: true
        type: boolean
        default: true
      tc_aosp_latest:
        description: "🛠️ AOSP Latest"
        required: true
        type: boolean
        default: false
      tc_zyc_latest:
        description: "🛠️ ZyCromerZ Latest"
        required: true
        type: boolean
        default: false
      tc_weebx_latest:
        description: "🛠️ WeebX Latest"
        required: true
        type: boolean
        default: false
      tc_neutron_latest:
        description: "🛠️ Neutron Latest"
        required: true
        type: boolean
        default: false
      tc_azure_latest:
        description: "🛠️ Azure Latest"
        required: true
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
    steps:
      - name: Build Matrix
        id: matrix
        shell: bash
        run: |
          MATRIX_JSON="$(python3 - <<'PY'
          import json, sys

          # Collect selected root methods
          roots = []
          if "${{ inputs.root_kernelsu_next }}" == "true": roots.append("kernelsu-next")
          if "${{ inputs.root_wildksu }}" == "true": roots.append("wildksu")
          if "${{ inputs.root_sukisu }}" == "true": roots.append("sukisu")
          if "${{ inputs.root_rsukisu }}" == "true": roots.append("rsukisu")
          if "${{ inputs.root_kowsu }}" == "true": roots.append("kowsu")

          # Collect selected governors
          govs = [g.strip() for g in "${{ inputs.cpu_governors }}".split(",") if g.strip()]

          # Collect selected SUSFS variants
          variants = []
          if "${{ inputs.build_no_susfs }}" == "true": variants.append("false")
          if "${{ inputs.build_susfs }}" == "true": variants.append("true")

          # Collect selected toolchains
          toolchains = []
          if "${{ inputs.tc_bazel_default }}" == "true": toolchains.append("bazel-default")
          if "${{ inputs.tc_aosp_latest }}" == "true": toolchains.append("aosp-latest")
          if "${{ inputs.tc_zyc_latest }}" == "true": toolchains.append("zyc-latest")
          if "${{ inputs.tc_weebx_latest }}" == "true": toolchains.append("weebx-latest")
          if "${{ inputs.tc_neutron_latest }}" == "true": toolchains.append("neutron-latest")
          if "${{ inputs.tc_azure_latest }}" == "true": toolchains.append("azure-latest")

          if not roots:
              raise SystemExit("❌ No root method selected!")
          if not govs:
              raise SystemExit("❌ No governor selected!")
          if not variants:
              raise SystemExit("❌ No SUSFS variant selected!")
          if not toolchains:
              raise SystemExit("❌ No Toolchain selected!")

          include = []
          for susfs in variants:
              workflow = "build_gki_susfs.yml" if susfs == "true" else "build_gki.yml"
              for root in roots:
                  for gov in govs:
                      for tc in toolchains:
                          include.append({
                              "susfs": susfs,
                              "ksu_method": root,
                              "cpu_governor": gov,
                              "clang_toolchain": tc,
                              "workflow": workflow,
                          })

          print(json.dumps({"include": include}))
          PY
          )"

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "total=$(echo "$MATRIX_JSON" | jq '.include | length')" >> "$GITHUB_OUTPUT"

      - name: "📊 Show Build Plan"
        run: |
          echo "## 🎛️ GKI Build Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "Total builds: **${{ steps.matrix.outputs.total }}**" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.matrix.outputs.matrix }}' | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  trigger:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 8
    uses: ./.github/workflows/_build_kernel_core.yml
    secrets: inherit
    with:
      with_susfs: ${{ matrix.susfs }}
      custom_name: ${{ inputs.custom_name }}
      author_name: ${{ inputs.author_name }}
      ksu_method: ${{ matrix.ksu_method }}
      cpu_governor: ${{ matrix.cpu_governor }}
      safety_profile: ${{ inputs.safety_profile }}
      tuning_profile: ${{ inputs.tuning_profile }}
      clang_toolchain: ${{ matrix.clang_toolchain }}
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

  summary:
    name: "📊 Summary"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## 🎛️ GKI Control Center — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`${{ inputs.release_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Custom Name** | \`${{ inputs.custom_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Author** | \`${{ inputs.author_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tuning** | \`${{ inputs.tuning_profile }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Safety** | \`${{ inputs.safety_profile }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Toolchain** | \`Multiple (Matrix)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Builds** | \`${{ needs.prepare.outputs.total }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All builds triggered. Check the **Actions** tab for individual progress." >> "$GITHUB_STEP_SUMMARY"
