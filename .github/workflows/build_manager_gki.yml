name: "🎛️ GKI Control Center"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release Tag (same tag = same release)"
        required: true
        default: "v1.0"
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"

      # ───── SUSFS Variant (checkboxes) ─────
      build_no_susfs:
        description: "☑️ Build GKI (No SUSFS)"
        required: true
        type: boolean
        default: true
      build_susfs:
        description: "☑️ Build GKI + SUSFS"
        required: true
        type: boolean
        default: true

      # ───── Root Methods (checkboxes) ─────
      root_kernelsu_next:
        description: "🔒 KernelSU-Next"
        required: true
        type: boolean
        default: true
      root_wildksu:
        description: "🔒 WildKSU"
        required: true
        type: boolean
        default: false
      root_sukisu:
        description: "🔒 SukiSU"
        required: true
        type: boolean
        default: false
      root_rsukisu:
        description: "🔒 ReSukiSU"
        required: true
        type: boolean
        default: false
      root_kowsu:
        description: "🔒 KoWSU"
        required: true
        type: boolean
        default: false

      # ───── CPU Governors (checkboxes) ─────
      gov_schedutil:
        description: "⚙️ Schedutil"
        required: true
        type: boolean
        default: true
      gov_performance:
        description: "⚙️ Performance"
        required: true
        type: boolean
        default: false
      gov_ondemand:
        description: "⚙️ Ondemand"
        required: true
        type: boolean
        default: false
      gov_conservative:
        description: "⚙️ Conservative"
        required: true
        type: boolean
        default: false

      # ───── Build Settings ─────
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      safety_profile:
        description: "Boot safety profile"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        default: "bazel-default"
        options:
          - bazel-default
          - aosp-latest
          - zyc-latest
          - proton-latest
          - neutron-latest
          - azure-latest

permissions:
  actions: write
  contents: read

jobs:
  prepare:
    name: "📋 Prepare Build Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      total: ${{ steps.matrix.outputs.total }}
    steps:
      - name: Build Matrix
        id: matrix
        shell: bash
        run: |
          MATRIX_JSON="$(python3 - <<'PY'
          import json, sys

          # Collect selected root methods
          roots = []
          if "${{ inputs.root_kernelsu_next }}" == "true": roots.append("kernelsu-next")
          if "${{ inputs.root_wildksu }}" == "true": roots.append("wildksu")
          if "${{ inputs.root_sukisu }}" == "true": roots.append("sukisu")
          if "${{ inputs.root_rsukisu }}" == "true": roots.append("rsukisu")
          if "${{ inputs.root_kowsu }}" == "true": roots.append("kowsu")

          # Collect selected governors
          govs = []
          if "${{ inputs.gov_schedutil }}" == "true": govs.append("schedutil")
          if "${{ inputs.gov_performance }}" == "true": govs.append("performance")
          if "${{ inputs.gov_ondemand }}" == "true": govs.append("ondemand")
          if "${{ inputs.gov_conservative }}" == "true": govs.append("conservative")

          # Collect selected SUSFS variants
          variants = []
          if "${{ inputs.build_no_susfs }}" == "true": variants.append(False)
          if "${{ inputs.build_susfs }}" == "true": variants.append(True)

          if not roots:
              raise SystemExit("❌ No root method selected!")
          if not govs:
              raise SystemExit("❌ No governor selected!")
          if not variants:
              raise SystemExit("❌ No SUSFS variant selected!")

          include = []
          for susfs in variants:
              workflow = "build_gki_susfs.yml" if susfs else "build_gki.yml"
              for root in roots:
                  for gov in govs:
                      include.append({
                          "susfs": susfs,
                          "ksu_method": root,
                          "cpu_governor": gov,
                          "workflow": workflow,
                      })

          print(json.dumps({"include": include}))
          PY
          )"

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "total=$(echo "$MATRIX_JSON" | jq '.include | length')" >> "$GITHUB_OUTPUT"

      - name: "📊 Show Build Plan"
        run: |
          echo "## 🎛️ GKI Build Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "Total builds: **${{ steps.matrix.outputs.total }}**" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.matrix.outputs.matrix }}' | jq '.' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  trigger:
    name: "🚀 ${{ matrix.susfs && 'GKI+SUSFS' || 'GKI' }}-${{ matrix.ksu_method }}-${{ matrix.cpu_governor }}"
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      max-parallel: 8
    steps:
      - name: "🔄 Trigger ${{ matrix.workflow }}"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 Triggering: ${{ matrix.workflow }}"
          echo "   Root: ${{ matrix.ksu_method }}"
          echo "   Governor: ${{ matrix.cpu_governor }}"
          echo "   SUSFS: ${{ matrix.susfs }}"

          gh workflow run "${{ matrix.workflow }}" \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f custom_name="${{ inputs.custom_name }}" \
            -f author_name="${{ inputs.author_name }}" \
            -f ksu_method="${{ matrix.ksu_method }}" \
            -f cpu_governor="${{ matrix.cpu_governor }}" \
            -f tuning_profile="${{ inputs.tuning_profile }}" \
            -f safety_profile="${{ inputs.safety_profile }}" \
            -f clang_toolchain="${{ inputs.clang_toolchain }}" \
            -f release_tag="${{ inputs.release_tag }}"

  summary:
    name: "📊 Summary"
    needs: [prepare, trigger]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Write Summary
        run: |
          echo "## 🎛️ GKI Control Center — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Release Tag** | \`${{ inputs.release_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Custom Name** | \`${{ inputs.custom_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Author** | \`${{ inputs.author_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tuning** | \`${{ inputs.tuning_profile }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Safety** | \`${{ inputs.safety_profile }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Toolchain** | \`${{ inputs.clang_toolchain }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Total Builds** | \`${{ needs.prepare.outputs.total }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ All builds triggered. Check the **Actions** tab for individual progress." >> "$GITHUB_STEP_SUMMARY"
