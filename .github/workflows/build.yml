name: Build Castorice Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_sublevel:
        description: "Kernel sublevel (58 = match stock 6.6.58)"
        required: true
        default: "58"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KERNEL_NAME: Castorice

jobs:
  build:
    name: "Castorice 6.6.${{ inputs.kernel_sublevel }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          echo "=== Kernel version ==="
          cd common && make kernelversion

      - name: Setup KernelSU-Next
        run: |
          cd kernel/common
          curl -LSsf "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          KSU_DIR=""
          if [ -d "KernelSU-Next" ]; then
            KSU_DIR="KernelSU-Next"
          elif [ -d "KernelSU" ]; then
            KSU_DIR="KernelSU"
          else
            echo "KernelSU directory not found!"
            exit 1
          fi
          KSU_VERSION=$(cd $KSU_DIR && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KernelSU-Next installed - version $KSU_VERSION"

      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} || \
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-6.6
          cd common
          cp -v ../susfs4ksu/kernel_patches/fs/susfs.c fs/ || true
          cp -v ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/ || true
          cp -rv ../susfs4ksu/kernel_patches/fs/sus_* fs/ || true
          cp -rv ../susfs4ksu/kernel_patches/include/linux/sus_* include/linux/ || true
          for patch in ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying $patch"
              patch -p1 --forward < "$patch" || true
            fi
          done
          KSU_DIR="${{ env.KSU_DIR }}"
          for patch in ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying to $KSU_DIR: $patch"
              cd $KSU_DIR && patch -p1 --forward < "$patch" || true
              cd ..
            fi
          done
          echo "SUSFS setup complete"

      - name: Apply Kernel Fixes (android15 6.6)
        run: |
          cd kernel/common
          # Fix missing trace/hooks/fs.h include for android15-6.6
          if ! grep -qxF '#include <trace/hooks/fs.h>' ./fs/namespace.c; then
            sed -i '/#include <trace\/hooks\/blk.h>/a #include <trace\/hooks\/fs.h>' ./fs/namespace.c || true
          fi

      - name: Create Defconfig Fragment
        run: |
          # Create a defconfig fragment file — this is the proper Kleaf way
          # to add config options without modifying gki_defconfig directly
          cat > $GITHUB_WORKSPACE/castorice_gki.fragment << 'EOF'
          CONFIG_KSU=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_LOCALVERSION="-Castorice"
          # CONFIG_LOCALVERSION_AUTO is not set

          # Gaming & Performance
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_DEFAULT_TCP_CONG="bbr"
          CONFIG_CPU_FREQ_GOV_PERFORMANCE=y

          # Module signing — let the build handle it automatically
          # Do NOT set CONFIG_MODULE_SIG=n as GKI requires it
          # The build system auto-generates signing keys
          # CONFIG_MODULE_SIG_ALL is not set
          CONFIG_SYSTEM_TRUSTED_KEYS=""
          CONFIG_SYSTEM_REVOCATION_KEYS=""

          # Mountify Support
          CONFIG_OVERLAY_FS=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          # CONFIG_TRIM_UNUSED_KSYMS is not set
          EOF

          # Add SUSFS configs if enabled
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            cat >> $GITHUB_WORKSPACE/castorice_gki.fragment << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          EOF
          fi

          # Copy fragment into the kernel source tree so Bazel can reference it
          cp $GITHUB_WORKSPACE/castorice_gki.fragment kernel/common/arch/arm64/configs/castorice_gki.fragment

          echo "=== Defconfig fragment ==="
          cat $GITHUB_WORKSPACE/castorice_gki.fragment

      - name: Remove Protected Exports
        run: |
          cd kernel/common

          # Remove protected export files
          rm -rf android/abi_gki_protected_exports_* || true

          # Remove protected_exports_list from BUILD.bazel
          if [ -f "BUILD.bazel" ]; then
            perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//' BUILD.bazel
            # Also remove any other protected_exports references
            sed -i '/abi_gki_protected_exports/d' BUILD.bazel
            sed -i '/protected_exports/d' BUILD.bazel
          fi

          # Clear protected_modules list in modules.bzl
          if [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl; then
            sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          fi

          # Bypass defconfig check
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ]; then
              sed -i '/check_defconfig/d' "$f"
            fi
          done

          # Bypass ABI protection check script
          PROT_SCRIPT="../build/kernel/abi/check_buildtime_symbol_protection.py"
          if [ -f "$PROT_SCRIPT" ]; then
            perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "$PROT_SCRIPT"
          fi

      - name: Clean Dirty Flags
        run: |
          cd kernel

          # Clean -dirty suffix from Bazel stamp
          if [ -f "build/kernel/kleaf/impl/stamp.bzl" ]; then
            sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' build/kernel/kleaf/impl/stamp.bzl
          fi

          # Clean -dirty suffix from setlocalversion
          sed -i 's/-dirty//' common/scripts/setlocalversion

          # Create .scmversion to prevent auto version suffix
          : > common/.scmversion

      - name: Commit Changes for Bazel
        run: |
          # CRITICAL: Bazel sandbox uses git to determine source files
          # All modifications MUST be committed before building
          cd kernel/common
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Castorice: prepare kernel source for build" || true

      - name: Build Kernel
        run: |
          set -x
          cd kernel
          echo "Starting Castorice kernel build..."

          # Use 'tools/bazel build' with defconfig fragment
          # This is the correct Kleaf build method used by successful GKI builders
          tools/bazel build \
            --config=release \
            --stamp \
            --notrim \
            --defconfig_fragment=//common:arch/arm64/configs/castorice_gki.fragment \
            //common:kernel_aarch64_dist 2>&1 || {
            echo "=== First build attempt failed, retrying with --lto=none ==="
            tools/bazel build \
              --config=release \
              --stamp \
              --notrim \
              --lto=none \
              --defconfig_fragment=//common:arch/arm64/configs/castorice_gki.fragment \
              //common:kernel_aarch64_dist
          }

          echo "=== Build completed ==="
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          cd kernel
          # Find the dist directory from Bazel output
          DIST_DIR=$(find bazel-out -path "*/kernel_aarch64_dist/*" -name "Image*" -printf '%h\n' 2>/dev/null | head -1 || true)

          if [ -z "$DIST_DIR" ]; then
            # Try alternative: run the dist target to copy files
            echo "Extracting via bazel run..."
            tools/bazel run \
              --config=release \
              --stamp \
              --notrim \
              --defconfig_fragment=//common:arch/arm64/configs/castorice_gki.fragment \
              //common:kernel_aarch64_dist \
              -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true
          else
            mkdir -p $GITHUB_WORKSPACE/dist
            cp -v "$DIST_DIR"/* $GITHUB_WORKSPACE/dist/ 2>/dev/null || true
          fi

          # Also check standard bazel-bin location
          if [ ! -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            find bazel-out -name "Image" -o -name "Image.gz" -o -name "Image.lz4" 2>/dev/null | while read img; do
              cp -v "$img" $GITHUB_WORKSPACE/dist/ 2>/dev/null || true
            done
          fi

          echo "=== Build output ==="
          ls -lah $GITHUB_WORKSPACE/dist/ || echo "No dist directory found"

      - name: Verify Build
        run: |
          ls -la dist/
          for f in Image Image.gz Image.lz4; do
            if [ -f "dist/$f" ]; then
              echo "Found: $f ($(du -h dist/$f | cut -f1))"
            fi
          done
          if [ -f "dist/Image" ]; then
            strings dist/Image | grep "Linux version" | head -1
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3

          # Write anykernel.sh
          echo '# AnyKernel3 Ramdisk Mod Script' > anykernel.sh
          echo '# osm0sis @ xda-developers' >> anykernel.sh
          echo "properties() { '" >> anykernel.sh
          echo 'kernel.string=Castorice Kernel by naidrahiqa' >> anykernel.sh
          echo 'do.devicecheck=0' >> anykernel.sh
          echo 'do.modules=0' >> anykernel.sh
          echo 'do.systemless=1' >> anykernel.sh
          echo 'do.cleanup=1' >> anykernel.sh
          echo 'do.cleanuponabort=0' >> anykernel.sh
          echo 'device.name1=fire' >> anykernel.sh
          echo 'device.name2=Redmi 12' >> anykernel.sh
          echo 'supported.versions=15' >> anykernel.sh
          echo "'; }" >> anykernel.sh
          echo 'block=boot;' >> anykernel.sh
          echo 'is_slot_device=auto;' >> anykernel.sh
          echo 'ramdisk_compression=auto;' >> anykernel.sh
          echo 'patch_vbmeta_flag=auto;' >> anykernel.sh
          echo '. tools/ak3-core.sh;' >> anykernel.sh
          echo 'dump_boot;' >> anykernel.sh
          echo 'write_boot;' >> anykernel.sh

          if [ -f "$GITHUB_WORKSPACE/dist/Image.gz" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.gz .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            cp $GITHUB_WORKSPACE/dist/Image .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image.lz4" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.lz4 .
          fi

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          ZIP="Castorice-6.6.${{ inputs.kernel_sublevel }}-KSU_Next${STAG}-fire-$(date +%Y%m%d)"
          zip -r9 "$GITHUB_WORKSPACE/dist/${ZIP}.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${ZIP}" >> $GITHUB_ENV

      - name: Copy Boot Images
        run: |
          mkdir -p out
          cp dist/*.img out/ 2>/dev/null || true
          cp dist/*.zip out/ 2>/dev/null || true
          cp dist/Image* out/ 2>/dev/null || true
          ls -la out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-6.6.${{ inputs.kernel_sublevel }}-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.6.${{ inputs.kernel_sublevel }}-castorice-${{ github.run_number }}"
          name: "Castorice 6.6.${{ inputs.kernel_sublevel }} - Redmi 12 Fire"
          body: |
            ## Castorice Kernel for Redmi 12 (fire)
            - Kernel: 6.6.${{ inputs.kernel_sublevel }}-Castorice
            - KernelSU-Next v${{ env.KSU_VERSION }}
            - SUSFS: ${{ inputs.enable_susfs }}
            - LCD 0c/0d: Safe (vendor modules untouched)
          files: |
            out/*.img
            out/*.zip
            out/Image*
          draft: false
          prerelease: true