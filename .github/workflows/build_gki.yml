name: Build Castorice GKI (6.6)

on:
  workflow_dispatch:
    inputs:
      kernel_sublevel:
        description: "Kernel sublevel (135 = latest LTS 6.6.135)"
        required: true
        default: "135"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      stock_boot_url:
        description: "Direct URL to stock boot.img (128MB)"
        required: false
        type: string
        default: "https://github.com/naidrahiqa/CastoriceKernelSUN/releases/download/stock-assets/boot.img"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KERNEL_NAME: Castorice

jobs:
  build:
    name: "Castorice GKI 6.6.${{ inputs.kernel_sublevel }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd aria2 p7zip-full

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          echo "=== Kernel version ==="
          cd common && make kernelversion

      - name: Setup KernelSU-Next
        run: |
          cd kernel/common
          curl -LSsf "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -s main
          KSU_DIR=""
          if [ -d "KernelSU-Next" ]; then
            KSU_DIR="KernelSU-Next"
          elif [ -d "KernelSU" ]; then
            KSU_DIR="KernelSU"
          else
            echo "KernelSU directory not found!"
            exit 1
          fi
          KSU_VERSION=$(cd $KSU_DIR && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KernelSU-Next installed - version $KSU_VERSION"

      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} || \
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-6.6
          cd common

          # Copy SUSFS source files
          cp -v ../susfs4ksu/kernel_patches/fs/susfs.c fs/ || true
          cp -v ../susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/ || true
          cp -rv ../susfs4ksu/kernel_patches/fs/sus_* fs/ || true
          cp -rv ../susfs4ksu/kernel_patches/include/linux/sus_* include/linux/ || true

          # Apply kernel patches
          PATCH_APPLIED=false
          for patch in ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying $patch"
              if patch -p1 --forward < "$patch"; then
                PATCH_APPLIED=true
              else
                echo "WARNING: Patch $patch had conflicts"
                find . -name "*.rej" -exec echo "REJECT: {}" \; -exec cat {} \;
              fi
            fi
          done

          # Apply KernelSU patches for SUSFS
          KSU_DIR="${{ env.KSU_DIR }}"
          for patch in ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu*.patch ../susfs4ksu/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying to $KSU_DIR: $patch"
              cd $KSU_DIR && patch -p1 --forward < "$patch" || echo "WARNING: KSU SUSFS patch failed"
              cd ..
            fi
          done

          # Verify SUSFS Kconfig
          if grep -r "CONFIG_KSU_SUSFS" $KSU_DIR/kernel/Kconfig 2>/dev/null; then
            echo "SUSFS_KCONFIG_OK=true" >> $GITHUB_ENV
          else
            echo "SUSFS_KCONFIG_OK=false" >> $GITHUB_ENV
            echo "WARNING: SUSFS Kconfig entries NOT found"
          fi

      - name: Configure Kernel
        run: |
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          # KernelSU
          echo "" >> $DEFCONFIG
          echo "# KernelSU" >> $DEFCONFIG
          echo "CONFIG_KSU=y" >> $DEFCONFIG

          # SUSFS
          if [ "${{ env.SUSFS_KCONFIG_OK }}" = "true" ] && [ "${{ inputs.enable_susfs }}" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
          fi

          # Networking (stable performance)
          echo "" >> $DEFCONFIG
          echo "# Networking" >> $DEFCONFIG
          echo "CONFIG_IP_NF_TARGET_TTL=y" >> $DEFCONFIG
          echo "CONFIG_IP6_NF_TARGET_HL=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_ADVANCED=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG

          # Branding
          echo "" >> $DEFCONFIG
          echo "# Branding" >> $DEFCONFIG
          echo 'CONFIG_LOCALVERSION="-Castorice"' >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

          echo "=== Modified gki_defconfig (last 30 lines) ==="
          tail -30 $DEFCONFIG

      - name: Patch Build System
        run: |
          cd kernel/common

          # Remove protected exports
          rm -rf android/abi_gki_protected_exports_* || true
          if [ -f "BUILD.bazel" ]; then
            perl -pi -e 's/^\s*"protected_exports_list"\s*:\s*"android\/abi_gki_protected_exports_aarch64",\s*$//' BUILD.bazel
            sed -i '/abi_gki_protected_exports/d' BUILD.bazel
            sed -i '/protected_exports/d' BUILD.bazel
            sed -i '/check_defconfig/d' BUILD.bazel
          fi

          if [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl; then
            sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          fi

          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ]; then
              sed -i '/check_defconfig/d' "$f"
            fi
          done

          PROT_SCRIPT="../build/kernel/abi/check_buildtime_symbol_protection.py"
          if [ -f "$PROT_SCRIPT" ]; then
            perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "$PROT_SCRIPT"
          fi

          # Clean dirty flags
          if [ -f "../build/kernel/kleaf/impl/stamp.bzl" ]; then
            sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          fi
          sed -i 's/-dirty//' scripts/setlocalversion
          : > .scmversion

          echo "Build system patched"

      - name: Commit All Changes
        run: |
          cd kernel/common
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Castorice: prepare GKI kernel for build" || true

      - name: Build Kernel
        run: |
          cd kernel
          echo "=== Starting Castorice GKI kernel build ==="
          tools/bazel build \
            --config=fast \
            //common:kernel_aarch64_dist 2>&1
          echo "=== Build completed ==="
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          cd kernel

          tools/bazel run \
            --config=fast \
            //common:kernel_aarch64_dist \
            -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true

          if [ ! -f "$GITHUB_WORKSPACE/dist/Image" ] && [ ! -f "$GITHUB_WORKSPACE/dist/Image.gz" ]; then
            echo "Searching bazel-out for kernel images..."
            find bazel-out -name "Image" -o -name "Image.gz" -o -name "Image.lz4" -o -name "boot.img" 2>/dev/null | head -10 | while read img; do
              echo "Found: $img"
              cp -v "$img" $GITHUB_WORKSPACE/dist/ 2>/dev/null || true
            done
          fi

          echo "=== Build output ==="
          ls -lah $GITHUB_WORKSPACE/dist/ || echo "No output found"

      - name: Verify Build
        run: |
          ls -la dist/
          for f in Image Image.gz Image.lz4; do
            if [ -f "dist/$f" ]; then
              echo "Found: $f ($(du -h dist/$f | cut -f1))"
            fi
          done
          if [ -f "dist/Image" ]; then
            strings dist/Image | grep "Linux version" | head -1
          fi

      # ===== MAGISKBOOT — 128MB BOOT.IMG REPACK =====
      - name: Setup Magiskboot
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p magiskboot

          MAGISKBOOT_DLINK=$(curl -sL https://api.github.com/repos/xiaoxindada/magisk_bins_ndk/releases | jq -r '.[0].assets[] | select(.name | endswith(".7z")) | .browser_download_url' | head -n1)

          echo "Downloading magiskboot: $MAGISKBOOT_DLINK"
          aria2c -s16 -x16 -k1M "$MAGISKBOOT_DLINK" -o magiskboot.7z
          7z e magiskboot.7z native/out/x86_64/magiskboot -omagiskboot/
          chmod +x magiskboot/magiskboot
          rm -f magiskboot.7z

      - name: Repack Boot Image (128MB - Dual Slot A/B)
        run: |
          cd $GITHUB_WORKSPACE/magiskboot
          MAGISKBOOT="$GITHUB_WORKSPACE/magiskboot/magiskboot"
          STOCK_BOOT="$GITHUB_WORKSPACE/dist/boot.img"

          if [ ! -f "$STOCK_BOOT" ]; then
            echo "Searching bazel-out for boot.img..."
            FOUND_BOOT=$(cd $GITHUB_WORKSPACE/kernel && find bazel-out -name "boot.img" 2>/dev/null | head -n 1)
            if [ -n "$FOUND_BOOT" ]; then
              cp "$GITHUB_WORKSPACE/kernel/$FOUND_BOOT" "$STOCK_BOOT"
              echo "Copied bazel generated boot.img"
            fi
          fi

          if [ ! -f "$STOCK_BOOT" ] && [ -n "${{ inputs.stock_boot_url }}" ]; then
            echo "Downloading stock boot.img from URL fallback..."
            wget -qO "$STOCK_BOOT" "${{ inputs.stock_boot_url }}" || echo "Download failed"
          fi

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          BASE_NAME="Castorice-GKI-6.6.${{ inputs.kernel_sublevel }}-KSU_Next${STAG}-fire-$(date +%Y%m%d)"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          if [ ! -f "$STOCK_BOOT" ] || [ ! -s "$STOCK_BOOT" ]; then
            echo "WARNING: boot.img not found from Bazel or download, skipping boot.img repack"
            echo "BOOTIMG_OK=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "Base boot.img size: $(du -h $STOCK_BOOT | cut -f1)"

          # Find kernel image from build
          KERNEL_IMG=""
          for f in Image.gz Image Image.lz4; do
            if [ -f "$GITHUB_WORKSPACE/dist/$f" ]; then
              KERNEL_IMG="$GITHUB_WORKSPACE/dist/$f"
              break
            fi
          done

          if [ -z "$KERNEL_IMG" ]; then
            echo "WARNING: No kernel image found, skipping boot.img repack"
            echo "BOOTIMG_OK=false" >> $GITHUB_ENV
            exit 0
          fi

          cp "$STOCK_BOOT" .
          $MAGISKBOOT unpack -h boot.img

          # Replace kernel
          cp "$KERNEL_IMG" ./kernel
          ls -lah

          # === Enforcing boot.img (128MB) ===
          echo "=== Repacking boot.img (Enforcing) ==="
          $MAGISKBOOT repack boot.img
          truncate -s 134217728 new-boot.img
          mv new-boot.img "$GITHUB_WORKSPACE/dist/${BASE_NAME}.img"

          # === Permissive boot.img (128MB) ===
          echo "=== Repacking boot.img (Permissive SELinux) ==="
          sed -i '/cmdline=/ s/$/ androidboot.selinux=permissive/' header
          $MAGISKBOOT repack boot.img
          truncate -s 134217728 new-boot.img
          mv new-boot.img "$GITHUB_WORKSPACE/dist/${BASE_NAME}-Permissive.img"

          echo "BOOTIMG_OK=true" >> $GITHUB_ENV
          echo "=== Boot images created ==="
          ls -lah $GITHUB_WORKSPACE/dist/*.img

      # ===== ANYKERNEL3 ZIP =====
      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3

          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          properties() { '
          kernel.string=Castorice GKI Kernel by naidrahiqa
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=fire
          device.name2=Redmi 12
          supported.versions=15
          '; }
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          AKEOF

          if [ -f "$GITHUB_WORKSPACE/dist/Image.gz" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.gz .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            cp $GITHUB_WORKSPACE/dist/Image .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image.lz4" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.lz4 .
          fi

          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          zip -r9 "$GITHUB_WORKSPACE/dist/${ZIP_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      - name: Copy Output
        run: |
          mkdir -p out
          # boot.img variants (128MB, ready to fastboot flash)
          cp dist/${ZIP_NAME}.img out/ 2>/dev/null || true
          cp dist/${ZIP_NAME}-Permissive.img out/ 2>/dev/null || true
          # AnyKernel3 zip (flash via recovery)
          cp dist/${ZIP_NAME}-AnyKernel3.zip out/ 2>/dev/null || true
          # Raw kernel images
          cp dist/Image* out/ 2>/dev/null || true
          echo "=== Final output ==="
          ls -lah out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-GKI-6.6.${{ inputs.kernel_sublevel }}-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.6.${{ inputs.kernel_sublevel }}-castorice-gki-${{ github.run_number }}"
          name: "Castorice GKI 6.6.${{ inputs.kernel_sublevel }} - Redmi 12 Fire"
          body: |
            ## ⚡ Castorice GKI Kernel for Redmi 12 (fire)
            
            ### Kernel Info
            - **Kernel**: 6.6.${{ inputs.kernel_sublevel }}-Castorice
            - **Type**: GKI (Generic Kernel Image)
            - **KernelSU-Next**: v${{ env.KSU_VERSION }}
            - **SUSFS**: ${{ inputs.enable_susfs }}
            - **Boot Partition**: 128MB (A/B dual slot)
            
            ### Downloads
            | File | Method | SELinux |
            |------|--------|---------|
            | `*.img` | `fastboot flash boot` | Enforcing |
            | `*-Permissive.img` | `fastboot flash boot` | Permissive |
            | `*-AnyKernel3.zip` | Flash via Recovery | Enforcing |
            
            ### Compatibility
            - ✅ HyperOS 2.x (Android 15)
            - ✅ LCD 0c/0d: **SAFE** (vendor modules untouched)
            - ✅ A/B dual slot: boot.img = 128MB
            
            ### Performance
            - schedutil governor
            - TCP BBR congestion control
            - mq-deadline I/O scheduler
            - LTO=fast build
            
            > ⚠️ **NOT compatible** with MIUI 14 / HyperOS 1.x. Use Legacy 4.19 version instead.
          files: |
            out/*.img
            out/*.zip
            out/Image*
          draft: false
          prerelease: false
