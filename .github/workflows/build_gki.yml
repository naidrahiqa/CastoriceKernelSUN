name: Build Castorice GKI (6.6)

on:
  workflow_dispatch:
    inputs:
      stock_boot_url:
        description: "Direct URL to stock boot.img (HyperOS 2). Leave empty to skip boot.img repack."
        required: false
        default: ""
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  # =====================================================
  # KMI_GENERATION MUST match your device's KMI exactly!
  # Check: adb shell uname -r → 6.6.58-android15-8-xxx
  #                                              ↑ this
  # =====================================================
  KMI_GENERATION: "8"
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire
  BOOT_PARTITION_SIZE: "134217728"
  # Placeholders for dynamically set variables to prevent IDE warnings
  KSU_DIR: ""
  KSU_VERSION: ""
  SUSFS_OK: ""
  BUILT_KERNEL_VERSION: ""
  MAGISKBOOT: ""
  MAGISKBOOT_OK: ""
  REPACK_OK: ""
  ZIP_NAME: ""

jobs:
  build:
    name: "Castorice GKI 6.6"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Swap
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          free -h

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd aria2 p7zip-full

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # ===== KERNEL SOURCE (ACK) =====
      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel
          cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          echo "=== Kernel version ==="
          cd common && make kernelversion

      # ===== MATCH DEVICE KMI =====
      - name: Set KMI Generation to Match Device
        run: |
          cd kernel/common
          echo "Device KMI: ${KERNEL_VERSION}-${ANDROID_VERSION}-${KMI_GENERATION}"

          # Set KMI_GENERATION in build.config.common
          if [ -f "build.config.common" ]; then
            if grep -q "KMI_GENERATION" build.config.common; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common
            else
              echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
            fi
            echo "build.config.common KMI_GENERATION set:"
            grep KMI_GENERATION build.config.common
          fi

          # Also patch Bazel/Kleaf config if present
          for f in build.config.gki build.config.gki.aarch64; do
            if [ -f "$f" ] && grep -q "KMI_GENERATION" "$f"; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" "$f"
              echo "$f patched"
            fi
          done

          # Patch stamp.bzl if it has KMI generation
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          if [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE"; then
            echo "Checking stamp.bzl for KMI generation..."
          fi

      # ===== KERNELSU-NEXT =====
      - name: Setup KernelSU-Next
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd kernel/common

          # Clone KernelSU-Next latest stable release
          echo "Fetching latest stable KernelSU-Next release..."
          KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest \
            | jq -r '.tag_name')

          if [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ]; then
            echo "WARN: Could not fetch latest release tag, falling back to default branch"
            git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
            KSU_TAG="default"
          else
            echo "Cloning KernelSU-Next $KSU_TAG (latest stable)..."
            git clone --depth=1 --branch "$KSU_TAG" \
              https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU-Next
          fi

          # Integrate into kernel build (symlink driver)
          ln -sf "$(pwd)/KernelSU-Next/kernel" "drivers/kernelsu"

          # Add to Makefile if not present
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
          fi

          # Add Kconfig include if not present
          if ! grep -q "kernelsu/Kconfig" drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

          KSU_DIR="KernelSU-Next"
          KSU_VERSION=$(cd $KSU_DIR && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_DIR=$KSU_DIR" >> $GITHUB_ENV
          echo "KernelSU-Next installed — version $KSU_VERSION ($KSU_TAG)"

      # ===== SUSFS =====
      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} || \
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-${ANDROID_VERSION}-6.6

          cd common
          # Copy SUSFS source files
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/

          echo "=== Verify SUSFS files ==="
          ls -la include/linux/susfs* fs/susfs*

          # Apply kernel integration patch (kernel tree itself)
          for patch in ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            [ -f "$patch" ] && patch -p1 --forward --fuzz=3 < "$patch" || echo "WARN: $patch had issues"
          done

          # Apply KSU SUSFS patches (modifies KernelSU-Next source)
          KSU_DIR="${{ env.KSU_DIR }}"
          SUSFS_PATCH_DIR="$(pwd)/../susfs4ksu/kernel_patches"
          PATCH_FILE="${SUSFS_PATCH_DIR}/KernelSU/10_enable_susfs_for_ksu.patch"

          SUSFS_PATCH_OK=false
          if [ -f "$PATCH_FILE" ]; then
            echo "Applying SUSFS patch to $KSU_DIR with fuzz tolerance..."
            cd $KSU_DIR
            if patch -p1 --forward --fuzz=3 < "$PATCH_FILE"; then
              echo "SUSFS KSU patch applied successfully"
              SUSFS_PATCH_OK=true
            else
              echo "WARN: SUSFS KSU patch had failures, applying manual fallback..."
              SUSFS_PATCH_OK=false
            fi
            cd ..
          else
            echo "WARNING: SUSFS KSU patch not found at $PATCH_FILE"
            ls -la ${SUSFS_PATCH_DIR}/ || true
          fi

          # ===== MANUAL FALLBACK: inject SUSFS into KernelSU-Next =====
          if [ "$SUSFS_PATCH_OK" = "false" ]; then
            echo "=== Manual SUSFS integration fallback ==="
            KSU_KERNEL="$KSU_DIR/kernel"

            # 1. Add SUSFS Kconfig entries (if not already present)
            if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
              echo "Injecting SUSFS Kconfig..."
              # Insert before the final 'endmenu'
              sed -i '/^endmenu$/i \
          menu "KernelSU - SUSFS"\
          config KSU_SUSFS\
          \tbool "KernelSU addon - SUSFS"\
          \tdepends on KSU\
          \tdefault y\
          \thelp\
          \t  Patch and Enable SUSFS to kernel with KernelSU.\
          \
          config KSU_SUSFS_SUS_PATH\
          \tbool "Enable to hide suspicious path"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_SUS_MOUNT\
          \tbool "Enable to hide suspicious mounts"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_SUS_KSTAT\
          \tbool "Enable to spoof suspicious kstat"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_SPOOF_UNAME\
          \tbool "Enable to spoof uname"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_ENABLE_LOG\
          \tbool "Enable logging susfs log to kernel"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS\
          \tbool "Enable to hide ksu and susfs symbols from /proc/kallsyms"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG\
          \tbool "Enable to spoof /proc/bootconfig or /proc/cmdline"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_OPEN_REDIRECT\
          \tbool "Enable to redirect a path to be opened with another path"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          config KSU_SUSFS_SUS_MAP\
          \tbool "Enable to hide mmapped real file from proc maps"\
          \tdepends on KSU_SUSFS\
          \tdefault y\
          \
          endmenu' "$KSU_KERNEL/Kconfig"
              echo "SUSFS Kconfig injected"
            fi

            # 2. Add SUSFS build info to Makefile (if not already present)
            if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
              echo "Injecting SUSFS Makefile entries..."
              cat >> "$KSU_KERNEL/Makefile" << 'MKEOF'

          ## For susfs stuff ##
          ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)
          $(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E '^#define SUSFS_VERSION' | cut -d' ' -f3 | sed 's/"//g'))
          $(info )
          $(info -- SUSFS_VERSION: $(SUSFS_VERSION))
          else
          $(info -- You have not integrated susfs in your kernel yet.)
          $(info -- Read: https://gitlab.com/simonpunk/susfs4ksu)
          endif
          MKEOF
              echo "SUSFS Makefile entries injected"
            fi

            # 3. Add susfs.h include to core/init.c (if not already present)
            if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/core/init.c"; then
              echo "Injecting susfs.h include into core/init.c..."
              sed -i '/#include <linux\/workqueue.h>/a #include <linux/susfs.h>' "$KSU_KERNEL/core/init.c"
            fi

            # 4. Add susfs_init() call to core/init.c (if not already present)
            if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs_init" "$KSU_KERNEL/core/init.c"; then
              echo "Injecting susfs_init() call..."
              sed -i '/ksu_feature_init/i \
          #ifdef CONFIG_KSU_SUSFS\
          \tsusfs_init();\
          #endif' "$KSU_KERNEL/core/init.c"
            fi

            # 5. Add susfs includes to supercall/dispatch.c (if not already present)
            if [ -f "$KSU_KERNEL/supercall/dispatch.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/supercall/dispatch.c"; then
              echo "Injecting susfs.h include into dispatch.c..."
              sed -i '/#include <linux\/version.h>/a #include <linux/susfs.h>' "$KSU_KERNEL/supercall/dispatch.c"
            fi

            echo "=== Manual SUSFS fallback complete ==="
          fi

          # Verify Kconfig has SUSFS entries
          if grep -r "CONFIG_KSU_SUSFS" $KSU_DIR/kernel/Kconfig 2>/dev/null; then
            echo "SUSFS_OK=true" >> $GITHUB_ENV
            echo "SUSFS Kconfig verified OK"
          else
            echo "SUSFS_OK=false" >> $GITHUB_ENV
            echo "WARNING: SUSFS Kconfig NOT found in $KSU_DIR — SUSFS will NOT be enabled"
          fi

      # ===== KERNEL CONFIG =====
      - name: Configure Kernel
        run: |
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"

          # --- KernelSU ---
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then
            cat >> $DEFCONFIG << 'EOF'

          # KernelSU-Next
          CONFIG_KSU=y
          EOF
          fi

          # --- SUSFS ---
          if [ "${{ env.SUSFS_OK }}" = "true" ] && [ "${{ inputs.enable_susfs }}" = "true" ]; then
            cat >> $DEFCONFIG << 'EOF'

          # SUSFS
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          EOF
          fi

          # --- Module Loading (CRITICAL: allow vendor modules) ---
          cat >> $DEFCONFIG << 'EOF'

          # Module Compatibility (allow vendor_boot modules to load)
          CONFIG_MODVERSIONS=n
          CONFIG_MODULE_SIG_FORCE=n
          CONFIG_MODULE_SIG_ALL=n
          EOF

          # --- Memory Optimization ---
          cat >> $DEFCONFIG << 'EOF'

          # Memory Optimization
          CONFIG_ZRAM=y
          CONFIG_ZRAM_WRITEBACK=y
          CONFIG_ZSMALLOC=y
          CONFIG_COMPACTION=y
          CONFIG_KSM=y
          CONFIG_TRANSPARENT_HUGEPAGE=y
          CONFIG_SLAB_FREELIST_RANDOM=y
          EOF

          # --- I/O Optimization ---
          cat >> $DEFCONFIG << 'EOF'

          # I/O Optimization
          CONFIG_IOSCHED_BFQ=y
          CONFIG_BFQ_GROUP_IOSCHED=y
          EOF

          # --- Networking ---
          cat >> $DEFCONFIG << 'EOF'

          # Networking
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y

          # IPSet
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          EOF

          # --- Branding ---
          cat >> $DEFCONFIG << 'EOF'

          # Branding
          CONFIG_LOCALVERSION="-Castorice"
          CONFIG_LOCALVERSION_AUTO=n
          EOF

          echo "=== Defconfig additions ==="
          tail -60 $DEFCONFIG

      # ===== BUILD SYSTEM PATCHES =====
      - name: Patch Build System
        run: |
          cd kernel/common

          # Remove protected exports (prevents build failures)
          rm -rf android/abi_gki_protected_exports_* || true
          if [ -f "BUILD.bazel" ]; then
            sed -i '/abi_gki_protected_exports/d' BUILD.bazel
            sed -i '/protected_exports/d' BUILD.bazel
            sed -i '/check_defconfig/d' BUILD.bazel
          fi

          if [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl; then
            sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          fi

          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && sed -i '/check_defconfig/d' "$f"
          done

          # Bypass ABI check script
          PROT_SCRIPT="../build/kernel/abi/check_buildtime_symbol_protection.py"
          if [ -f "$PROT_SCRIPT" ]; then
            perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "$PROT_SCRIPT"
          fi

          # Clean dirty flags
          if [ -f "../build/kernel/kleaf/impl/stamp.bzl" ]; then
            sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          fi
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          : > .scmversion

          echo "Build system patched"

      - name: Commit Changes
        run: |
          cd kernel/common
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Castorice: GKI kernel with KSU+SUSFS+optimizations" || true

      # ===== BUILD =====
      - name: Build Kernel
        run: |
          cd kernel
          echo "=== Building Castorice GKI Kernel ==="
          tools/bazel build \
            --config=fast \
            //common:kernel_aarch64_dist 2>&1
          echo "=== Build completed ==="
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Output
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          cd kernel

          tools/bazel run \
            --config=fast \
            //common:kernel_aarch64_dist \
            -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true

          # Search bazel-out for missing artifacts
          for artifact in Image Image.gz Image.lz4; do
            if [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ]; then
              FOUND=$(find bazel-out -name "$artifact" -type f 2>/dev/null | head -n 1)
              if [ -n "$FOUND" ]; then
                cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
              fi
            fi
          done

          echo "=== Build artifacts ==="
          ls -lah $GITHUB_WORKSPACE/dist/

          # Get actual kernel version
          if [ -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            BUILT_VER=$(strings $GITHUB_WORKSPACE/dist/Image | grep "Linux version" | head -1)
            echo "BUILT_KERNEL_VERSION=$BUILT_VER" >> $GITHUB_ENV
            echo "Built: $BUILT_VER"
          fi

      - name: Verify Build
        run: |
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            if [ -f "$f" ]; then
              echo "Found: $f ($(du -h $f | cut -f1))"
              HAS_IMAGE=true
            fi
          done
          if [ "$HAS_IMAGE" = "false" ]; then
            echo "BUILD FAILED: No kernel image found!"
            exit 1
          fi

      # ===== REPACK STOCK BOOT.IMG =====
      - name: Setup Magiskboot
        run: |
          mkdir -p $GITHUB_WORKSPACE/magiskboot
          MAGISKBOOT_DLINK=$(curl -sL https://api.github.com/repos/xiaoxindada/magisk_bins_ndk/releases 2>/dev/null \
            | jq -r '.[0].assets[] | select(.name | endswith(".7z")) | .browser_download_url' 2>/dev/null | head -n1)

          if [ -n "$MAGISKBOOT_DLINK" ] && [ "$MAGISKBOOT_DLINK" != "null" ]; then
            echo "Downloading magiskboot: $MAGISKBOOT_DLINK"
            aria2c -s16 -x16 -k1M "$MAGISKBOOT_DLINK" -o magiskboot.7z
            7z e magiskboot.7z native/out/x86_64/magiskboot -o$GITHUB_WORKSPACE/magiskboot/
            chmod +x $GITHUB_WORKSPACE/magiskboot/magiskboot
            rm -f magiskboot.7z
            echo "MAGISKBOOT=$GITHUB_WORKSPACE/magiskboot/magiskboot" >> $GITHUB_ENV
            echo "MAGISKBOOT_OK=true" >> $GITHUB_ENV
          else
            echo "WARNING: Could not download magiskboot"
            echo "MAGISKBOOT_OK=false" >> $GITHUB_ENV
          fi

      - name: Repack Stock Boot Image
        if: ${{ inputs.stock_boot_url != '' }}
        run: |
          cd $GITHUB_WORKSPACE/magiskboot
          STOCK_URL="${{ inputs.stock_boot_url }}"

          echo "Downloading stock boot.img: $STOCK_URL"
          aria2c -s16 -x16 -k1M "$STOCK_URL" -o stock_boot.img

          STOCK_SIZE=$(stat -c%s stock_boot.img)
          echo "Stock boot.img size: $STOCK_SIZE bytes"

          if [ "${{ env.MAGISKBOOT_OK }}" != "true" ]; then
            echo "ERROR: magiskboot not available, cannot repack"
            exit 1
          fi

          MAGISKBOOT="${{ env.MAGISKBOOT }}"

          # Unpack stock boot
          $MAGISKBOOT unpack -h stock_boot.img
          echo "=== Unpacked stock boot ==="
          ls -lah

          # Find our built kernel image
          KERNEL_IMG=""
          if [ -f "$GITHUB_WORKSPACE/dist/Image.gz" ]; then
            KERNEL_IMG="$GITHUB_WORKSPACE/dist/Image.gz"
          elif [ -f "$GITHUB_WORKSPACE/dist/Image.lz4" ]; then
            KERNEL_IMG="$GITHUB_WORKSPACE/dist/Image.lz4"
          elif [ -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            KERNEL_IMG="$GITHUB_WORKSPACE/dist/Image"
          fi

          if [ -z "$KERNEL_IMG" ]; then
            echo "ERROR: No kernel image found in dist/"
            exit 1
          fi

          # Replace kernel
          echo "Replacing kernel with: $KERNEL_IMG"
          rm -f kernel
          cp "$KERNEL_IMG" kernel

          # Repack — Enforcing
          echo "=== Repacking boot.img (Enforcing) ==="
          $MAGISKBOOT repack stock_boot.img
          truncate -s ${{ env.BOOT_PARTITION_SIZE }} new-boot.img
          mv new-boot.img $GITHUB_WORKSPACE/dist/Castorice-GKI-boot-Enforcing.img
          echo "Enforcing boot.img: $(du -h $GITHUB_WORKSPACE/dist/Castorice-GKI-boot-Enforcing.img | cut -f1)"

          # Repack — Permissive
          echo "=== Repacking boot.img (Permissive) ==="
          if [ -f "header" ]; then
            sed -i '/cmdline=/ s/$/ androidboot.selinux=permissive/' header
            $MAGISKBOOT repack stock_boot.img
            truncate -s ${{ env.BOOT_PARTITION_SIZE }} new-boot.img
            mv new-boot.img $GITHUB_WORKSPACE/dist/Castorice-GKI-boot-Permissive.img
            echo "Permissive boot.img: $(du -h $GITHUB_WORKSPACE/dist/Castorice-GKI-boot-Permissive.img | cut -f1)"
          fi

          echo "REPACK_OK=true" >> $GITHUB_ENV

      # ===== ANYKERNEL3 =====
      - name: Package AnyKernel3
        run: |
          STAG=""
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then STAG="-SUSFS"; fi
          KSUTAG=""
          if [ "${{ inputs.enable_ksu }}" = "true" ]; then KSUTAG="-KSU_Next"; fi
          BASE_NAME="Castorice-GKI-6.6${KSUTAG}${STAG}-fire-$(date +%Y%m%d)"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3

          cat > anykernel.sh << 'AKEOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          properties() { '
          kernel.string=Castorice GKI Kernel by naidrahiqa
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=fire
          device.name2=Redmi 12
          supported.versions=15
          supported.patchlevels=
          '; }
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          AKEOF

          # Copy kernel image
          if [ -f "$GITHUB_WORKSPACE/dist/Image.gz" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.gz .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image" ]; then
            cp $GITHUB_WORKSPACE/dist/Image .
          elif [ -f "$GITHUB_WORKSPACE/dist/Image.lz4" ]; then
            cp $GITHUB_WORKSPACE/dist/Image.lz4 .
          fi

          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      # ===== OUTPUT =====
      - name: Prepare Output
        run: |
          mkdir -p out
          cp dist/Castorice-GKI-boot-*.img out/ 2>/dev/null || true
          cp dist/${ZIP_NAME}-AnyKernel3.zip out/ 2>/dev/null || true
          cp dist/Image* out/ 2>/dev/null || true
          echo "=== Final output ==="
          ls -lah out/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-GKI-6.6-fire"
          path: out/*
          if-no-files-found: warn
          compression-level: 9
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v6.6-castorice-gki-${{ github.run_number }}"
          name: "Castorice GKI 6.6 — Redmi 12 Fire"
          body: |
            ## ⚡ Castorice GKI Kernel for Redmi 12 (fire) — HyperOS 2

            ### Kernel Info
            - **Type**: GKI (Generic Kernel Image)
            - **KMI**: `6.6-${{ env.ANDROID_VERSION }}-${{ env.KMI_GENERATION }}`
            - **KernelSU-Next**: v${{ env.KSU_VERSION }}
            - **SUSFS**: ${{ inputs.enable_susfs }}
            - **Toolchain**: Kleaf/Bazel (AOSP)

            ### Features
            - 🛡️ KernelSU-Next + SUSFS (root hiding)
            - 🧠 Memory: ZRAM writeback, KSM, THP, compaction
            - 💾 I/O: BFQ scheduler
            - 🌐 Network: TCP BBR, FQ, IPSet
            - 📦 Module compat: MODVERSIONS disabled

            ### Downloads
            | File | Method | SELinux |
            |------|--------|---------|
            | `*-Enforcing.img` | `fastboot flash boot` | Enforcing |
            | `*-Permissive.img` | `fastboot flash boot` | Permissive |
            | `*-AnyKernel3.zip` | Flash via Recovery | Enforcing |

            ### Flash Guide
            ```bash
            fastboot flash boot Castorice-GKI-boot-Enforcing.img
            fastboot reboot
            ```

            ### Compatibility
            - ✅ HyperOS 2.x (Android 15) — kernel 6.6
            - ❌ MIUI 14 / HyperOS 1.x — use Legacy 4.19

            > ⚠️ Always use `fastboot boot <img>` to TEST before permanent flash!
          files: |
            out/*.img
            out/*.zip
            out/Image*
          draft: false
          prerelease: false
