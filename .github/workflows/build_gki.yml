name: "ðŸ”¥ GKI 6.6 â€” KernelSU (No SUSFS)"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative
      safety_profile:
        description: "Boot safety profile"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      clang_toolchain:
        description: "Clang Toolchain (optional, default: Bazel's built-in)"
        required: true
        type: choice
        default: "bazel-default"
        options:
          - bazel-default
          - zyc-latest
          - proton-latest
          - neutron-latest
      release_tag:
        description: "Release Tag (same tag = same release)"
        required: true
        default: "v1.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: "8"
  KSU_VERSION: ""
  ZIP_NAME: ""

jobs:
  build:
    name: "GKI 6.6 â€” ${{ inputs.ksu_method }} â€” ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # â”€â”€â”€â”€â”€ Environment Setup â”€â”€â”€â”€â”€
      - name: ðŸ“¥ Checkout
        uses: actions/checkout@v4

      - name: ðŸ§¹ Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache \
            /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox \
            powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h /

      - name: ðŸ’¾ Setup Swap (16GB)
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile \
            || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          free -h

      - name: ðŸ“¦ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio \
            kmod rsync lz4 jq patch binutils libncurses-dev \
            pkg-config ninja-build zstd aria2 p7zip-full

      - name: ðŸ”§ Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: ðŸ”¨ Download Custom Toolchain (if selected)
        if: inputs.clang_toolchain != 'bazel-default'
        run: |
          mkdir -p prebuilts/clang/host/linux-x86
          cd prebuilts/clang/host/linux-x86

          TOOLCHAIN="${{ inputs.clang_toolchain }}"
          case "$TOOLCHAIN" in
            zyc-latest)
              echo "ðŸ”¨ Downloading ZyClang..."
              ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
              ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
              mkdir -p clang-zyc && tar -xf clang.tar.gz -C clang-zyc && rm clang.tar.gz
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-zyc" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              ;;
            proton-latest)
              echo "ðŸ”¨ Downloading Proton Clang..."
              PROTON_URL=$(curl -s https://api.github.com/repos/kdrag0n/proton-clang/releases/latest | jq -r '.assets[0].browser_download_url')
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$PROTON_URL"
              mkdir -p clang-proton && tar -xf clang.tar.gz -C clang-proton && rm clang.tar.gz
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-proton" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ProtonClang" >> $GITHUB_ENV
              ;;
            neutron-latest)
              echo "ðŸ”¨ Downloading Neutron Clang..."
              NEUTRON_URL=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$NEUTRON_URL"
              mkdir -p clang-neutron && tar -xf clang.tar.gz -C clang-neutron && rm clang.tar.gz
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-neutron" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              ;;
          esac

          cd $GITHUB_WORKSPACE
          echo "âœ… Custom toolchain downloaded"

      - name: ðŸ”§ Configure Custom Toolchain for Bazel
        if: inputs.clang_toolchain != 'bazel-default'
        run: |
          cd kernel
          # Create custom toolchain config
          cat > build.config.custom_clang << EOF
          CLANG_PREBUILT_BIN=$CUSTOM_CLANG_PATH/bin
          CLANG_VERSION=\$(cd \$CLANG_PREBUILT_BIN && ./clang --version | head -n1 | cut -d' ' -f4)
          PATH=\$CLANG_PREBUILT_BIN:\$PATH
          EOF
          echo "âœ… Custom toolchain configured"
          echo "TOOLCHAIN_NAME=${{ env.TOOLCHAIN_NAME }}" >> $GITHUB_ENV

      # â”€â”€â”€â”€â”€ Kernel Source â”€â”€â”€â”€â”€
      - name: ðŸŒ Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          cd common && make kernelversion

      - name: ðŸ”¢ Set KMI Generation
        run: |
          cd kernel/common
          if [ -f "build.config.common" ]; then
            if grep -q "KMI_GENERATION" build.config.common; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common
            else
              echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
            fi
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" \
              && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" \
            && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${KMI_GENERATION}\"/" "$STAMP_FILE" || true

      # â”€â”€â”€â”€â”€ KernelSU Integration â”€â”€â”€â”€â”€
      - name: ðŸ›¡ï¸ Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          cd kernel/common
          KSU_METHOD="${{ inputs.ksu_method }}"

          case "$KSU_METHOD" in
            kernelsu-next)
              KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest | jq -r '.tag_name')
              if [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ]; then
                git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              else
                git clone --depth=1 --branch "$KSU_TAG" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              fi ;;
            wildksu)  git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU ;;
            sukisu)   git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b main KernelSU ;;
            rsukisu)  git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git -b builtin KernelSU ;;
          esac

          cp -r "$(pwd)/KernelSU/kernel" "drivers/kernelsu"
          rm -rf "drivers/kernelsu/include/uapi" "drivers/kernelsu/uapi"
          mkdir -p "drivers/kernelsu/uapi" "drivers/kernelsu/include/uapi"
          for uapi_dir in "KernelSU/kernel/uapi" "KernelSU/uapi"; do
            if [ -d "$uapi_dir" ]; then
              cp -r "$uapi_dir"/* "drivers/kernelsu/uapi/" 2>/dev/null || true
              cp -r "$uapi_dir"/* "drivers/kernelsu/include/uapi/" 2>/dev/null || true
              break
            fi
          done

          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu/Kconfig" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

          KSU_VERSION=$(cd KernelSU && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          [ -f "drivers/kernelsu/Kbuild" ] \
            && sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true

      # â”€â”€â”€â”€â”€ Kernel Configuration â”€â”€â”€â”€â”€
      - name: âš™ï¸ Configure Kernel
        run: |
          set -euo pipefail
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          SAFETY_PROFILE="${{ inputs.safety_profile }}"
          TUNING_PROFILE="${{ inputs.tuning_profile }}"

          add_cfg() {
            local cfg="$1"
            sed -i "/^${cfg%%=*}=.*/d" "$DEFCONFIG"
            echo "$cfg" >> "$DEFCONFIG"
          }

          # KernelSU
          echo -e "\n# KernelSU" >> "$DEFCONFIG"
          add_cfg "CONFIG_KSU=y"

          # Module Compatibility
          echo -e "\n# Module Compatibility" >> "$DEFCONFIG"
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"
          add_cfg "CONFIG_MODULE_SIG_ALL=n"

          # CPU Governors (all compiled in)
          echo -e "\n# CPU Governor" >> "$DEFCONFIG"
          for gov in SCHEDUTIL PERFORMANCE ONDEMAND CONSERVATIVE USERSPACE POWERSAVE; do
            add_cfg "CONFIG_CPU_FREQ_GOV_${gov}=y"
          done
          case "$GOVERNOR" in
            performance)  add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" ;;
            ondemand)     add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" ;;
            conservative) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" ;;
            *)            add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" ;;
          esac

          # Stable baseline to avoid bootloop regressions.
          echo -e "\n# Stability Baseline" >> "$DEFCONFIG"
          add_cfg "CONFIG_HIGH_RES_TIMERS=y"
          add_cfg "CONFIG_WQ_POWER_EFFICIENT_DEFAULT=n"

          if [ "$SAFETY_PROFILE" = "performance" ]; then
            echo -e "\n# Performance Profile" >> "$DEFCONFIG"
            for cfg in CONFIG_HZ_1000=y CONFIG_HZ=1000 CONFIG_HZ_250=n CONFIG_HZ_300=n \
              CONFIG_PREEMPT=y CONFIG_PREEMPT_VOLUNTARY=n CONFIG_PREEMPT_NONE=n \
              CONFIG_ZRAM_WRITEBACK=y CONFIG_CRYPTO_LZ4=y CONFIG_CRYPTO_ZSTD=y \
              CONFIG_KSM=y CONFIG_LRU_GEN=y CONFIG_LRU_GEN_ENABLED=y \
              CONFIG_TCP_CONG_ADVANCED=y CONFIG_TCP_CONG_BBR=y 'CONFIG_DEFAULT_TCP_CONG="bbr"' \
              CONFIG_NET_SCH_FQ=y 'CONFIG_DEFAULT_NET_SCH="fq"'; do
              add_cfg "$cfg"
            done

            if [ "$TUNING_PROFILE" = "gaming" ]; then
              add_cfg "CONFIG_IOSCHED_BFQ=y"
              add_cfg "CONFIG_BFQ_GROUP_IOSCHED=y"
              add_cfg "CONFIG_MQ_IOSCHED_KYBER=y"
            elif [ "$TUNING_PROFILE" = "social_media" ]; then
              add_cfg "CONFIG_COMPACTION=y"
              add_cfg "CONFIG_TRANSPARENT_HUGEPAGE=y"
            fi
          fi

          # Branding
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo -e "\n# Branding\nCONFIG_LOCALVERSION=\"${LOCALVER}\"\nCONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

      # â”€â”€â”€â”€â”€ Build System Patches â”€â”€â”€â”€â”€
      - name: ðŸ”¨ Patch Build System
        run: |
          cd kernel/common
          rm -rf android/abi_gki_protected_exports_* || true
          if [ -f "BUILD.bazel" ]; then
            sed -i -e '/abi_gki_protected_exports/d' -e '/protected_exports/d' \
              -e '/check_defconfig/d' \
              -e 's/kmi_symbol_list_strict_mode = True/kmi_symbol_list_strict_mode = False/g' \
              -e 's/trim_nonlisted_kmi = True/trim_nonlisted_kmi = False/g' BUILD.bazel
          fi
          [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl \
            && sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && sed -i '/check_defconfig/d' "$f"
          done
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] \
            && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "../build/kernel/abi/check_buildtime_symbol_protection.py"
          [ -f "../build/kernel/kleaf/impl/stamp.bzl" ] \
            && sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          : > .scmversion

      # â”€â”€â”€â”€â”€ Build & Package â”€â”€â”€â”€â”€
      - name: ðŸ”¨ Build Kernel
        run: |
          set -euo pipefail
          cd kernel
          tools/bazel build --config=fast //common:kernel_aarch64_dist 2>&1 | tee build.log
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: ðŸ“¤ Extract Build Output
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          cd kernel
          tools/bazel run --config=fast //common:kernel_aarch64_dist \
            -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true
          for artifact in Image Image.gz Image.lz4; do
            if [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ]; then
              FOUND=$(find bazel-out -name "$artifact" -type f 2>/dev/null | head -n 1)
              [ -n "$FOUND" ] && cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
            fi
          done

      - name: âœ… Verify Build
        run: |
          HAS_IMAGE=false
          IMAGE_COUNT=0
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            if [ -f "$f" ]; then
              echo "Found: $f ($(du -h $f | cut -f1))"
              HAS_IMAGE=true
              IMAGE_COUNT=$((IMAGE_COUNT+1))
            fi
          done
          [ "$HAS_IMAGE" = "false" ] && echo "âŒ No kernel image found!" && exit 1
          [ "$IMAGE_COUNT" -gt 1 ] && echo "âŒ More than one kernel image found, aborting for safety." && exit 1

      - name: ðŸ“¤ Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gki-debug-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}-${{ inputs.safety_profile }}-${{ inputs.tuning_profile }}
          path: |
            kernel/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
            dist/Image*
          if-no-files-found: warn
          retention-days: 7

      - name: ðŸ“¦ Package AnyKernel3
        run: |
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"

          # Convert to short names for filename
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac

          # Determine toolchain name
          if [ "${{ inputs.clang_toolchain }}" = "bazel-default" ]; then
            TOOLCHAIN_SHORT="Bazel"
          else
            # Get custom clang version
            CLANG_VER=$($CUSTOM_CLANG_PATH/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
            TOOLCHAIN_SHORT="${{ env.TOOLCHAIN_NAME }}${CLANG_VER}"
          fi

          # New naming: Castorice-<Name>-v<N>-GKI66-<Root>-NoSUSFS-<Gov>-<Toolchain>-Redmi12
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-GKI66-${ROOT_SHORT}-NoSUSFS-${GOV_SHORT}-${TOOLCHAIN_SHORT}-Redmi12"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' 'properties() {' \
            "kernel.string=${KERNEL_STRING}" \
            'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'do.cleanuponabort=0' \
            'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=15' 'supported.patchlevels=' \
            '}' '' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' \
            '' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          for img in "$GITHUB_WORKSPACE/dist/Image" "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.lz4"; do
            [ -f "$img" ] && cp "$img" . && break
          done
          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      # â”€â”€â”€â”€â”€ Release â”€â”€â”€â”€â”€
      - name: ðŸ“¤ Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-GKI-6.6-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}"
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 30

      - name: ðŸš€ Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Castorice Kernel ${{ inputs.release_tag }}"
          body: |
            ## ðŸ”¥ Castorice Kernel ${{ inputs.release_tag }}

            ### ðŸ“¦ Build: GKI 6.6 (No SUSFS) - ${{ inputs.ksu_method }} - ${{ inputs.cpu_governor }}

            **Build Info:**
            - ðŸ·ï¸ Variant: GKI 6.6 (No SUSFS)
            - ðŸ”‘ Root: ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }}
            - âš™ï¸ Governor: ${{ inputs.cpu_governor }}
            - ðŸ”¨ Toolchain: ${{ inputs.clang_toolchain == 'bazel-default' && 'Bazel (default)' || env.TOOLCHAIN_NAME }}
            - ðŸ“… Built: ${{ github.event.repository.updated_at }}

            **Features:**
            - âœ… HZ_1000, Full PREEMPT, HRTIMER
            - âœ… All CPU Governors built-in (switchable)
            - âœ… TCP BBR, BFQ + Kyber I/O
            - âœ… LRU-Gen, LZ4/ZSTD ZRAM
            - âœ… MODVERSIONS enabled (vendor modules safe)

            **Compatibility:**
            - âœ… HyperOS 2.x (Android 15)
            - âŒ HyperOS 1.x / MIUI 14 â†’ use Legacy 4.19

            ---

            ðŸ“– [Installation Guide](https://github.com/${{ github.repository }}#-cara-install-gampang-kok)
          files: dist/*.zip
          draft: false
          prerelease: false
          append_body: true
