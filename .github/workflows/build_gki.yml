name: "🔥 GKI 6.6 — KernelSU (No SUSFS)"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: "8"
  KSU_VERSION: ""
  ZIP_NAME: ""

jobs:
  build:
    name: "GKI 6.6 — ${{ inputs.ksu_method }} — ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ───── Environment Setup ─────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache \
            /usr/local/share/chromium /usr/local/share/powershell
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox \
            powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h /

      - name: 💾 Setup Swap (16GB)
        run: |
          sudo swapoff /mnt/swapfile 2>/dev/null || true
          sudo rm -f /mnt/swapfile
          sudo fallocate -l 16G /mnt/swapfile \
            || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          free -h

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio \
            kmod rsync lz4 jq patch binutils libncurses-dev \
            pkg-config ninja-build zstd aria2 p7zip-full

      - name: 🔧 Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # ───── Kernel Source ─────
      - name: 🌐 Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          cd common && make kernelversion

      - name: 🔢 Set KMI Generation
        run: |
          cd kernel/common
          if [ -f "build.config.common" ]; then
            if grep -q "KMI_GENERATION" build.config.common; then
              sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common
            else
              echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
            fi
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" \
              && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" \
            && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${KMI_GENERATION}\"/" "$STAMP_FILE" || true

      # ───── KernelSU Integration ─────
      - name: 🛡️ Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          cd kernel/common
          KSU_METHOD="${{ inputs.ksu_method }}"

          case "$KSU_METHOD" in
            kernelsu-next)
              KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest | jq -r '.tag_name')
              if [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ]; then
                git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              else
                git clone --depth=1 --branch "$KSU_TAG" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              fi ;;
            wildksu)  git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU ;;
            sukisu)   git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b main KernelSU ;;
            rsukisu)  git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git -b builtin KernelSU ;;
          esac

          cp -r "$(pwd)/KernelSU/kernel" "drivers/kernelsu"
          rm -rf "drivers/kernelsu/include/uapi" "drivers/kernelsu/uapi"
          mkdir -p "drivers/kernelsu/uapi" "drivers/kernelsu/include/uapi"
          for uapi_dir in "KernelSU/kernel/uapi" "KernelSU/uapi"; do
            if [ -d "$uapi_dir" ]; then
              cp -r "$uapi_dir"/* "drivers/kernelsu/uapi/" 2>/dev/null || true
              cp -r "$uapi_dir"/* "drivers/kernelsu/include/uapi/" 2>/dev/null || true
              break
            fi
          done

          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu/Kconfig" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig

          KSU_VERSION=$(cd KernelSU && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          [ -f "drivers/kernelsu/Kbuild" ] \
            && sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true

      # ───── Kernel Configuration ─────
      - name: ⚙️ Configure Kernel
        run: |
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"

          # KernelSU
          echo -e "\n# KernelSU\nCONFIG_KSU=y" >> $DEFCONFIG

          # Module Compatibility
          echo -e "\n# Module Compatibility\nCONFIG_MODULE_SIG_FORCE=n\nCONFIG_MODULE_SIG_ALL=n" >> $DEFCONFIG

          # Gaming & Latency
          echo -e "\n# Gaming & Latency" >> $DEFCONFIG
          for cfg in CONFIG_HZ_1000=y CONFIG_HZ=1000 CONFIG_HZ_250=n CONFIG_HZ_300=n \
            CONFIG_PREEMPT=y CONFIG_PREEMPT_VOLUNTARY=n CONFIG_PREEMPT_NONE=n \
            CONFIG_HIGH_RES_TIMERS=y CONFIG_SND_HRTIMER=y CONFIG_WQ_POWER_EFFICIENT_DEFAULT=n; do
            echo "$cfg" >> $DEFCONFIG
          done

          # CPU Governors (all compiled in)
          echo -e "\n# CPU Governor" >> $DEFCONFIG
          for gov in SCHEDUTIL PERFORMANCE ONDEMAND CONSERVATIVE USERSPACE POWERSAVE; do
            echo "CONFIG_CPU_FREQ_GOV_${gov}=y" >> $DEFCONFIG
          done
          case "$GOVERNOR" in
            performance)  echo "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" >> $DEFCONFIG ;;
            ondemand)     echo "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" >> $DEFCONFIG ;;
            conservative) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" >> $DEFCONFIG ;;
            *)            echo "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" >> $DEFCONFIG ;;
          esac

          # Memory Optimization
          echo -e "\n# Memory Optimization" >> $DEFCONFIG
          for cfg in CONFIG_ZRAM_WRITEBACK=y CONFIG_CRYPTO_LZ4=y CONFIG_CRYPTO_LZ4HC=y \
            CONFIG_CRYPTO_ZSTD=y CONFIG_COMPACTION=y CONFIG_KSM=y CONFIG_TRANSPARENT_HUGEPAGE=y \
            CONFIG_SLAB_FREELIST_RANDOM=y CONFIG_SLAB_FREELIST_HARDENED=y \
            CONFIG_LRU_GEN=y CONFIG_LRU_GEN_ENABLED=y; do
            echo "$cfg" >> $DEFCONFIG
          done

          # I/O Scheduler
          echo -e "\n# I/O Scheduler\nCONFIG_IOSCHED_BFQ=y\nCONFIG_BFQ_GROUP_IOSCHED=y\nCONFIG_MQ_IOSCHED_KYBER=y" >> $DEFCONFIG

          # Networking
          echo -e "\n# Networking" >> $DEFCONFIG
          for cfg in CONFIG_TCP_CONG_ADVANCED=y CONFIG_TCP_CONG_BBR=y 'CONFIG_DEFAULT_TCP_CONG="bbr"' \
            CONFIG_NET_SCH_FQ=y 'CONFIG_DEFAULT_NET_SCH="fq"' CONFIG_IP_NF_TARGET_TTL=y \
            CONFIG_IP6_NF_TARGET_HL=y CONFIG_IP_SET=y CONFIG_IP_SET_MAX=65534 \
            CONFIG_IP_SET_BITMAP_IP=y CONFIG_IP_SET_BITMAP_IPMAC=y CONFIG_IP_SET_BITMAP_PORT=y \
            CONFIG_IP_SET_HASH_IP=y CONFIG_IP_SET_HASH_IPPORT=y CONFIG_IP_SET_HASH_IPPORTIP=y \
            CONFIG_IP_SET_HASH_NET=y CONFIG_IP_SET_LIST_SET=y; do
            echo "$cfg" >> $DEFCONFIG
          done

          # Branding
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo -e "\n# Branding\nCONFIG_LOCALVERSION=\"${LOCALVER}\"\nCONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

      # ───── Build System Patches ─────
      - name: 🔨 Patch Build System
        run: |
          cd kernel/common
          rm -rf android/abi_gki_protected_exports_* || true
          if [ -f "BUILD.bazel" ]; then
            sed -i -e '/abi_gki_protected_exports/d' -e '/protected_exports/d' \
              -e '/check_defconfig/d' \
              -e 's/kmi_symbol_list_strict_mode = True/kmi_symbol_list_strict_mode = False/g' \
              -e 's/trim_nonlisted_kmi = True/trim_nonlisted_kmi = False/g' BUILD.bazel
          fi
          [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl \
            && sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && sed -i '/check_defconfig/d' "$f"
          done
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] \
            && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "../build/kernel/abi/check_buildtime_symbol_protection.py"
          [ -f "../build/kernel/kleaf/impl/stamp.bzl" ] \
            && sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          : > .scmversion

      - name: 📝 Commit Changes
        run: |
          cd kernel/common
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Castorice GKI: ${{ inputs.ksu_method }} + gaming tweaks" || true

      # ───── Build & Package ─────
      - name: 🔨 Build Kernel
        run: |
          cd kernel
          tools/bazel build --config=fast //common:kernel_aarch64_dist 2>&1
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: 📤 Extract Build Output
        run: |
          mkdir -p $GITHUB_WORKSPACE/dist
          cd kernel
          tools/bazel run --config=fast //common:kernel_aarch64_dist \
            -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true
          for artifact in Image Image.gz Image.lz4; do
            if [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ]; then
              FOUND=$(find bazel-out -name "$artifact" -type f 2>/dev/null | head -n 1)
              [ -n "$FOUND" ] && cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
            fi
          done

      - name: ✅ Verify Build
        run: |
          HAS_IMAGE=false
          for f in dist/Image dist/Image.gz dist/Image.lz4; do
            [ -f "$f" ] && echo "Found: $f ($(du -h $f | cut -f1))" && HAS_IMAGE=true
          done
          [ "$HAS_IMAGE" = "false" ] && echo "❌ No kernel image found!" && exit 1

      - name: 📦 Package AnyKernel3
        run: |
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          
          # Convert to short names for filename
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac
          
          # New naming: Castorice-<Name>-v<N>-GKI66-<Root>-NoSUSFS-<Gov>-Bazel-Redmi12
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-GKI66-${ROOT_SHORT}-NoSUSFS-${GOV_SHORT}-Bazel-Redmi12"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' \
            '# AnyKernel3 Ramdisk Mod Script' 'properties() {' \
            "kernel.string=${KERNEL_STRING}" \
            'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'do.cleanuponabort=0' \
            'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=15' 'supported.patchlevels=' \
            '}' '' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' \
            '' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          for img in "$GITHUB_WORKSPACE/dist/Image" "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.lz4"; do
            [ -f "$img" ] && cp "$img" . && break
          done
          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      # ───── Release ─────
      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "Castorice-GKI-6.6-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}"
          path: dist/*.zip
          if-no-files-found: warn
          retention-days: 30

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-GKI-${{ inputs.ksu_method }}"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • GKI 6.6 • ${{ inputs.ksu_method }}"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)
            | Info | Value |
            |------|-------|
            | **Type** | GKI 6.6 (No SUSFS) |
            | **Root** | ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }} |
            | **KMI** | 6.6-android15-${{ env.KMI_GENERATION }} |
            | **Governor** | ${{ inputs.cpu_governor }} |
            | **SUSFS** | ❌ |

            ### Gaming Profile
            - HZ_1000, Full PREEMPT, HRTIMER
            - CPU Governor: **${{ inputs.cpu_governor }}** (all governors compiled in)
            - TCP BBR, BFQ + Kyber I/O, LRU-Gen, LZ4/ZSTD ZRAM

            ### Compatibility
            - ✅ HyperOS 2.x (Android 15)
            - ❌ HyperOS 1.x / MIUI 14 → use Legacy 4.19
          files: dist/*.zip
          draft: false
          prerelease: false
