name: Build Castorice GKI (6.6)

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name (Castorice-<THIS>-vN)"
        required: true
        default: "Starter"
      author_name:
        description: "Kernel Author Name"
        required: true
        default: "Castorice"
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_ksu:
        description: "Enable KernelSU-Next"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: "8"
  KERNEL_NAME: Castorice
  DEVICE_CODE: fire

jobs:
  build:
    name: "Castorice GKI 6.6"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 zip unzip kmod lz4 jq patch binutils pkg-config ninja-build zstd aria2 p7zip-full

      - name: Setup repo
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Sync Kernel Source
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: Set KMI Generation
        run: |
          cd kernel/common
          sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common || echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          if [ -f "$STAMP_FILE" ]; then
            sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${KMI_GENERATION}\"/" "$STAMP_FILE" || true
          fi

      - name: Setup KernelSU-Next
        if: ${{ inputs.enable_ksu == true }}
        run: |
          cd kernel/common
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -
          
          # Fix symlink for Bazel sandbox
          rm -rf drivers/kernelsu
          cp -r KernelSU-Next/kernel drivers/kernelsu
          
          if ! grep -q "kernelsu" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi
          
          # Fix git version in Bazel
          KSU_VERSION=$(cd KernelSU-Next && git rev-list --count HEAD)
          sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild 2>/dev/null || true
          
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV

      - name: Setup SUSFS
        if: ${{ inputs.enable_susfs == true }}
        run: |
          cd kernel/common
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          
          cp -rv susfs4ksu/kernel_patches/fs/* fs/
          cp -rv susfs4ksu/kernel_patches/include/linux/* include/linux/
          
          if ! grep -q "susfs.o" fs/Makefile; then
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
          fi
          
          # Apply SUSFS patches
          for patch in susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            patch -p1 --forward < "$patch" || true
          done
          
          # Integrate SUSFS into KSU
          if [ -d "drivers/kernelsu" ]; then
            sed -i '/#include <linux\/workqueue.h>/a #include <linux\/susfs.h>' drivers/kernelsu/core/init.c 2>/dev/null || true
            sed -i 's/ksu_core_init(/susfs_init();\n    ksu_core_init(/g' drivers/kernelsu/core/init.c 2>/dev/null || true
            sed -i '/#include <linux\/version.h>/a #include <linux\/susfs.h>' drivers/kernelsu/supercall/dispatch.c 2>/dev/null || true
            
            cat << 'EOF' >> drivers/kernelsu/Kconfig
          config KSU_SUSFS
            bool "KernelSU addon - SUSFS"
            depends on KSU
            default y
          config KSU_SUSFS_SUS_PATH
            bool "Enable to hide suspicious path"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_SUS_MOUNT
            bool "Enable to hide suspicious mounts"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_SUS_KSTAT
            bool "Enable to spoof suspicious kstat"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_SPOOF_UNAME
            bool "Enable to spoof uname"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_ENABLE_LOG
            bool "Enable logging susfs log to kernel"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
            bool "Enable to hide ksu and susfs symbols from /proc/kallsyms"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
            bool "Enable to spoof bootconfig or cmdline"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_OPEN_REDIRECT
            bool "Enable open redirect"
            depends on KSU_SUSFS
            default y
          config KSU_SUSFS_SUS_MAP
            bool "Enable to hide mmapped real file from proc maps"
            depends on KSU_SUSFS
            default y
          EOF
          fi

      - name: Configure Defconfig
        run: |
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
          
          # Optimization
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_WRITEBACK=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          
          # Localversion
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}"
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG

      - name: Bypass KMI Strict
        run: |
          cd kernel/common
          if [ -f "BUILD.bazel" ]; then
            sed -i '/kmi_symbol_list_strict_mode/d' BUILD.bazel
            sed -i 's/trim_nonlisted_kmi = True/trim_nonlisted_kmi = False/g' BUILD.bazel
          fi

      - name: Build Kernel
        run: |
          cd kernel
          tools/bazel build --config=fast --//common:kmi_symbol_list_strict_mode=False //common:kernel_aarch64_dist
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Extract Build Artifacts
        run: |
          mkdir -p dist
          find kernel/bazel-out -name "Image" -type f -exec cp {} dist/ \;
          find kernel/bazel-out -name "Image.gz" -type f -exec cp {} dist/ \;
          find kernel/bazel-out -name "Image.lz4" -type f -exec cp {} dist/ \;

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          
          cat << EOF > anykernel.sh
          properties() {
            kernel.string=Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} by ${{ inputs.author_name }}
            do.devicecheck=1
            do.modules=0
            do.systemless=1
            do.cleanup=1
            device.name1=fire
            device.name2=Redmi 12
            supported.versions=15
          }
          block=boot;
          is_slot_device=auto;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          dump_boot;
          write_boot;
          EOF
          
          cp ../dist/Image* . || true
          BASE_NAME="Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-GKI-6.6-Redmi12"
          zip -r9 "../dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-GKI"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • GKI 6.6"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)
            ### Info
            - **Base**: GKI 6.6 Android 15
            - **KernelSU-Next**: YES
            - **SUSFS**: YES
          files: |
            dist/*.zip
            dist/Image*