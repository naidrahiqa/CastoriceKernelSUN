name: "🎯 Unified Kernel Builder"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "📦 Release Tag (e.g., v1.0)"
        required: true
        default: "v1.0"
      custom_name:
        description: "🏷️ Kernel Name"
        required: true
        default: "Gaming"
      author_name:
        description: "👤 Author Name"
        required: true
        default: "Castorice"
      
      # Kernel Selection
      kernel_type:
        description: "🔧 Kernel Type"
        required: true
        type: choice
        options:
          - gki-6.6
          - legacy-4.19
          - both
        default: "gki-6.6"
      
      # Root & Features
      root_method:
        description: "🔑 Root Method"
        required: true
        type: choice
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
        default: "kernelsu-next"
      
      enable_susfs:
        description: "🛡️ Enable SUSFS"
        required: true
        type: boolean
        default: false
      
      # Performance
      cpu_governor:
        description: "⚙️ CPU Governor"
        required: true
        type: choice
        options:
          - schedutil
          - performance
          - ondemand
          - conservative
        default: "schedutil"
      
      # Toolchain (Legacy only)
      clang_toolchain:
        description: "🔨 Clang Toolchain (Legacy only)"
        required: true
        type: choice
        options:
          - zyc-latest
          - proton-latest
          - neutron-latest
        default: "zyc-latest"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-gki:
    name: "🟢 Build GKI 6.6"
    if: inputs.kernel_type == 'gki-6.6' || inputs.kernel_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Call GKI Workflow
        run: |
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            WORKFLOW="build_gki_susfs.yml"
          else
            WORKFLOW="build_gki.yml"
          fi
          
          gh workflow run "$WORKFLOW" \
            --ref main \
            -f custom_name="${{ inputs.custom_name }}" \
            -f author_name="${{ inputs.author_name }}" \
            -f ksu_method="${{ inputs.root_method }}" \
            -f cpu_governor="${{ inputs.cpu_governor }}" \
            -f release_tag="${{ inputs.release_tag }}"
          
          echo "✅ Triggered $WORKFLOW"
        env:
          GH_TOKEN: ${{ github.token }}

  build-legacy:
    name: "🟠 Build Legacy 4.19"
    if: inputs.kernel_type == 'legacy-4.19' || inputs.kernel_type == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Call Legacy Workflow
        run: |
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            WORKFLOW="build_legacy_susfs.yml"
          else
            WORKFLOW="build_legacy.yml"
          fi
          
          gh workflow run "$WORKFLOW" \
            --ref main \
            -f custom_name="${{ inputs.custom_name }}" \
            -f author_name="${{ inputs.author_name }}" \
            -f ksu_method="${{ inputs.root_method }}" \
            -f cpu_governor="${{ inputs.cpu_governor }}" \
            -f release_tag="${{ inputs.release_tag }}" \
            -f clang_toolchain="${{ inputs.clang_toolchain }}"
          
          echo "✅ Triggered $WORKFLOW"
        env:
          GH_TOKEN: ${{ github.token }}

  summary:
    name: "📊 Build Summary"
    needs: [build-gki, build-legacy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "## 🎉 Build Triggered Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Release Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ inputs.release_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Name:** ${{ inputs.custom_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ inputs.author_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Kernel:** ${{ inputs.kernel_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Root:** ${{ inputs.root_method }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SUSFS:** ${{ inputs.enable_susfs && '✅ Enabled' || '❌ Disabled' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Governor:** ${{ inputs.cpu_governor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Toolchain:** ${{ inputs.clang_toolchain }} (Legacy)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏳ **Builds are running in the background...**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Actions](https://github.com/${{ github.repository }}/actions)" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release (when ready)](https://github.com/${{ github.repository }}/releases/tag/${{ inputs.release_tag }})" >> $GITHUB_STEP_SUMMARY
