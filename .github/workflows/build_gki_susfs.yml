name: "🔥 GKI 6.6 — KernelSU + SUSFS"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: "8"
  KSU_VERSION: ""
  SUSFS_OK: "false"
  ZIP_NAME: ""

jobs:
  build:
    name: "GKI 6.6 SUSFS — ${{ inputs.ksu_method }} — ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      # ───── Environment Setup ─────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: 💾 Setup Swap (16GB)
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd aria2 p7zip-full

      - name: 🔧 Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      # ───── Kernel Source ─────
      - name: 🌐 Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          cd common && make kernelversion

      - name: 🔢 Set KMI Generation
        run: |
          cd kernel/common
          if [ -f "build.config.common" ]; then
            grep -q "KMI_GENERATION" build.config.common && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common || echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${KMI_GENERATION}\"/" "$STAMP_FILE" || true

      # ───── KernelSU & SUSFS Integration ─────
      - name: 🛡️ Setup KernelSU (${{ inputs.ksu_method }})
        run: |
          cd kernel/common
          KSU_METHOD="${{ inputs.ksu_method }}"
          case "$KSU_METHOD" in
            kernelsu-next)
              KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest | jq -r '.tag_name')
              [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ] && git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU || git clone --depth=1 --branch "$KSU_TAG" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              ;;
            wildksu) git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU ;;
            sukisu) git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b main KernelSU ;;
            rsukisu) git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git -b builtin KernelSU ;;
          esac
          cp -r "$(pwd)/KernelSU/kernel" "drivers/kernelsu"
          rm -rf "drivers/kernelsu/include/uapi" "drivers/kernelsu/uapi"
          mkdir -p "drivers/kernelsu/uapi" "drivers/kernelsu/include/uapi"
          for uapi_dir in "KernelSU/kernel/uapi" "KernelSU/uapi"; do
            [ -d "$uapi_dir" ] && cp -r "$uapi_dir"/* "drivers/kernelsu/uapi/" 2>/dev/null && cp -r "$uapi_dir"/* "drivers/kernelsu/include/uapi/" 2>/dev/null && break
          done
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu/Kconfig" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          KSU_VERSION=$(cd KernelSU && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          [ -f "drivers/kernelsu/Kbuild" ] && sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true

      - name: 🥷 Setup SUSFS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} || git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${ANDROID_VERSION}-6.6
          cd common
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          [ -f "fs/Makefile" ] && ! grep -q "susfs.o" "fs/Makefile" && echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> "fs/Makefile"
          for patch in ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            [ -f "$patch" ] && git add -A && git commit -m "pre-susfs" --allow-empty -q && (git apply --3way "$patch" || patch -p1 --forward --fuzz=3 < "$patch" || true)
          done
          KSU_KERNEL="drivers/kernelsu"
          if [ -d "$KSU_KERNEL" ]; then
            if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
              printf '%s\n' \
                'menu "KernelSU - SUSFS"' \
                'config KSU_SUSFS' \
                '  bool "KernelSU addon - SUSFS"' \
                '  depends on KSU' \
                '  default y' \
                'config KSU_SUSFS_SUS_PATH' \
                '  bool "Hide suspicious paths"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_MOUNT' \
                '  bool "Hide suspicious mounts"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_KSTAT' \
                '  bool "Spoof kstat"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SPOOF_UNAME' \
                '  bool "Spoof uname"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_ENABLE_LOG' \
                '  bool "Enable logging"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS' \
                '  bool "Hide symbols from kallsyms"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG' \
                '  bool "Spoof cmdline/bootconfig"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_OPEN_REDIRECT' \
                '  bool "Open redirect"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_MAP' \
                '  bool "Hide mmapped files from proc maps"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'endmenu' \
                >> "$KSU_KERNEL/Kconfig"
            fi
            if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
              printf '%s\n' \
                '## SUSFS ##' \
                'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $?),0)' \
                '$(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E "^#define SUSFS_VERSION" | cut -d" " -f3 | sed "s/\"//g"))' \
                '$(info -- SUSFS_VERSION: $(SUSFS_VERSION))' \
                'else' \
                '$(info -- SUSFS not integrated)' \
                'endif' \
                >> "$KSU_KERNEL/Makefile"
            fi
            [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/core/init.c" && sed -i '/#include <linux\/workqueue.h>/a #include <linux\/susfs.h>' "$KSU_KERNEL/core/init.c"
            if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs_init" "$KSU_KERNEL/core/init.c"; then
              python3 -c "import sys; path='drivers/kernelsu/core/init.c'; content=open(path).read(); content=content.replace('ksu_feature_init', '#ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif\n\tksu_feature_init', 1) if 'susfs_init' not in content and 'ksu_feature_init' in content else content; open(path, 'w').write(content)"
            fi
            [ -f "$KSU_KERNEL/supercall/dispatch.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/supercall/dispatch.c" && sed -i '/#include <linux\/version.h>/a #include <linux\/susfs.h>' "$KSU_KERNEL/supercall/dispatch.c"
            grep -q "CONFIG_KSU_SUSFS" drivers/kernelsu/Kconfig 2>/dev/null && echo "SUSFS_OK=true" >> $GITHUB_ENV || echo "SUSFS_OK=false" >> $GITHUB_ENV
          fi

      # ───── Kernel Configuration ─────
      - name: ⚙️ Configure Kernel
        run: |
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          echo "" >> $DEFCONFIG
          echo "# KernelSU" >> $DEFCONFIG
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          if [ "$SUSFS_OK" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> $DEFCONFIG
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> $DEFCONFIG
            echo "SUSFS enabled in defconfig"
          else
            echo "SUSFS setup failed, building without SUSFS"
          fi
          echo "" >> $DEFCONFIG
          echo "# Module Compatibility" >> $DEFCONFIG
          echo "CONFIG_MODULE_SIG_FORCE=n" >> $DEFCONFIG
          echo "CONFIG_MODULE_SIG_ALL=n" >> $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# Gaming & Latency" >> $DEFCONFIG
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_HZ=1000" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_HIGH_RES_TIMERS=y" >> $DEFCONFIG
          echo "CONFIG_SND_HRTIMER=y" >> $DEFCONFIG
          echo "CONFIG_WQ_POWER_EFFICIENT_DEFAULT=n" >> $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# CPU Governor" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_ONDEMAND=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y" >> $DEFCONFIG
          case "$GOVERNOR" in
            performance) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" >> $DEFCONFIG ;;
            ondemand) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" >> $DEFCONFIG ;;
            conservative) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" >> $DEFCONFIG ;;
            *) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" >> $DEFCONFIG ;;
          esac
          echo "" >> $DEFCONFIG
          echo "# Memory" >> $DEFCONFIG
          echo "CONFIG_ZRAM_WRITEBACK=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_LZ4=y" >> $DEFCONFIG
          echo "CONFIG_CRYPTO_ZSTD=y" >> $DEFCONFIG
          echo "CONFIG_KSM=y" >> $DEFCONFIG
          echo "CONFIG_LRU_GEN=y" >> $DEFCONFIG
          echo "CONFIG_LRU_GEN_ENABLED=y" >> $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# I/O" >> $DEFCONFIG
          echo "CONFIG_IOSCHED_BFQ=y" >> $DEFCONFIG
          echo "CONFIG_MQ_IOSCHED_KYBER=y" >> $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "# Networking" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo 'CONFIG_DEFAULT_TCP_CONG="bbr"' >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          echo "CONFIG_IP_SET=y" >> $DEFCONFIG
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          LOCALVER="-Castorice-${CUSTOM_NAME}-v${BUILD_VER}-SUSFS"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

      # ───── Build System Patches ─────
      - name: 🔨 Patch Build System
        run: |
          cd kernel/common
          rm -rf android/abi_gki_protected_exports_* || true
          [ -f "BUILD.bazel" ] && sed -i '/abi_gki_protected_exports/d; /protected_exports/d; /check_defconfig/d; s/kmi_symbol_list_strict_mode = True/kmi_symbol_list_strict_mode = False/g; s/trim_nonlisted_kmi = True/trim_nonlisted_kmi = False/g' BUILD.bazel
          [ -f "modules.bzl" ] && grep -q 'protected_modules = ' modules.bzl && sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl
          for f in build.config.gki build.config.gki.aarch64; do [ -f "$f" ] && sed -i '/check_defconfig/d' "$f"; done
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "../build/kernel/abi/check_buildtime_symbol_protection.py"
          [ -f "../build/kernel/kleaf/impl/stamp.bzl" ] && sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          : > .scmversion

      # ───── Build & Package ─────
      - name: 🔨 Build Kernel
        run: |
          cd kernel/common
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "Castorice GKI SUSFS" || true
          cd ..
          tools/bazel build --config=fast //common:kernel_aarch64_dist 2>&1
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: 📤 Extract & Package
        run: |
          mkdir -p dist
          cd kernel
          tools/bazel run --config=fast //common:kernel_aarch64_dist -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true
          for artifact in Image Image.gz Image.lz4; do
            [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ] && FOUND=$(find bazel-out -name "$artifact" -type f 2>/dev/null | head -n 1) && [ -n "$FOUND" ] && cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/"
          done
          cd $GITHUB_WORKSPACE
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          
          # Convert to short names
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac
          
          # New naming: Castorice-<Name>-v<N>-GKI66-<Root>-SUSFS-<Gov>-Bazel-Redmi12
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-GKI66-${ROOT_SHORT}-SUSFS-${GOV_SHORT}-Bazel-Redmi12"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 SUSFS | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' '# AnyKernel3' 'properties() {' "kernel.string=${KERNEL_STRING}" 'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=15' '}' '' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' '' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          for img in "$GITHUB_WORKSPACE/dist/Image" "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.lz4"; do
            [ -f "$img" ] && cp "$img" . && break
          done
          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

      # ───── Release ─────
      - name: 🚀 Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-GKI-SUSFS-${{ inputs.ksu_method }}"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • GKI 6.6 SUSFS • ${{ inputs.ksu_method }}"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)
            | Info | Value |
            |------|-------|
            | **Type** | GKI 6.6 + SUSFS |
            | **Root** | ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }} |
            | **Governor** | ${{ inputs.cpu_governor }} |
            | **SUSFS** | ✅ |

            ### Gaming Profile + SUSFS
            - HZ_1000, Full PREEMPT, HRTIMER
            - CPU Governor: **${{ inputs.cpu_governor }}**
            - SUSFS: path/mount/kstat hiding, uname spoofing
            - TCP BBR, BFQ + Kyber I/O, LRU-Gen

            ### Compatibility
            - ✅ HyperOS 2.x (Android 15)
          files: dist/*.zip
          draft: false
          prerelease: false
