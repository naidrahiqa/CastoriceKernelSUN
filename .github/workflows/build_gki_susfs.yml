name: "GKI 6.6 - KernelSU + SUSFS"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative
      safety_profile:
        description: "Boot safety profile"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        default: "bazel-default"
        options:
          - bazel-default
          - zyc-latest
          - proton-latest
          - neutron-latest
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ANDROID_VERSION: android15
  KERNEL_VERSION: "6.6"
  KMI_GENERATION: "8"
  KSU_VERSION: ""
  SUSFS_OK: "false"
  ZIP_NAME: ""
  TOOLCHAIN_NAME: ""
  TOOLCHAIN_VER: ""

jobs:
  build:
    name: "GKI SUSFS - ${{ inputs.ksu_method }} - ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd aria2 p7zip-full

      - name: Install repo Tool
        run: |
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Setup Custom Toolchain
        if: inputs.clang_toolchain != 'bazel-default'
        run: |
          mkdir -p prebuilts/clang/host/linux-x86
          cd prebuilts/clang/host/linux-x86
          TOOLCHAIN="${{ inputs.clang_toolchain }}"
          case "$TOOLCHAIN" in
            zyc-latest)
              ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
              ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
              aria2c -x16 -s16 -k1M -o zyclang.tar.gz "https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
              mkdir -p clang-zyc && tar -xf zyclang.tar.gz -C clang-zyc && rm zyclang.tar.gz
              CLANG_VER=$(clang-zyc/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-zyc" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              echo "TOOLCHAIN_VER=$CLANG_VER" >> $GITHUB_ENV
              ;;
            proton-latest)
              git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang-proton
              CLANG_VER=$(clang-proton/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-proton" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=ProtonClang" >> $GITHUB_ENV
              echo "TOOLCHAIN_VER=$CLANG_VER" >> $GITHUB_ENV
              ;;
            neutron-latest)
              NEUTRON_ASSET=$(curl -sL https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o neutron.tar.gz "$NEUTRON_ASSET"
              mkdir -p clang-neutron && tar -xf neutron.tar.gz -C clang-neutron --strip-components=1 && rm neutron.tar.gz
              CLANG_VER=$(clang-neutron/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
              echo "CUSTOM_CLANG_PATH=$(pwd)/clang-neutron" >> $GITHUB_ENV
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              echo "TOOLCHAIN_VER=$CLANG_VER" >> $GITHUB_ENV
              ;;
          esac
          cd $GITHUB_WORKSPACE

      - name: Sync Android Common Kernel
        run: |
          mkdir -p kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b common-${ANDROID_VERSION}-${KERNEL_VERSION} --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync
          cd common && make kernelversion

      - name: Set KMI Generation
        run: |
          cd kernel/common
          if [ -f "build.config.common" ]; then
            grep -q "KMI_GENERATION" build.config.common && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" build.config.common || echo "KMI_GENERATION=${KMI_GENERATION}" >> build.config.common
          fi
          for f in build.config.gki build.config.gki.aarch64; do
            [ -f "$f" ] && grep -q "KMI_GENERATION" "$f" && sed -i "s/KMI_GENERATION=.*/KMI_GENERATION=${KMI_GENERATION}/" "$f"
          done
          STAMP_FILE="../build/kernel/kleaf/impl/stamp.bzl"
          [ -f "$STAMP_FILE" ] && grep -q "kmi_generation" "$STAMP_FILE" && sed -i "s/kmi_generation = \"[0-9]*\"/kmi_generation = \"${KMI_GENERATION}\"/" "$STAMP_FILE" || true

      - name: Setup KernelSU
        run: |
          cd kernel/common
          KSU_METHOD="${{ inputs.ksu_method }}"
          case "$KSU_METHOD" in
            kernelsu-next)
              KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest | jq -r '.tag_name')
              [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ] && git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU || git clone --depth=1 --branch "$KSU_TAG" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              ;;
            wildksu) git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU ;;
            sukisu) git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b main KernelSU ;;
            rsukisu) git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git -b main KernelSU ;;
          esac
          cp -r "$(pwd)/KernelSU/kernel" "drivers/kernelsu"
          rm -rf "drivers/kernelsu/include/uapi" "drivers/kernelsu/uapi"
          mkdir -p "drivers/kernelsu/uapi" "drivers/kernelsu/include/uapi"
          for uapi_dir in "KernelSU/kernel/uapi" "KernelSU/uapi"; do
            [ -d "$uapi_dir" ] && cp -r "$uapi_dir"/* "drivers/kernelsu/uapi/" 2>/dev/null && cp -r "$uapi_dir"/* "drivers/kernelsu/include/uapi/" 2>/dev/null && break
          done
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu/Kconfig" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          KSU_VERSION=$(cd KernelSU && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          [ -f "drivers/kernelsu/Kbuild" ] && sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true

      - name: Setup SUSFS
        run: |
          set -euo pipefail
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${ANDROID_VERSION}-${KERNEL_VERSION} || { echo "Error: SUSFS branch gki-${ANDROID_VERSION}-${KERNEL_VERSION} not found"; exit 1; }
          cd common
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          [ -f "fs/Makefile" ] && ! grep -q "susfs.o" "fs/Makefile" && echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> "fs/Makefile"
          for patch in ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-*.patch; do
            if [ -f "$patch" ]; then
              git apply --3way "$patch" || patch -p1 --forward --fuzz=3 < "$patch" || true
            fi
          done
          KSU_KERNEL="drivers/kernelsu"
          if [ -d "$KSU_KERNEL" ]; then
            if ! grep -q "CONFIG_KSU_SUSFS" "$KSU_KERNEL/Kconfig" 2>/dev/null; then
              printf '%s\n' 'menu "KernelSU - SUSFS"' 'config KSU_SUSFS' '  bool "KernelSU addon - SUSFS"' '  depends on KSU' '  default y' 'config KSU_SUSFS_SUS_PATH' '  bool "Hide suspicious paths"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_SUS_MOUNT' '  bool "Hide suspicious mounts"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_SUS_KSTAT' '  bool "Spoof kstat"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_SPOOF_UNAME' '  bool "Spoof uname"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_ENABLE_LOG' '  bool "Enable logging"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS' '  bool "Hide symbols from kallsyms"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG' '  bool "Spoof cmdline/bootconfig"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_OPEN_REDIRECT' '  bool "Open redirect"' '  depends on KSU_SUSFS' '  default y' 'config KSU_SUSFS_SUS_MAP' '  bool "Hide mmapped files from proc maps"' '  depends on KSU_SUSFS' '  default y' 'endmenu' >> "$KSU_KERNEL/Kconfig"
            fi
            if ! grep -q "SUSFS_VERSION" "$KSU_KERNEL/Makefile" 2>/dev/null; then
              printf '%s\n' '## SUSFS ##' 'ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $?),0)' '$(eval SUSFS_VERSION=$(shell cat $(srctree)/include/linux/susfs.h | grep -E "^#define SUSFS_VERSION" | cut -d" " -f3 | sed "s/\"//g"))' '$(info -- SUSFS_VERSION: $(SUSFS_VERSION))' 'else' '$(info -- SUSFS not integrated)' 'endif' >> "$KSU_KERNEL/Makefile"
            fi
            [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/core/init.c" && sed -i '/#include <linux\/workqueue.h>/a #include <linux\/susfs.h>' "$KSU_KERNEL/core/init.c"
            if [ -f "$KSU_KERNEL/core/init.c" ] && ! grep -q "susfs_init" "$KSU_KERNEL/core/init.c"; then
              python3 -c "import sys; path='drivers/kernelsu/core/init.c'; content=open(path).read(); content=content.replace('ksu_feature_init', '#ifdef CONFIG_KSU_SUSFS\n\tsusfs_init();\n#endif\n\tksu_feature_init', 1) if 'susfs_init' not in content and 'ksu_feature_init' in content else content; open(path, 'w').write(content)"
            fi
            [ -f "$KSU_KERNEL/supercall/dispatch.c" ] && ! grep -q "susfs.h" "$KSU_KERNEL/supercall/dispatch.c" && sed -i '/#include <linux\/version.h>/a #include <linux\/susfs.h>' "$KSU_KERNEL/supercall/dispatch.c"
            grep -q "CONFIG_KSU_SUSFS" drivers/kernelsu/Kconfig 2>/dev/null && echo "SUSFS_OK=true" >> $GITHUB_ENV || echo "SUSFS_OK=false" >> $GITHUB_ENV
          fi

      - name: Configure Kernel
        run: |
          set -euo pipefail
          cd kernel/common
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          SAFETY_PROFILE="${{ inputs.safety_profile }}"
          TUNING_PROFILE="${{ inputs.tuning_profile }}"

          add_cfg() {
            sed -i "/^${1%%=*}=.*/d" "$DEFCONFIG"
            echo "$1" >> "$DEFCONFIG"
          }

          echo "" >> $DEFCONFIG
          echo "# KernelSU" >> $DEFCONFIG
          add_cfg "CONFIG_KSU=y"

          if [ "$SUSFS_OK" = "true" ]; then
            echo "" >> $DEFCONFIG
            echo "# SUSFS" >> $DEFCONFIG
            for cfg in CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SUS_MOUNT CONFIG_KSU_SUSFS_SUS_MAP CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT CONFIG_KSU_SUSFS_SUS_KSTAT CONFIG_KSU_SUSFS_TRY_UMOUNT CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT CONFIG_KSU_SUSFS_SPOOF_UNAME CONFIG_KSU_SUSFS_ENABLE_LOG CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG CONFIG_KSU_SUSFS_OPEN_REDIRECT; do
              add_cfg "${cfg}=y"
            done
            add_cfg "CONFIG_KSU_SUSFS_SUS_SU=n"
          else
            echo "SUSFS setup failed"
            exit 1
          fi

          echo "" >> $DEFCONFIG
          echo "# Module Compatibility" >> $DEFCONFIG
          add_cfg "CONFIG_MODULE_SIG_FORCE=n"
          add_cfg "CONFIG_MODULE_SIG_ALL=n"

          echo "" >> $DEFCONFIG
          echo "# CPU Governor" >> $DEFCONFIG
          for gov in SCHEDUTIL PERFORMANCE ONDEMAND CONSERVATIVE; do add_cfg "CONFIG_CPU_FREQ_GOV_${gov}=y"; done
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          case "$GOVERNOR" in
            performance) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" ;;
            ondemand) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" ;;
            conservative) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" ;;
            *) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" ;;
          esac

          echo "" >> $DEFCONFIG
          echo "# Stability Baseline" >> $DEFCONFIG
          add_cfg "CONFIG_HIGH_RES_TIMERS=y"
          add_cfg "CONFIG_WQ_POWER_EFFICIENT_DEFAULT=n"

          if [ "$SAFETY_PROFILE" = "performance" ]; then
            for cfg in CONFIG_HZ_1000=y CONFIG_HZ=1000 CONFIG_PREEMPT=y CONFIG_ZRAM_WRITEBACK=y CONFIG_CRYPTO_LZ4=y CONFIG_CRYPTO_ZSTD=y CONFIG_KSM=y CONFIG_LRU_GEN=y CONFIG_LRU_GEN_ENABLED=y CONFIG_TCP_CONG_BBR=y 'CONFIG_DEFAULT_TCP_CONG="bbr"' CONFIG_NET_SCH_FQ=y; do add_cfg "$cfg"; done
            if [ "$TUNING_PROFILE" = "gaming" ]; then
              add_cfg "CONFIG_IOSCHED_BFQ=y"; add_cfg "CONFIG_MQ_IOSCHED_KYBER=y"
            elif [ "$TUNING_PROFILE" = "social_media" ]; then
              add_cfg "CONFIG_COMPACTION=y"; add_cfg "CONFIG_TRANSPARENT_HUGEPAGE=y"
            fi
          fi

          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-SUSFS"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

      - name: Patch Build System
        run: |
          cd kernel/common
          rm -rf android/abi_gki_protected_exports_* || true
          [ -f "BUILD.bazel" ] && sed -i -e '/abi_gki_protected_exports/d' -e '/protected_exports/d' -e '/check_defconfig/d' -e 's/kmi_symbol_list_strict_mode = True/kmi_symbol_list_strict_mode = False/g' -e 's/trim_nonlisted_kmi = True/trim_nonlisted_kmi = False/g' BUILD.bazel
          [ -f "modules.bzl" ] && sed -i 's/protected_modules = \[.*\]/protected_modules = []/' modules.bzl 2>/dev/null || true
          for f in build.config.gki build.config.gki.aarch64; do [ -f "$f" ] && sed -i '/check_defconfig/d' "$f"; done
          [ -f "../build/kernel/abi/check_buildtime_symbol_protection.py" ] && perl -i -pe 's/^(\s*)return 1$/$1return 0/g' "../build/kernel/abi/check_buildtime_symbol_protection.py"
          [ -f "../build/kernel/kleaf/impl/stamp.bzl" ] && sed -i '/stable_scmversion_cmd/s/-maybe-dirty//g' ../build/kernel/kleaf/impl/stamp.bzl
          sed -i 's/-dirty//' scripts/setlocalversion 2>/dev/null || true
          : > .scmversion

      - name: Build Kernel (Bazel)
        if: inputs.clang_toolchain == 'bazel-default'
        run: |
          set -euo pipefail
          cd kernel
          tools/bazel build --config=fast //common:kernel_aarch64_dist 2>&1 | tee build.log
          echo "TOOLCHAIN_NAME=Bazel" >> $GITHUB_ENV
          echo "TOOLCHAIN_VER=" >> $GITHUB_ENV
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Build Kernel (Custom Toolchain)
        if: inputs.clang_toolchain != 'bazel-default'
        run: |
          set -euo pipefail
          cd kernel/common
          export PATH="$CUSTOM_CLANG_PATH/bin:$PATH"
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- gki_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip 2>&1 | tee ../build.log
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Verify Build Output
        run: |
          IMAGE_COUNT=0
          for f in dist/Image dist/Image.gz dist/Image.lz4 \
            kernel/common/out/arch/arm64/boot/Image \
            kernel/common/out/arch/arm64/boot/Image.gz \
            kernel/common/out/arch/arm64/boot/Image.lz4 \
            kernel/bazel-out/k8-fastbuild/bin/common/kernel_aarch64_dist/Image; do
            if [ -f "$f" ]; then IMAGE_COUNT=$((IMAGE_COUNT+1)); fi
          done
          if [ "$IMAGE_COUNT" -eq 0 ]; then echo "No kernel image found" && exit 1; fi

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gki-susfs-debug-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}
          path: |
            kernel/build.log
            kernel/common/build.log
            kernel/common/arch/arm64/configs/gki_defconfig
          if-no-files-found: warn
          retention-days: 7

      - name: Extract & Package
        run: |
          mkdir -p dist
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"

          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac

          if [ "${{ inputs.clang_toolchain }}" = "bazel-default" ]; then
            cd kernel
            tools/bazel run --config=fast //common:kernel_aarch64_dist -- --dist_dir=$GITHUB_WORKSPACE/dist 2>&1 || true
            for artifact in Image Image.gz Image.lz4; do
              [ ! -f "$GITHUB_WORKSPACE/dist/$artifact" ] && FOUND=$(find bazel-out -name "$artifact" -type f 2>/dev/null | head -n 1) && [ -n "$FOUND" ] && cp -v "$FOUND" "$GITHUB_WORKSPACE/dist/" || true
            done
            cd $GITHUB_WORKSPACE
          else
            for img in kernel/common/out/arch/arm64/boot/Image kernel/common/out/arch/arm64/boot/Image.gz kernel/common/out/arch/arm64/boot/Image.lz4; do
              [ -f "$img" ] && cp "$img" dist/ && break
            done
          fi

          if [ -n "$TOOLCHAIN_VER" ]; then
            TOOLCHAIN_SUFFIX="${TOOLCHAIN_NAME}${TOOLCHAIN_VER}"
          else
            TOOLCHAIN_SUFFIX="${TOOLCHAIN_NAME}"
          fi

          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-GKI66-${ROOT_SHORT}-SUSFS-${GOV_SHORT}-${TOOLCHAIN_SUFFIX}-Redmi12"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [GKI 6.6 SUSFS | ${KSU_METHOD} | ${GOVERNOR} | ${TOOLCHAIN_SUFFIX}] by ${AUTHOR}"
          printf '%s\n' '# AnyKernel3' 'properties() {' "kernel.string=${KERNEL_STRING}" 'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=15' '}' '' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' '' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          for img in "$GITHUB_WORKSPACE/dist/Image" "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.lz4"; do
            [ -f "$img" ] && cp "$img" . && break
          done
          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Castorice Kernel ${{ inputs.release_tag }}"
          body: |
            ## Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}
            | Info | Value |
            |------|-------|
            | **Type** | GKI 6.6 + SUSFS |
            | **Root** | ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }} |
            | **Governor** | ${{ inputs.cpu_governor }} |
            | **SUSFS** | Yes |
          files: dist/*.zip
          draft: false
          prerelease: false
          append_body: true
