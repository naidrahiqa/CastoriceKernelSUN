name: "Legacy 4.19 - KernelSU + SUSFS"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative
      safety_profile:
        description: "Boot safety profile (reserved)"
        required: true
        type: choice
        default: "stable"
        options:
          - stable
          - performance
      tuning_profile:
        description: "Tuning profile"
        required: true
        type: choice
        default: "balanced"
        options:
          - balanced
          - gaming
          - social_media
      clang_toolchain:
        description: "Clang Toolchain"
        required: true
        type: choice
        default: "zyc-latest"
        options:
          - zyc-latest
          - proton-latest
          - neutron-latest
      release_tag:
        description: "Release Tag"
        required: true
        default: "v1.0"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  KSU_VERSION: ""
  ZIP_NAME: ""
  TOOLCHAIN_NAME: ""

jobs:
  build:
    name: "Legacy SUSFS - ${{ inputs.ksu_method }} - ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget bc bison flex libssl-dev make libelf-dev \
            python3 python3-pip python-is-python3 zip unzip cpio kmod rsync lz4 jq patch \
            binutils libncurses-dev pkg-config ninja-build zstd aria2 p7zip-full gcc-arm-linux-gnueabi

      - name: Download Custom Toolchain
        run: |
          mkdir -p clang
          TOOLCHAIN="${{ inputs.clang_toolchain }}"
          case "$TOOLCHAIN" in
            zyc-latest)
              ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
              ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
              echo "TOOLCHAIN_NAME=ZyClang" >> $GITHUB_ENV
              ;;
            proton-latest)
              git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
              echo "TOOLCHAIN_NAME=ProtonClang" >> $GITHUB_ENV
              ;;
            neutron-latest)
              NEUTRON_URL=$(curl -s https://api.github.com/repos/Neutron-Toolchains/clang-build-catalogue/releases/latest | jq -r '.assets[] | select(.name | contains("neutron-clang")) | .browser_download_url' | head -n1)
              aria2c -x16 -s16 -k1M -o clang.tar.gz "$NEUTRON_URL"
              echo "TOOLCHAIN_NAME=NeutronClang" >> $GITHUB_ENV
              ;;
          esac
          [ -f clang.tar.gz ] && tar -xf clang.tar.gz -C clang/ && rm -f clang.tar.gz || true

      - name: Sync Kernel Source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fire-t-oss kernel
          cd kernel
          echo "KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)" >> $GITHUB_ENV

      - name: Setup SUSFS
        run: |
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19
          cd kernel
          cp -rv ../susfs4ksu/kernel_patches/fs/* fs/
          cp -rv ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true
          patch -p1 < ../susfs4ksu/kernel_patches/fs/open.c_patch || true

      - name: Setup KernelSU
        run: |
          cd kernel
          KSU_METHOD="${{ inputs.ksu_method }}"
          case "$KSU_METHOD" in
            kernelsu-next)
              KSU_TAG=$(curl -sL https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest | jq -r '.tag_name')
              [ -z "$KSU_TAG" ] || [ "$KSU_TAG" = "null" ] && git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU || git clone --depth=1 --branch "$KSU_TAG" https://github.com/KernelSU-Next/KernelSU-Next.git KernelSU
              ;;
            wildksu) git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU ;;
            sukisu) git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git -b main KernelSU ;;
            rsukisu) git clone --depth=1 https://github.com/ReSukiSU/ReSukiSU.git -b main KernelSU ;;
          esac
          cp -r "$(pwd)/KernelSU/kernel" "drivers/kernelsu"
          rm -rf "drivers/kernelsu/include/uapi" "drivers/kernelsu/uapi"
          mkdir -p "drivers/kernelsu/uapi" "drivers/kernelsu/include/uapi"
          for uapi_dir in "KernelSU/kernel/uapi" "KernelSU/uapi"; do
            [ -d "$uapi_dir" ] && cp -r "$uapi_dir"/* "drivers/kernelsu/uapi/" 2>/dev/null && cp -r "$uapi_dir"/* "drivers/kernelsu/include/uapi/" 2>/dev/null && break
          done
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu/Kconfig" drivers/Kconfig || echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          KSU_VERSION=$(cd KernelSU && git rev-list --count HEAD)
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          [ -f "drivers/kernelsu/Kbuild" ] && sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true
          find . -type f -name "*.c" -path "*/KernelSU*/kernel/*" -exec sed -i 's/TWA_RESUME/true/g' {} +

      - name: Configure Defconfig
        run: |
          set -euo pipefail
          cd kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          add_cfg() {
            sed -i "/^${1%%=*}=.*/d" "$DEFCONFIG"
            echo "$1" >> "$DEFCONFIG"
          }
          echo "" >> $DEFCONFIG
          echo "# KernelSU & SUSFS" >> $DEFCONFIG
          add_cfg "CONFIG_KSU=y"
          add_cfg "CONFIG_KPROBES=y"
          add_cfg "CONFIG_HAVE_KPROBES=y"
          add_cfg "CONFIG_KPROBE_EVENTS=y"
          add_cfg "CONFIG_KSU_SUSFS=y"
          add_cfg "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_SUS_PATH=y"
          add_cfg "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_SUS_MAP=y"
          add_cfg "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
          add_cfg "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
          add_cfg "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          add_cfg "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
          add_cfg "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          add_cfg "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
          add_cfg "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          add_cfg "CONFIG_KSU_SUSFS_SUS_SU=n"
          
          echo "" >> $DEFCONFIG
          echo "# TCP / Net" >> $DEFCONFIG
          add_cfg "CONFIG_TCP_CONG_ADVANCED=y"
          add_cfg "CONFIG_TCP_CONG_BBR=y"
          add_cfg 'CONFIG_DEFAULT_TCP_CONG="bbr"'
          add_cfg "CONFIG_NET_SCH_FQ=y"
          add_cfg 'CONFIG_DEFAULT_NET_SCH="fq"'
          echo "" >> $DEFCONFIG
          echo "# CPU Governor" >> $DEFCONFIG
          sed -i '/^CONFIG_CPU_FREQ_DEFAULT_GOV_/d' "$DEFCONFIG"
          case "$GOVERNOR" in
            performance) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" ;;
            ondemand) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" ;;
            conservative) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" ;;
            *) add_cfg "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" ;;
          esac
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-SUSFS"
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG
          echo "CONFIG_LOCALVERSION_AUTO=n" >> $DEFCONFIG

      - name: Build Kernel
        run: |
          set -euo pipefail
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          MAKE_ARGS="O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            HOSTCC=gcc HOSTCXX=g++ HOSTLD=ld"
          make $MAKE_ARGS fire_defconfig
          make -j$(nproc) $MAKE_ARGS \
            LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            2>&1 | tee ../build.log
        env:
          SOURCE_DATE_EPOCH: "0"

      - name: Verify Build
        run: |
          HAS_IMAGE=false
          for img in kernel/out/arch/arm64/boot/Image kernel/out/arch/arm64/boot/Image.gz kernel/out/arch/arm64/boot/Image.gz-dtb; do
            if [ -f "$img" ]; then
              echo "Found: $img"
              mkdir -p dist
              cp -v "$img" dist/
              HAS_IMAGE=true
            fi
          done
          [ "$HAS_IMAGE" = "false" ] && echo "No kernel image found!" && exit 1

      - name: Upload Debug Artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-susfs-debug-${{ inputs.ksu_method }}-${{ inputs.cpu_governor }}
          path: |
            build.log
            kernel/arch/arm64/configs/fire_defconfig
          if-no-files-found: warn
          retention-days: 7

      - name: Package AnyKernel3
        run: |
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac
          CLANG_VER=$(clang/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
          TOOLCHAIN_SHORT="${TOOLCHAIN_NAME}"
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-Leg419-${ROOT_SHORT}-SUSFS-${GOV_SHORT}-${TOOLCHAIN_SHORT}${CLANG_VER}-Redmi12"
          echo "ZIP_NAME=${BASE_NAME}" >> $GITHUB_ENV
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3 && cd ak3
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [Legacy 4.19 SUSFS | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' '# AnyKernel3' 'properties() {' "kernel.string=${KERNEL_STRING}" 'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=' '}' '' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' '' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          for img in "$GITHUB_WORKSPACE/dist/Image" "$GITHUB_WORKSPACE/dist/Image.gz" "$GITHUB_WORKSPACE/dist/Image.gz-dtb"; do
            [ -f "$img" ] && cp "$img" . && break
          done
          zip -r9 "$GITHUB_WORKSPACE/dist/${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "Castorice Kernel ${{ inputs.release_tag }}"
          body: |
            ## Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}
            | Info | Value |
            |------|-------|
            | **Type** | Legacy 4.19 + SUSFS |
            | **Root** | ${{ inputs.ksu_method }} v${{ env.KSU_VERSION }} |
            | **Governor** | ${{ inputs.cpu_governor }} |
            | **Toolchain** | ${{ inputs.clang_toolchain }} |
          files: dist/*.zip
          draft: false
          prerelease: false
          append_body: true
