name: "🔥 Legacy 4.19 — KernelSU + SUSFS"

on:
  workflow_dispatch:
    inputs:
      custom_name:
        description: "Kernel Custom Name"
        required: true
        default: "Starter"
      author_name:
        description: "Author Name"
        required: true
        default: "Castorice"
      ksu_method:
        description: "Root Method"
        required: true
        type: choice
        default: "kernelsu-next"
        options:
          - kernelsu-next
          - wildksu
          - sukisu
          - rsukisu
      cpu_governor:
        description: "CPU Governor"
        required: true
        type: choice
        default: "schedutil"
        options:
          - schedutil
          - performance
          - ondemand
          - conservative

permissions:
  contents: write

jobs:
  build:
    name: "Legacy 4.19 SUSFS — ${{ inputs.ksu_method }} — ${{ inputs.cpu_governor }}"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/share/miniconda /opt/hostedtoolcache
          sudo apt-get autoremove -y && sudo apt-get clean

      - name: Setup Swap
        run: |
          sudo fallocate -l 16G /mnt/swapfile || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=16384
          sudo chmod 600 /mnt/swapfile && sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libxml-sax-base-perl libxml-simple-perl libc6-dev-i386 lib32ncurses-dev libncurses-dev libx11-dev lib32z-dev libstdc++6 lib32stdc++6 libgl1-mesa-dev xsltproc unzip gzip device-tree-compiler cpio findutils python3 bc p7zip-full libelf-dev jq libyaml-dev -y

      - name: Download ZyClang
        run: |
          mkdir -p clang
          ZYCLANG=$(curl -sI https://github.com/ZyCromerZ/Clang/releases/latest | awk -F/ '/location:/ {print $NF}' | tr -d '\r')
          ZYASSET=$(curl -sL "https://github.com/ZyCromerZ/Clang/releases/expanded_assets/$ZYCLANG" | grep -oP '[^/"]+\.tar.gz' | head -n1)
          aria2c -x16 -s16 -k1M -o zyclang.tar.gz "https://github.com/ZyCromerZ/Clang/releases/latest/download/$ZYASSET"
          tar -xf zyclang.tar.gz -C clang/ && rm -f zyclang.tar.gz

      - name: Sync Kernel Source
        run: |
          git clone --depth=1 https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git -b fire-t-oss kernel
          cd kernel
          echo "KERNEL_HEAD_HASH=$(git log --pretty=format:'%H' -1)" >> $GITHUB_ENV

      - name: Clone Reference Patches
        run: |
          git clone --depth=1 https://github.com/Alexjr2/KernelSU_Next_SUSFS_fire.git ref_patches
          rm -rf ref_patches/.git

      - name: Apply Device Patches
        run: |
          cd kernel
          patch -p1 --forward < ../ref_patches/patchs/fix_lcm.patch || echo "WARN: fix_lcm failed"
          patch -p1 --forward < ../ref_patches/primary_display_fix.patch || echo "WARN: primary_display_fix failed"
          sed -i 's/static struct zram_pages_life \*init_pages_life()/static struct zram_pages_life \*init_pages_life(void)/g' drivers/block/zram/zram_drv.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6357-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_read_audio_res);/\/\/EXPORT_SYMBOL(accdet_read_audio_res);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          sed -i 's/EXPORT_SYMBOL(accdet_late_init);/\/\/EXPORT_SYMBOL(accdet_late_init);/g' sound/soc/codecs/mt6359-accdet.c 2>/dev/null || true
          patch -p1 --forward < ../ref_patches/patchs/ksu_hooks_4.19.patch || { echo "ERROR: ksu_hooks_4.19.patch FAILED"; exit 1; }
          patch -p1 --forward < ../ref_patches/patchs/69_hide_ksu.patch || echo "WARN: 69_hide_ksu failed"
          patch -p1 --forward < ../ref_patches/patchs/fix_kernel_genheaders.patch || echo "WARN: fix_kernel_genheaders failed"

      - name: Setup KernelSU
        run: |
          cd kernel
          KSU_METHOD="${{ inputs.ksu_method }}"
          case "$KSU_METHOD" in
            kernelsu-next) curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash - ;;
            wildksu) git clone --depth=1 https://github.com/WildKernels/Wild_KSU.git -b canary KernelSU && cp -r KernelSU/kernel drivers/kernelsu ;;
            sukisu) curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s tmp-builtin ;;
            rsukisu) curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/builtin/kernel/setup.sh" | bash -s builtin ;;
          esac
          KSU_DIR=$(find . -maxdepth 1 -type d -name "KernelSU*" | head -n 1)
          if [ -n "$KSU_DIR" ]; then
            KSU_VERSION=$(cd "$KSU_DIR" && git rev-list --count HEAD)
          else
            KSU_VERSION="unknown"
          fi
          if [ -f "drivers/kernelsu/Kbuild" ]; then
            sed -i "s/KSU_GIT_VERSION := .*/KSU_GIT_VERSION := $KSU_VERSION/" drivers/kernelsu/Kbuild || true
          fi
          if [ -d "$KSU_DIR" ]; then
            rm -rf "$KSU_DIR/.git"
          fi
          for patch in KernelSU*/kernel/patches/*.patch 2>/dev/null; do [ -f "$patch" ] && patch -p1 --forward < "$patch" || true; done
          find . -type f -name "*.c" -path "*/KernelSU*/kernel/*" -exec sed -i 's/TWA_RESUME/true/g' {} +

      - name: Setup SUSFS
        run: |
          cd kernel
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git
          rm -rf susfs4ksu/.git
          cp -rv susfs4ksu/kernel_patches/fs/* fs/
          cp -rv susfs4ksu/kernel_patches/include/linux/* include/linux/
          patch -p1 --forward < susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true
          sed -i "s/poofed_size: '%u'/poofed_size: '%llu'/g" ./fs/susfs.c 2>/dev/null || true
          sed -i "s/length of string: %u/length of string: %lu/g" ./fs/susfs.c 2>/dev/null || true
          grep -q "susfs.o" fs/Makefile || echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile
          if [ -d "drivers/kernelsu" ]; then
            if ! grep -q "susfs.h" drivers/kernelsu/core/init.c 2>/dev/null; then
              sed -i '/#include <linux\/workqueue.h>/a #include <linux\/susfs.h>' drivers/kernelsu/core/init.c
            fi
            if ! grep -q "susfs_init" drivers/kernelsu/core/init.c 2>/dev/null; then
              sed -i '/ksu_core_init(/i\	susfs_init();' drivers/kernelsu/core/init.c
            fi
            if ! grep -q "susfs.h" drivers/kernelsu/supercall/dispatch.c 2>/dev/null; then
              sed -i '/#include <linux\/version.h>/a #include <linux\/susfs.h>' drivers/kernelsu/supercall/dispatch.c
            fi
            if ! grep -q "CONFIG_KSU_SUSFS" drivers/kernelsu/Kconfig 2>/dev/null; then
              printf '%s\n' \
                'config KSU_SUSFS' \
                '  bool "KernelSU addon - SUSFS"' \
                '  depends on KSU' \
                '  default y' \
                'config KSU_SUSFS_SUS_PATH' \
                '  bool "Hide suspicious paths"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_MOUNT' \
                '  bool "Hide suspicious mounts"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_KSTAT' \
                '  bool "Spoof kstat"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SPOOF_UNAME' \
                '  bool "Spoof uname"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_ENABLE_LOG' \
                '  bool "Enable logging"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS' \
                '  bool "Hide symbols from kallsyms"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                'config KSU_SUSFS_SUS_MAP' \
                '  bool "Hide mmapped files from proc maps"' \
                '  depends on KSU_SUSFS' \
                '  default y' \
                >> drivers/kernelsu/Kconfig
            fi
          fi

      - name: Configure Defconfig
        run: |
          cd kernel
          DEFCONFIG="arch/arm64/configs/fire_defconfig"
          GOVERNOR="${{ inputs.cpu_governor }}"
          echo "CONFIG_KSU=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> $DEFCONFIG
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> $DEFCONFIG
          echo "CONFIG_HZ_1000=y" >> $DEFCONFIG
          echo "CONFIG_HZ=1000" >> $DEFCONFIG
          echo "CONFIG_PREEMPT=y" >> $DEFCONFIG
          echo "CONFIG_ZSMALLOC=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_LZ4_COMPRESS=y" >> $DEFCONFIG
          echo "CONFIG_ZRAM_WRITEBACK=y" >> $DEFCONFIG
          echo "CONFIG_TCP_CONG_BBR=y" >> $DEFCONFIG
          echo 'CONFIG_DEFAULT_TCP_CONG="bbr"' >> $DEFCONFIG
          echo "CONFIG_NET_SCH_FQ=y" >> $DEFCONFIG
          echo 'CONFIG_DEFAULT_NET_SCH="fq"' >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_ONDEMAND=y" >> $DEFCONFIG
          echo "CONFIG_CPU_FREQ_GOV_CONSERVATIVE=y" >> $DEFCONFIG
          case "$GOVERNOR" in
            performance) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_PERFORMANCE=y" >> $DEFCONFIG ;;
            ondemand) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y" >> $DEFCONFIG ;;
            conservative) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_CONSERVATIVE=y" >> $DEFCONFIG ;;
            *) echo "CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y" >> $DEFCONFIG ;;
          esac
          sed -i '/CONFIG_LOCALVERSION/d' $DEFCONFIG
          LOCALVER="-Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-SUSFS"
          echo "CONFIG_LOCALVERSION=\"${LOCALVER}\"" >> $DEFCONFIG

      - name: Patch Clang Warnings
        run: |
          cd kernel
          sed -i 's/-Wno-format-invalid-specifier//g' Makefile || true
          sed -i 's/-Wno-gnu-empty-initializer//g' Makefile || true
          find drivers sound -name "Makefile" -exec sed -i 's/-Werror//g' {} + || true

      - name: Build Kernel
        run: |
          cd kernel
          export PATH="$GITHUB_WORKSPACE/clang/bin:$PATH"
          make O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- fire_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip KCFLAGS="-Wno-all -Wno-error" KCPPFLAGS="-Wno-all -Wno-error" 2>&1 | tee build.log
          [ ! -f out/arch/arm64/boot/Image.gz-dtb ] && echo "BUILD FAILED" && tail -100 build.log && exit 1

      - name: Upload Build Log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-legacy-4.19-susfs-${{ inputs.ksu_method }}
          path: kernel/build.log
          retention-days: 7

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cd ak3
          CUSTOM_NAME="${{ inputs.custom_name }}"
          BUILD_VER="${{ github.run_number }}"
          AUTHOR="${{ inputs.author_name }}"
          KSU_METHOD="${{ inputs.ksu_method }}"
          GOVERNOR="${{ inputs.cpu_governor }}"
          KERNEL_STRING="Castorice-${CUSTOM_NAME}-v${BUILD_VER} [Legacy 4.19 SUSFS | ${KSU_METHOD} | ${GOVERNOR}] by ${AUTHOR}"
          printf '%s\n' '# AnyKernel3' 'properties() {' "kernel.string=${KERNEL_STRING}" 'do.devicecheck=1' 'do.modules=0' 'do.systemless=1' 'do.cleanup=1' 'device.name1=fire' 'device.name2=Redmi 12' 'supported.versions=13,14' '}' 'block=boot;' 'is_slot_device=auto;' 'ramdisk_compression=auto;' 'patch_vbmeta_flag=auto;' '. tools/ak3-core.sh;' 'dump_boot;' 'write_boot;' > anykernel.sh
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb .
          
          # Convert to short names
          case "$KSU_METHOD" in
            kernelsu-next) ROOT_SHORT="KSUNext" ;;
            wildksu) ROOT_SHORT="WildKSU" ;;
            sukisu) ROOT_SHORT="SukiSU" ;;
            rsukisu) ROOT_SHORT="ReSukiSU" ;;
          esac
          case "$GOVERNOR" in
            schedutil) GOV_SHORT="Schedutil" ;;
            performance) GOV_SHORT="Performance" ;;
            ondemand) GOV_SHORT="Ondemand" ;;
            conservative) GOV_SHORT="Conservative" ;;
          esac
          
          # Get ZyClang version
          CLANG_VER=$(../clang/bin/clang --version | head -n1 | grep -oP '\d+\.\d+\.\d+' | head -n1 | cut -d. -f1)
          
          # New naming: Castorice-<Name>-v<N>-Leg419-<Root>-SUSFS-<Gov>-ZyC<Ver>-Redmi12
          BASE_NAME="Castorice-${CUSTOM_NAME}-v${BUILD_VER}-Leg419-${ROOT_SHORT}-SUSFS-${GOV_SHORT}-ZyC${CLANG_VER}-Redmi12"
          zip -r9 "../${BASE_NAME}-AnyKernel3.zip" . -x ".git*" "*.md" "LICENSE"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }}-Legacy-SUSFS-${{ inputs.ksu_method }}"
          name: "Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} • Legacy 4.19 SUSFS • ${{ inputs.ksu_method }}"
          body: |
            ## ⚡ Castorice-${{ inputs.custom_name }}-v${{ github.run_number }} — Redmi 12 (fire)
            | Info | Value |
            |------|-------|
            | **Type** | Legacy 4.19 + SUSFS |
            | **Root** | ${{ inputs.ksu_method }} |
            | **Governor** | ${{ inputs.cpu_governor }} |
            | **SUSFS** | ✅ |

            ### Gaming Profile + SUSFS
            - HZ_1000, Full PREEMPT
            - CPU Governor: **${{ inputs.cpu_governor }}**
            - SUSFS: path/mount/kstat hiding, uname spoofing
            - TCP BBR, LZ4 ZRAM

            ### Compatibility
            - ✅ MIUI 14 (Android 13)
            - ✅ HyperOS 1.x (Android 14)
            - ❌ HyperOS 2.x → use GKI 6.6
          files: "*.zip"
          draft: false
          prerelease: false
